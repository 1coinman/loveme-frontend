<!DOCTYPE html>
<html lang="tr">
<head>
    <script>if (window.history.replaceState) window.history.replaceState(null, null, "/");</script>
    <link rel="icon" type="image/png" href="logo/LoveMe.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOVEME - KIRMIZI ODA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
        html, body { width: 100%; height: 100%; height: 100dvh; overflow: hidden !important; background-color: #e0e5ec; color: #55595c; position: fixed; top: 0; left: 0; right: 0; bottom: 0; transition: background-color 0.4s ease; }
        
        .game-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100%; justify-content: flex-start; align-items: center; padding: 10px 0 40px 0; overflow: hidden; }
        .header-stats { width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px 0; z-index: 9505; position: relative; }
        .coin-display { font-weight: 900; font-size: 22px; display: flex; align-items: center; gap: 8px; color: #55595c; }
        
        .main-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        
        #matching-ui { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; text-align: center; position: relative; }
        .milk-ripple-container { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 220px; height: 220px; border-radius: 50%; z-index: 1; }
        .milk-wave { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) translateZ(0); border-radius: 50%; background: #e0e5ec; box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), -15px -15px 30px rgba(255, 255, 255, 0.7), inset 10px 10px 20px rgba(163, 177, 198, 0.3), inset -10px -10px 20px rgba(255, 255, 255, 0.6); opacity: 0; pointer-events: none; z-index: -1; animation: milkRipple 6s infinite cubic-bezier(0.3, 0, 0.2, 1); }
        .milk-wave-1 { animation-delay: 0s; } .milk-wave-2 { animation-delay: 2s; } .milk-wave-3 { animation-delay: 4s; }
        @keyframes milkRipple { 0% { width: 220px; height: 220px; opacity: 0; } 30% { opacity: 1; } 100% { width: 480px; height: 480px; opacity: 0; } }
        
        .logo-box { width: 60px; height: 60px; margin-bottom: 12px; background-color: #55595c; -webkit-mask: url('logo/loveme.svg') no-repeat center; mask: url('logo/loveme.svg') no-repeat center; -webkit-mask-size: contain; mask-size: contain; animation: elastic-glow 1.8s infinite ease-in-out; }
        @keyframes elastic-glow { 0%, 100% { transform: scale(1); background-color: #55595c; } 50% { transform: scale(1.25); background-color: #e64a61; } }
        
        .matching-status { font-weight: 800; font-size: 15px; color: #55595c; margin-bottom: 6px; letter-spacing: 0.5px; }
        .opponent-info { font-weight: 600; font-size: 12px; color: #888; }
        #distance-info { font-size: 13px; font-weight: 900; color: #6fb98f; margin-top: 15px; opacity: 0; transition: 0.5s; background: #e0e5ec; padding: 5px 15px; border-radius: 20px; box-shadow: inset 3px 3px 6px rgba(163,177,198,0.5), inset -3px -3px 6px rgba(255,255,255,0.5); }

        #lobby-ui { display: flex; flex-direction: column; align-items: center; width: 100%; transition: opacity 0.4s; }
        .gender-selection { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; }
        .gender-btn { width: 75px; height: 75px; border-radius: 20px; border: none; background: #e0e5ec; box-shadow: 6px 6px 12px rgba(163,177,198,0.6), -6px -6px 12px rgba(255,255,255,0.5); font-size: 30px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #a3b1c6; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .gender-btn.active.male { color: #55595c; box-shadow: inset 4px 4px 8px rgba(163,177,198,0.6), inset -4px -4px 8px rgba(255,255,255,0.5); transform: scale(0.95); }
        .gender-btn.active.female { color: #e64a61; box-shadow: inset 4px 4px 8px rgba(163,177,198,0.6), inset -4px -4px 8px rgba(255,255,255,0.5); transform: scale(0.95); }
        
        .start-btn { background: #e0e5ec; color: #55595c; font-size: 16px; font-weight: 900; padding: 15px 40px; border: none; border-radius: 30px; box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.6), -6px -6px 12px rgba(255, 255, 255, 0.5); cursor: pointer; transition: all 0.3s; margin-top: 30px; width: 80%; max-width: 300px; }
        .start-btn:active { box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5); transform: scale(0.96); }

        .custom-slider-wrapper { position: relative; width: 85%; max-width: 300px; height: 30px; display: flex; align-items: center; margin-bottom: 40px; }
        .custom-slider-track { width: 100%; height: 12px; border-radius: 10px; background: #e0e5ec; box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); }
        .custom-slider-thumb { width: 34px; height: 34px; border-radius: 50%; background: #e0e5ec; box-shadow: 4px 4px 8px rgba(163,177,198,0.6), -4px -4px 8px rgba(255,255,255,0.5); position: absolute; top: 50%; left: 0%; transform: translate(-50%, -50%); transition: left 0.3s ease-out; }
        .slider-labels-row { position: absolute; top: 25px; left: 0; width: 100%; height: 20px; pointer-events: none; }
        .slider-labels-row span { position: absolute; top: 0; transform: translateX(-50%); font-size: 10px; font-weight: 800; color: #a3b1c6; transition: 0.3s; }
        .slider-labels-row span.active-label { color: #55595c; font-size: 12px; }

        .loc-btn { background: transparent; border: none; color: #55595c; font-weight: 900; font-size: 13px; cursor: pointer; text-decoration: underline; margin-top: 15px; }

        #question-ui { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 340px; opacity: 1; transition: 0.5s; }
        
        .match-header { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 15px; padding: 12px 20px; background: #e0e5ec; border-radius: 20px; box-shadow: 6px 6px 12px rgba(163,177,198,0.6), -6px -6px 12px rgba(255,255,255,0.5); }
        .player-name { font-weight: 900; font-size: 14px; color: #55595c; max-width: 40%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .center-heart { width: 35px; height: 35px; background-color: #e64a61; -webkit-mask: url('icon/loveme_heart.svg') no-repeat center; mask: url('icon/loveme_heart.svg') no-repeat center; -webkit-mask-size: contain; mask-size: contain; animation: heartbeat 1.5s infinite; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

        .question-counter-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .q-box { background: #e0e5ec; color: #55595c; font-weight: 900; font-size: 16px; padding: 10px 25px; border-radius: 15px; box-shadow: inset 4px 4px 8px rgba(163,177,198,0.5), inset -4px -4px 8px rgba(255,255,255,0.5); }
        .q-divider { font-weight: 900; font-size: 20px; color: #a3b1c6; }

        #timer-digital { font-family: 'Digital Numbers', sans-serif; font-size: 32px; font-weight: 900; color: #55595c; margin-bottom: 15px; transition: color 0.3s ease; }
        .timer-warning { color: #e64a61 !important; animation: timer-pulse 0.5s infinite alternate; }
        @keyframes timer-pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        .q-text { font-size: 17px; font-weight: 800; text-align: center; margin-bottom: 15px; color: #55595c; padding: 0 15px; line-height: 1.3; }
        .answers-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; padding: 0 20px; }
        .ans-container { position: relative; width: 100%; }
        .ans-btn { width: 100%; background: #e0e5ec; border: none; border-radius: 30px; box-shadow: 6px 6px 12px rgba(163,177,198,0.6), -6px -6px 12px rgba(255,255,255,0.5); color: #55595c; padding: 15px 10px; font-size: 14px; font-weight: 800; cursor: pointer; transition: all 0.3s; min-height: 52px; display: flex; align-items: center; justify-content: center; text-align: center; line-height: 1.2; }
        
        .ans-btn.selected-you { box-shadow: inset 4px 4px 8px rgba(163,177,198,0.6), inset -4px -4px 8px rgba(255,255,255,0.5); color: #55595c; border: 2px solid #55595c; }
        .ans-btn.selected-opp { box-shadow: inset 4px 4px 8px rgba(163,177,198,0.6), inset -4px -4px 8px rgba(255,255,255,0.5); color: #e64a61; border: 2px solid #e64a61; }
        .ans-btn.selected-both { box-shadow: inset 4px 4px 8px rgba(163,177,198,0.6), inset -4px -4px 8px rgba(255,255,255,0.5); background: #6fb98f; color: #fff; }
        .ans-btn.locked { pointer-events: none; }
        
        #progress-area { width: 100%; height: 50px; position: relative; margin: 15px 0; display: flex; align-items: flex-end; justify-content: center; }
        .player-heart { position: absolute; bottom: 0px; font-size: 26px; z-index: 2; transition: left 0.5s, right 0.5s; animation: breathe-anim 2s infinite ease-in-out; }
        .heart-female { left: 0%; color: #e64a61; } .heart-male { right: 0%; color: #55595c; }
        @keyframes breathe-anim { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        
        #merged-heart { position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%); display: none; width: 45px; height: 45px; background-color: #e64a61; -webkit-mask: url('icon/loveme_heart.svg') no-repeat center; mask: url('icon/loveme_heart.svg') no-repeat center; -webkit-mask-size: contain; mask-size: contain; animation: elastic-glow 1.5s infinite; z-index: 5; }

        #decision-ui { display: none; flex-direction: column; align-items: center; width: 100%; text-align: center; padding: 20px; }
        .decision-title { font-size: 18px; font-weight: 900; color: #55595c; margin-bottom: 30px; line-height: 1.4; }
        .dec-btn { padding: 15px 10px; font-size: 12px; font-weight: 900; border-radius: 15px; border: none; background: #e0e5ec; box-shadow: 5px 5px 10px rgba(163,177,198,0.6), -5px -5px 10px rgba(255,255,255,0.5); color: #55595c; margin: 5px; cursor: pointer; transition: 0.3s; width: 90px; }
        .dec-btn:active { box-shadow: inset 3px 3px 6px rgba(163,177,198,0.6), inset -3px -3px 6px rgba(255,255,255,0.5); }
        .dec-btn.yes { color: #6fb98f; } .dec-btn.no { color: #e64a61; }
        #opp-decision-status { color: #6fb98f; font-weight: 800; margin-top: 20px; display: none; }

        #real-chat-ui { display: none; flex-direction: column; width: 100%; height: 100%; background: #e0e5ec; position: absolute; top: 0; left: 0; z-index: 2000; }
        .chat-header { padding: 15px; box-shadow: 0 4px 10px rgba(163,177,198,0.2); display: flex; justify-content: space-between; align-items: center; }
        .chat-header-title { font-size: 18px; font-weight: 900; color: #55595c; }
        .chat-exit { color: #e64a61; font-weight: 900; cursor: pointer; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; box-shadow: 3px 3px 8px rgba(163,177,198,0.4); }
        .msg-me { background: #55595c; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-opp { background: #fff; color: #55595c; align-self: flex-start; border-bottom-left-radius: 4px; }
        .chat-input-area { padding: 15px; display: flex; gap: 10px; }
        .chat-input { flex: 1; border: none; border-radius: 20px; padding: 15px; background: #fff; outline: none; box-shadow: inset 3px 3px 6px rgba(163,177,198,0.3); font-weight: 600; }
        .chat-send { background: #55595c; color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; box-shadow: 3px 3px 8px rgba(163,177,198,0.4); }

        #result-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(224,229,236,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; }
        .modern-box { background: #e0e5ec; border-radius: 30px; box-shadow: 9px 9px 16px rgba(163,177,198,0.6), -9px -9px 16px rgba(255,255,255,0.5); padding: 30px; text-align: center; width: 85%; max-width: 320px; }
        .modern-btn { background: #e0e5ec; color: #55595c; font-weight: 900; border: none; padding: 12px 25px; border-radius: 20px; box-shadow: 4px 4px 8px rgba(163,177,198,0.6), -4px -4px 8px rgba(255,255,255,0.5); margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body ondragstart="return false" onselectstart="return false">

<div id="result-overlay">
    <div class="modern-box">
        <div id="res-text" style="font-size:16px; font-weight:900; color:#55595c;"></div>
        <button class="modern-btn" onclick="window.location.replace('oyun.html')">LOBİYE DÖN</button>
    </div>
</div>

<div class="game-wrapper">
    <div class="header-stats">
        <div class="coin-display"><i class="fa-solid fa-coins"></i><span id="my-coins">...</span></div>
    </div>
    
    <div class="main-stage">
        <div id="lobby-ui">
            <h3 style="margin-bottom: 20px; color:#55595c;">Kimi Arıyorsun?</h3>
            <div class="gender-selection">
                <button class="gender-btn male" onclick="selectTarget('MALE')"><i class="fa-solid fa-mars"></i></button>
                <button class="gender-btn female" onclick="selectTarget('FEMALE')"><i class="fa-solid fa-venus"></i></button>
            </div>

            <div class="custom-slider-wrapper" id="ageSliderWrapper">
                <div class="custom-slider-track"></div>
                <div class="custom-slider-thumb" id="ageThumb"></div>
                <div class="slider-labels-row">
                    <span class="active-label" style="left: 0%;">18-25</span>
                    <span style="left: 20%;">25-35</span><span style="left: 40%;">35-45</span>
                    <span style="left: 60%;">45-55</span><span style="left: 80%;">55-65</span><span style="left: 100%;">65+</span>
                </div>
            </div>

            <button class="loc-btn" id="locBtn" onclick="requestLocation()"><i class="fa-solid fa-location-dot"></i> YAKINLARDAN BUL</button>
            <button class="start-btn" onclick="startMatchmaking()">EŞLEŞMEYİ BAŞLAT</button>
        </div>

        <div id="matching-ui">
            <div class="milk-ripple-container">
                <div class="milk-wave milk-wave-1"></div>
                <div class="milk-wave milk-wave-2"></div>
                <div class="milk-wave milk-wave-3"></div>
                <div class="logo-box"></div>
                <div class="matching-status">EŞLEŞME ARANIYOR</div>
                <div class="opponent-info" id="match-timer">BEKLENİYOR...</div>
                <div id="distance-info"></div>
            </div>
        </div>

        <div id="question-ui">
            <div class="match-header">
                <div class="player-name" id="my-name-display">Ben</div>
                <div class="center-heart"></div>
                <div class="player-name" id="opp-name-display">Rakip</div>
            </div>
            
            <div class="question-counter-box">
                <div class="q-box" id="q-current">1</div>
                <div class="q-divider">/</div>
                <div class="q-box">10</div>
            </div>

            <div id="timer-digital">30</div>
            <div id="progress-area">
                <div id="heart-p1" class="player-heart heart-male"><i class="fa-solid fa-heart"></i></div>
                <div id="heart-p2" class="player-heart heart-female"><i class="fa-solid fa-heart"></i></div>
                <div id="merged-heart"></div>
            </div>
            <div class="q-text" id="q-text">Yükleniyor...</div>
            <div class="answers-grid" id="ans-container"></div>
        </div>

        <div id="decision-ui">
            <div class="logo-box" style="animation:none; background-color:#e64a61; margin-bottom: 20px;"></div>
            <div class="decision-title">SOHBETE DEVAM EDELİM Mİ?</div>
            <div style="display:flex; justify-content:center;">
                <button class="dec-btn no" onclick="makeDecision('NO')">HAYIR</button>
                <button class="dec-btn maybe" onclick="makeDecision('MAYBE')">KARARSIZIM</button>
                <button class="dec-btn yes" onclick="makeDecision('YES')">EVET</button>
            </div>
            <div id="opp-decision-status">Rakibin seninle tanışmak istiyor!</div>
        </div>
    </div>
</div>

<div id="real-chat-ui">
    <div class="chat-header">
        <div class="chat-header-title" id="chat-opp-name">İsimsiz</div>
        <div class="chat-exit" onclick="window.location.replace('oyun.html')">ÇIK</div>
    </div>
    <div class="chat-messages" id="chat-messages-container"></div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chat-input" placeholder="Bir mesaj yaz..." onkeypress="if(event.key==='Enter') sendChat()">
        <button class="chat-send" onclick="sendChat()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>

<script>
    const SERVER_URL = 'https://loveme-backend-6421.onrender.com';
    let socket = null;
    let userDocId = null, myNickname = null, userCoins = 0, myGender = 'MALE';
    
    let targetGender = null;
    let targetAgeStr = '18-25';
    let userLat = 0, userLng = 0;
    let currentMatchId = null;
    let myRole = null; 
    
    let timerInterval = null;
    let timeLeft = 30;
    let hasAnswered = false;

    function getAuthToken() {
        const directKeys = ['loveme_token', 'access_token', 'token'];
        for (let k of directKeys) { const v = localStorage.getItem(k); if (v) return v; }
        const sbKey = Object.keys(localStorage).find(key => key.startsWith('sb-') && key.endsWith('-auth-token'));
        if (sbKey) { try { return JSON.parse(localStorage.getItem(sbKey))?.access_token || null; } catch(e) {} }
        return null;
    }

    async function init() {
        const token = getAuthToken();
        if (!token) { window.location.replace("oyun.html"); return; }
        try {
            const meRes = await fetch(`${SERVER_URL}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
            const meData = await meRes.json();
            userDocId = meData.user.id;
            
            const userRes = await fetch(`${SERVER_URL}/api/user/${userDocId}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const userData = await userRes.json();
            
            myNickname = userData.nickname;
            myGender = userData.gender || 'MALE';
            userCoins = (Number(userData.free_coins) || 0) + (Number(userData.paid_coins) || Number(userData.coins) || 0);
            document.getElementById('my-coins').innerText = userCoins;
            
            socket = io(SERVER_URL);
            setupSocket();
        } catch(e) { showError("Bağlantı hatası."); }
    }

    function selectTarget(gender) {
        targetGender = gender;
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.gender-btn.${gender.toLowerCase()}`).classList.add('active');
    }

    const thumb = document.getElementById('ageThumb');
    const ageRanges = ["18-25", "25-35", "35-45", "45-55", "55-65", "65+"];
    let isDragging = false;
    
    function updateSlider(e) {
        const wrap = document.getElementById('ageSliderWrapper');
        const rect = wrap.getBoundingClientRect();
        let x = (e.type.includes('touch') ? e.touches[0].clientX : e.clientX) - rect.left;
        let percent = Math.max(0, Math.min(1, x / rect.width));
        let step = Math.round(percent * 5);
        
        thumb.style.left = `${(step / 5) * 100}%`;
        targetAgeStr = ageRanges[step];
        
        document.querySelectorAll('.slider-labels-row span').forEach((s, i) => {
            s.className = i === step ? 'active-label' : '';
        });
    }
    
    document.getElementById('ageSliderWrapper').addEventListener('mousedown', () => { isDragging = true; });
    document.getElementById('ageSliderWrapper').addEventListener('touchstart', (e) => { isDragging = true; updateSlider(e); });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('touchend', () => { isDragging = false; });
    window.addEventListener('mousemove', (e) => { if(isDragging) updateSlider(e); });
    window.addEventListener('touchmove', (e) => { if(isDragging) updateSlider(e); });

    function requestLocation() {
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => { userLat = pos.coords.latitude; userLng = pos.coords.longitude; document.getElementById('locBtn').innerHTML = '<i class="fa-solid fa-check" style="color:#6fb98f;"></i> KONUM AKTİF'; },
                (err) => { document.getElementById('locBtn').innerHTML = 'Konum İzni Verilmedi'; }
            );
        }
    }

    function showError(msg) {
        document.getElementById('res-text').innerText = msg;
        document.getElementById('result-overlay').style.display = 'flex';
    }

    function startMatchmaking() {
        if (!targetGender) { alert("Lütfen aradığınız cinsiyeti seçin."); return; }
        
        document.getElementById('lobby-ui').style.display = 'none';
        document.getElementById('matching-ui').style.display = 'flex';
        
        socket.emit('join_queue', { 
            mode: 'red_room', uid: userDocId, nickname: myNickname, 
            gender: myGender, targetGender: targetGender, targetAge: targetAgeStr,
            lat: userLat, lng: userLng
        });
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 30;
        hasAnswered = false;
        const timerEl = document.getElementById('timer-digital');
        timerEl.innerText = timeLeft;
        timerEl.classList.remove('timer-warning');

        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 5) timerEl.classList.add('timer-warning');
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (!hasAnswered) selectAnswer(-1); 
            }
        }, 1000);
    }

    function setupSocket() {
        socket.on('queue_error', (data) => { showError(data.error); });
        
        socket.on('match_found', (data) => {
            currentMatchId = data.matchId;
            myRole = data.role;

            document.getElementById('my-name-display').innerText = myNickname;
            document.getElementById('opp-name-display').innerText = data.opponent.nickname;

            document.getElementById('match-timer').innerHTML = `<span style="font-size:18px; font-weight:900; color:#e64a61;">${data.opponent.nickname}</span><br>BAĞLANTI KURULDU!`;
            
            const distInfo = document.getElementById('distance-info');
            distInfo.innerText = `Uzaklık: ${data.distance}`;
            distInfo.style.opacity = 1;

            setTimeout(() => {
                if (myRole === 'player1') { socket.emit('share_question', { matchId: currentMatchId }); }
            }, 1500);
        });
        
        socket.on('receive_question', (data) => {
            document.getElementById('matching-ui').style.display = 'none';
            document.getElementById('question-ui').style.display = 'flex';
            
            document.getElementById('q-current').innerText = data.questionCount;
            
            document.getElementById('q-text').innerText = data.question.q;
            const ansContainer = document.getElementById('ans-container');
            ansContainer.innerHTML = '';
            
            data.question.a.forEach((ans, i) => {
                ansContainer.innerHTML += `
                    <div class="ans-container">
                        <button class="ans-btn" id="ans-${i}" onclick="selectAnswer(${i})">${ans}</button>
                    </div>`;
            });
            
            startTimer();
        });

        socket.on('round_result', (data) => {
            clearInterval(timerInterval);
            
            let percent = (data.sharedHearts / 10) * 45; 
            document.getElementById('heart-p1').style.left = `${percent}%`;
            document.getElementById('heart-p2').style.right = `${percent}%`;
            
            if(data.isSame) {
                if (document.getElementById(`ans-${data.player1Choice}`)) {
                    document.getElementById(`ans-${data.player1Choice}`).classList.add('selected-both');
                }
            } else {
                if(data.player1Choice !== -1 && document.getElementById(`ans-${data.player1Choice}`)) document.getElementById(`ans-${data.player1Choice}`).classList.add('selected-you');
                if(data.player2Choice !== -1 && document.getElementById(`ans-${data.player2Choice}`)) document.getElementById(`ans-${data.player2Choice}`).classList.add('selected-opp');
            }
            
            setTimeout(() => {
                if (data.sharedHearts >= 10 || document.getElementById('q-current').innerText === "10") {
                    document.getElementById('question-ui').style.display = 'none';
                    document.getElementById('decision-ui').style.display = 'flex';
                } else {
                    if (myRole === 'player1') {
                        socket.emit('share_question', { matchId: currentMatchId });
                    }
                }
            }, 3000);
        });

        socket.on('opponent_wants_to_meet', () => {
            document.getElementById('opp-decision-status').style.display = 'block';
        });

        socket.on('decision_result', (data) => {
            if (data.status === 'chat') {
                document.getElementById('decision-ui').style.display = 'none';
                document.getElementById('chat-opp-name').innerText = document.getElementById('opp-name-display').innerText;
                document.getElementById('real-chat-ui').style.display = 'flex';
            } else if (data.status === 'end') {
                showError("Uyuşmazlık da doğanın bir parçası. Yeni bir maceraya atıl!");
            }
        });

        socket.on('chat_message', (data) => {
            const container = document.getElementById('chat-messages-container');
            const div = document.createElement('div');
            div.className = `msg-bubble ${data.sender === userDocId ? 'msg-me' : 'msg-opp'}`;
            div.innerText = data.text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        });

        socket.on('opponent_disconnected', () => {
            showError("Rakip kırmızı odadan ayrıldı.");
        });
    }

    window.selectAnswer = function(idx) {
        if(hasAnswered) return;
        hasAnswered = true;
        clearInterval(timerInterval);
        
        document.querySelectorAll('.ans-btn').forEach(b => b.classList.add('locked'));
        if (idx !== -1 && document.getElementById(`ans-${idx}`)) {
            document.getElementById(`ans-${idx}`).classList.add('selected-you');
        }
        socket.emit('submit_answer', { matchId: currentMatchId, choice: idx });
    };

    window.makeDecision = function(choice) {
        document.querySelectorAll('.dec-btn').forEach(b => { b.style.opacity = '0.5'; b.style.pointerEvents = 'none'; });
        socket.emit('submit_decision', { matchId: currentMatchId, decision: choice });
    };

    window.sendChat = function() {
        const inp = document.getElementById('chat-input');
        if(!inp.value.trim()) return;
        socket.emit('send_chat_message', { matchId: currentMatchId, text: inp.value.trim() });
        inp.value = '';
    };

    init();
</script>
</body>
</html>
