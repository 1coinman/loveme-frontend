<!DOCTYPE html>
<html lang="tr">
<head>
    <script>
        if (window.history.replaceState) {
            window.history.replaceState(null, null, "/");
        }
    </script>
    <link rel="icon" type="image/png" href="logo/LoveMe.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOVEME - ÜNİVERSİTE SINAVI</title>
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) { e.preventDefault(); return false; }
        });
    </script>
    
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
    <link rel="preload" href="https://fonts.cdnfonts.com/css/digital-numbers" as="style" onload="this.onload=null;this.rel='stylesheet'">
    
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        html, body { width: 100%; height: 100%; height: 100dvh; overflow: hidden !important; background-color: #e0e5ec; color: #55595c; position: fixed; overscroll-behavior: none; }
        
        .game-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100%; align-items: center; padding: 10px 0 40px 0; overflow: hidden; transition: filter 0.5s; }
        .smoke-blurred { filter: blur(6px) grayscale(50%); pointer-events: none; }
        
        /* Skor Tablosu YKS Tarzı */
        .scoreboard-container { width: 90%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; background: #e0e5ec; border-radius: 20px; box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.6), -6px -6px 12px rgba(255, 255, 255, 0.5); padding: 15px 20px; margin-top: 10px; z-index: 100; }
        .score-box { display: flex; flex-direction: column; align-items: center; }
        .score-title { font-size: 11px; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .score-value { font-size: 22px; font-weight: 900; color: #55595c; transition: color 0.3s; }
        .vs-divider { font-size: 14px; font-weight: 900; color: #a3b1c6; }
        
        .question-counter-box { margin-top: 15px; padding: 10px 25px; border-radius: 30px; background: #e0e5ec; box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.5), inset -4px -4px 8px rgba(255, 255, 255, 0.5); font-size: 14px; font-weight: 900; color: #6fb98f; z-index: 100; }

        .main-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 0; }
        #matching-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; text-align: center; position: relative; }
        
        /* Animasyonlar (Mind.html Birebir Korundu) */
        .milk-ripple-container { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 220px; height: 220px; border-radius: 50%; z-index: 1; }
        .milk-wave { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) translateZ(0); border-radius: 50%; background: #e0e5ec; box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), -15px -15px 30px rgba(255, 255, 255, 0.7), inset 10px 10px 20px rgba(163, 177, 198, 0.3), inset -10px -10px 20px rgba(255, 255, 255, 0.6); opacity: 0; pointer-events: none; z-index: -1; animation: milkRipple 6s infinite cubic-bezier(0.3, 0, 0.2, 1); }
        .milk-wave-1 { animation-delay: 0s; } .milk-wave-2 { animation-delay: 2s; } .milk-wave-3 { animation-delay: 4s; }
        @keyframes milkRipple { 0% { width: 220px; height: 220px; opacity: 0; } 30% { opacity: 1; } 100% { width: 480px; height: 480px; opacity: 0; } }

        .logo-box { width: 60px; height: 60px; margin-bottom: 12px; background-color: #55595c; -webkit-mask: url('logo/loveme.svg') no-repeat center; mask: url('logo/loveme.svg') no-repeat center; -webkit-mask-size: contain; mask-size: contain; animation: elastic-glow 1.8s infinite ease-in-out; }
        @keyframes elastic-glow { 0%, 100% { transform: scale(1); background-color: #55595c; } 50% { transform: scale(1.25); background-color: #e64a61; } }
        
        .matching-status { font-weight: 900; font-size: 14px; color: #55595c; margin-bottom: 6px; letter-spacing: 0.5px; }
        .opponent-info { font-weight: 600; font-size: 11px; color: #888; min-height: 20px; }

        #timer-wrapper { position: relative; display: flex; justify-content: center; align-items: center; margin-top: 10px;}
        #timer-digital { font-family: 'Digital Numbers', sans-serif; font-size: 38px; font-weight: 900; color: #55595c; margin-bottom: 15px; transition: all 0.3s ease; }
        .timer-warning { color: #e64a61 !important; animation: timer-pulse 0.5s infinite alternate; }
        @keyframes timer-pulse { from { transform: scale(1); } to { transform: scale(1.2); } }
        
        #question-ui { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 320px; transition: opacity 0.5s ease; opacity: 1;}
        .q-text { font-size: 16px; font-weight: 800; text-align: center; margin-bottom: 20px; color: #55595c; padding: 0 15px; }
        .answers-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; padding: 0 20px; }
        .ans-container { position: relative; width: 100%; }
        .ans-btn { width: 100%; background: #e0e5ec; border: none; border-radius: 40px; box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5); color: #55595c; padding: 15px 10px; font-size: 14px; font-weight: 800; cursor: pointer; transition: all 0.3s; min-height: 52px; }
        .ans-btn:not(.locked):hover { box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); }
        .ans-btn.selected-black { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7) !important; color: #55595c !important; }
        .ans-btn.correct { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7) !important; color: #6fb98f !important; }
        .ans-btn.wrong { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7) !important; color: #e64a61 !important; }
        .ans-btn.locked { pointer-events: none; }

        .score-anim-up { animation: scoreUp 1s ease; color: #6fb98f; }
        .score-anim-down { animation: scoreDown 1s ease; color: #e64a61; }
        @keyframes scoreUp { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); color:#6fb98f; } }
        @keyframes scoreDown { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); color:#e64a61; } }

        #result-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(224, 229, 236, 0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; opacity: 0; transition: opacity 0.5s ease; }
        #result-overlay.show { opacity: 1; }
        .modern-box { background: #e0e5ec; border-radius: 40px; box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5); width: 340px; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; animation: iosGenieIn 0.7s forwards; }
        .final-score-title { font-size: 16px; font-weight: 900; color: #888; margin-bottom: 10px; text-transform: uppercase; }
        .final-score-val { font-size: 48px; font-weight: 900; color: #55595c; margin-bottom: 20px; }
        .final-msg { font-size: 15px; font-weight: 800; line-height: 1.5; margin-bottom: 25px;}
        .return-btn { padding: 15px 30px; background: #e0e5ec; color: #55595c; font-weight: 900; border: none; border-radius: 30px; box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.6), -5px -5px 10px rgba(255, 255, 255, 0.5); cursor: pointer; text-transform: uppercase; }
        .return-btn:active { box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); }

        .intro-hidden { opacity: 0; pointer-events: none; }
        .anim-smoke-in { animation: smokeIn 0.8s forwards; opacity: 0; }
        .anim-smoke-out { animation: smokeOut 0.5s forwards; }
        @keyframes smokeIn { 0% { filter: blur(12px) grayscale(100%); opacity: 0; transform: scale(0.9); } 100% { filter: blur(0) grayscale(0%); opacity: 1; transform: scale(1); } }
        @keyframes smokeOut { 0% { filter: blur(0); opacity: 1; transform: scale(1); } 100% { filter: blur(10px); opacity: 0; transform: scale(0.9); } }
        .anim-genie-in { animation: iosGenieIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; opacity: 0; }
        .anim-genie-out { animation: iosGenieOut 0.5s forwards; }
        @keyframes iosGenieIn { 0% { opacity: 0; transform: scale(0.1) translateY(200px); } 60% { opacity: 1; transform: scale(1.05) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes iosGenieOut { 0% { opacity: 1; transform: scale(1) translateY(0); } 100% { opacity: 0; transform: scale(0.1) translateY(200px); } }

        /* Üzgün Animasyon Koruması */
        .sad-logo-wrapper { width: 100px; height: 100px; margin-bottom: 20px; background-color: #e64a61; -webkit-mask: url('logo/loveme.svg') no-repeat center; mask: url('logo/loveme.svg') no-repeat center; -webkit-mask-size: contain; mask-size: contain; animation: sad-wobble 3s infinite ease-in-out; }
        @keyframes sad-wobble { 0%, 100% { transform: translateY(0); opacity: 0.8; } 50% { transform: translateY(15px); opacity: 0.4; } }
    </style>
</head>
<body ondragstart="return false" onselectstart="return false">

<div id="result-overlay">
    <div class="modern-box">
        <div id="res-logo-area"></div>
        <div class="final-score-title">YKS SONUCUNUZ</div>
        <div class="final-score-val" id="res-final-score">0</div>
        <div class="final-msg" id="res-text"></div>
        <button class="return-btn" onclick="window.location.replace('oyun.html')">LOBİYE DÖN</button>
    </div>
</div>

<div class="game-wrapper" id="main-game-wrapper">
    
    <div class="scoreboard-container" style="display:none;" id="top-scoreboard">
        <div class="score-box">
            <div class="score-title">SİZ</div>
            <div class="score-value" id="my-score">0</div>
        </div>
        <div class="vs-divider">VS</div>
        <div class="score-box">
            <div class="score-title" id="opp-name-title">RAKİP</div>
            <div class="score-value" id="opp-score">0</div>
        </div>
    </div>
    
    <div class="question-counter-box" style="display:none;" id="q-counter">
        SORU: <span id="current-q-index">1</span> / 160
    </div>

    <div class="main-stage">
        <div id="matching-ui">
            <div class="milk-ripple-container">
                <div class="milk-wave milk-wave-1"></div>
                <div class="milk-wave milk-wave-2"></div>
                <div class="milk-wave milk-wave-3"></div>
                <div class="logo-box"></div>
                <div class="matching-status" id="matching-status-text">SIVAN HAZIRLANIYOR...</div>
                <div class="opponent-info" id="match-timer">SİSTEM BAĞLANTISI BEKLENİYOR...</div>
            </div>
        </div>
        
        <div id="question-ui">
            <div id="timer-wrapper">
                <div id="timer-digital">30</div>
            </div>
            <div class="q-text" id="q-text"></div>
            <div class="answers-grid" id="ans-container"></div>
        </div>
    </div>
</div>

<script>
    function getAuthToken() {
        const directKeys = ['loveme_token', 'access_token', 'token'];
        for (let k of directKeys) { const v = localStorage.getItem(k); if (v) return v; }
        const sbKey = Object.keys(localStorage).find(key => key.startsWith('sb-') && key.endsWith('-auth-token'));
        if (sbKey) { try { let data = JSON.parse(localStorage.getItem(sbKey)); return data?.access_token || null; } catch(e) {} }
        return null;
    }

    const SERVER_URL = 'https://loveme-backend-6421.onrender.com';
    let socket = null;
    let userDocId = null;
    let currentMatchId = null;
    let timerInterval = null;
    let timeLeft = 30; // 30 saniye YKS Kuralı
    let isGameOver = false;
    let hasAnswered = false;
    let myScore = 0;
    let oppScore = 0;
    let myPlayerKey = null;

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 30;
        const timerEl = document.getElementById('timer-digital');
        timerEl.innerText = timeLeft;
        timerEl.classList.remove('timer-warning');

        timerInterval = setInterval(() => {
            if(isGameOver) return clearInterval(timerInterval);
            timeLeft--;
            timerEl.innerText = timeLeft;
            if (timeLeft <= 5) timerEl.classList.add('timer-warning');
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                if (!hasAnswered) handleAnswer(-1); // Boş bırakmak da yanlış kabul edilir (-1 puan)
            }
        }, 1000);
    }

    function triggerFireworks() { 
        var duration = 5000; var animationEnd = Date.now() + duration; var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 }; 
        function randomInRange(min, max) { return Math.random() * (max - min) + min; } 
        var interval = setInterval(function() { 
            var timeLeft = animationEnd - Date.now(); 
            if (timeLeft <= 0) return clearInterval(interval); 
            var particleCount = 50 * (timeLeft / duration); 
            if(window.confetti) { 
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } })); 
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } })); 
            } 
        }, 250); 
    }

    function renderQuestion(qData, qIndex) {
        hasAnswered = false;
        document.getElementById('matching-ui').style.display = 'none';
        document.getElementById('top-scoreboard').style.display = 'flex';
        document.getElementById('q-counter').style.display = 'block';
        
        document.getElementById('current-q-index').innerText = qIndex + 1;
        
        const qUi = document.getElementById('question-ui');
        qUi.style.opacity = '1';
        qUi.style.display = 'flex';
        
        const qTextEl = document.getElementById('q-text');
        const ansContainer = document.getElementById('ans-container');
        
        qTextEl.className = 'q-text intro-hidden';
        qTextEl.innerText = qData.question_text || qData.q;
        ansContainer.innerHTML = '';
        
        const options = qData.options || qData.a;
        options.forEach((ansText, idx) => {
            const btnWrap = document.createElement('div');
            btnWrap.className = 'ans-container intro-hidden'; 
            const btn = document.createElement('button');
            btn.className = 'ans-btn'; 
            btn.id = `ans-btn-${idx}`;
            btn.innerText = ansText;
            btn.onclick = () => handleAnswer(idx);
            btnWrap.appendChild(btn);
            ansContainer.appendChild(btnWrap);
        });

        // Animasyonlu Giriş
        setTimeout(() => {
            qTextEl.className = 'q-text anim-smoke-in';
            const ansWrappers = document.querySelectorAll('.ans-container');
            ansWrappers.forEach((ans, i) => {
                setTimeout(() => { ans.className = 'ans-container anim-genie-in'; }, i * 150);
            });
            setTimeout(() => { startTimer(); }, ansWrappers.length * 150 + 200);
        }, 50);
    }

    async function handleAnswer(idx) {
        if (hasAnswered || isGameOver) return;
        hasAnswered = true;
        clearInterval(timerInterval);
        
        document.querySelectorAll('.ans-btn').forEach(b => b.classList.add('locked'));
        if (idx !== -1) document.getElementById(`ans-btn-${idx}`).classList.add('selected-black');
        
        try {
            const token = getAuthToken();
            // Sunucuya cevabı gönder, skoru ve BİR SONRAKİ soruyu al (Beyin Mekanizması)
            const res = await fetch(`${SERVER_URL}/api/evaluate-round`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ matchId: currentMatchId, myChoice: idx, mode: 'university' })
            });
            
            const data = await res.json();
            if(data.error) throw new Error(data.error);

            // Doğru cevabı göster
            document.querySelectorAll('.ans-btn').forEach((btn, i) => {
                btn.classList.remove('selected-black');
                if (i === data.correct_option) btn.classList.add('correct');
                else if (i === idx) btn.classList.add('wrong');
            });

            // Skorları Güncelle Animasyonlu
            updateScoreUI('my-score', data.p1Score, myScore);
            updateScoreUI('opp-score', data.p2Score, oppScore);
            myScore = data.p1Score; oppScore = data.p2Score;

            setTimeout(() => {
                if(data.isMatchOver) {
                    showFinalResult();
                } else {
                    // Animasyonla çıkış ve yeni soruya geçiş
                    document.getElementById('q-text').className = 'q-text anim-smoke-out';
                    document.querySelectorAll('.ans-container').forEach(a => a.className = 'ans-container anim-genie-out');
                    setTimeout(() => { renderQuestion(data.nextQuestion, data.currentQIndex); }, 600);
                }
            }, 2500); // Cevap ekranda 2.5 sn kalır, duraklamadan devam eder

        } catch(err) {
            console.error(err);
        }
    }

    function updateScoreUI(elementId, newScore, oldScore) {
        const el = document.getElementById(elementId);
        if (newScore !== oldScore) {
            el.innerText = newScore;
            el.classList.remove('score-anim-up', 'score-anim-down');
            void el.offsetWidth; // Reflow trigger
            el.classList.add(newScore > oldScore ? 'score-anim-up' : 'score-anim-down');
        }
    }

    function showFinalResult() {
        isGameOver = true;
        const overlay = document.getElementById('result-overlay');
        const scoreVal = document.getElementById('res-final-score');
        const msg = document.getElementById('res-text');
        const logoArea = document.getElementById('res-logo-area');

        scoreVal.innerText = myScore + " PUAN";
        
        if (myScore >= 150) { // Başarı barajı (Örn: 160 soruda 50 doğru = 150 Puan)
            msg.innerHTML = "Tebrikler!<br>Üniversite tercih barajını başarıyla geçtiniz. Hayallerinize çok yakınsınız!";
            msg.style.color = "#6fb98f";
            logoArea.innerHTML = '';
            triggerFireworks();
        } else {
            msg.innerHTML = "Üzülmeyin!<br>Şu anki puanınız barajın altında. Birlikte daha çok çalışıp başaracağız!";
            msg.style.color = "#e64a61";
            logoArea.innerHTML = '<div class="sad-logo-wrapper"></div>';
        }

        overlay.style.display = 'flex';
        setTimeout(() => overlay.classList.add('show'), 50);
    }

    function setupSocket() {
        socket = io(SERVER_URL);
        
        socket.on('match_found', (data) => {
            currentMatchId = data.matchId;
            myPlayerKey = data.role;
            const oppName = myPlayerKey === 'player1' ? data.player2.nickname : data.player1.nickname;
            document.getElementById('opp-name-title').innerText = oppName.substring(0,8).toUpperCase();
            
            setTimeout(() => { renderQuestion(data.question, 0); }, 1000);
        });

        socket.on('match_found_with_bot', (data) => {
            currentMatchId = data.matchId;
            myPlayerKey = 'player2';
            document.getElementById('opp-name-title').innerText = data.bot.nickname.toUpperCase();
            
            setTimeout(() => { renderQuestion(data.question, 0); }, 1000);
        });

        socket.on('opponent_disconnected', () => {
            // "Kullanıcı sorunu, sıfırdan girer" -> Rakip koparsa kalan kişi hükmen bitirir
            alert("Rakip bağlantısı koptu. Maç sona erdi.");
            window.location.replace('oyun.html');
        });

        socket.emit('join_queue', { mode: 'university', uid: userDocId, nickname: 'Öğrenci', lang: 'tr' });
    }

    async function init() {
        let token = getAuthToken();
        if (!token) return window.location.replace("oyun.html");
        try {
            const res = await fetch(`${SERVER_URL}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            userDocId = data.user.id;
            setupSocket();
        } catch(e) { console.error(e); }
    }
    
    init();
</script>
</body>
</html>
