<!DOCTYPE html>
<html>
<head>
    <script>
        // Hash fragment'ten token'ı al
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const access_token = params.get('access_token');
        const refresh_token = params.get('refresh_token');
        const expires_at = params.get('expires_at');

        if (access_token) {
            localStorage.setItem('loveme_token', access_token);
            // Ayrıca refresh_token ve expires_at da saklanabilir
            localStorage.setItem('loveme_refresh_token', refresh_token);
            localStorage.setItem('loveme_expires_at', expires_at);
            
            // Kullanıcı bilgilerini almak için Supabase session'dan da faydalanabiliriz
            // Basitçe ana sayfaya yönlendir
            window.location.href = '/';
        } else {
            // Hata durumunda ana sayfaya git
            window.location.href = '/';
        }
    </script>
</head>
<body>Yönlendiriliyor...</body>
</html>
