<!DOCTYPE html>
<html>
<head>
    <script>
        (function() {
            // URL'deki hash fragment'ı al
            const hash = window.location.hash.substring(1);
            if (!hash) {
                console.error('No hash found');
                window.location.href = '/';
                return;
            }
            
            const params = new URLSearchParams(hash);
            const access_token = params.get('access_token');
            const refresh_token = params.get('refresh_token');
            const expires_at = params.get('expires_at');
            
            if (access_token) {
                localStorage.setItem('loveme_token', access_token);
                if (refresh_token) localStorage.setItem('loveme_refresh_token', refresh_token);
                if (expires_at) localStorage.setItem('loveme_expires_at', expires_at);
                
                // Token'ı aldık, ana sayfaya yönlendir
                window.location.href = '/';
            } else {
                console.error('Access token not found in URL');
                window.location.href = '/';
            }
        })();
    </script>
</head>
<body>Yönlendiriliyor...</body>
</html>
