<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOVEME - SÜPER LİG</title>
    <link rel="icon" type="image/png" href="logo/LoveMe.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { width: 100%; height: 100dvh; overflow: hidden; background: #e0e5ec; color: #55595c; position: fixed; top: 0; left: 0; transition: background-color 0.3s; touch-action: none; }
        body.alarm-active { background: #e64a61; }
        body.alarm-active .coin-display, body.alarm-active .q-text, body.alarm-active #timer-digital { color: #fff !important; }
        .game-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100%; padding: 10px 0 40px; overflow: hidden; transition: filter 0.5s; }
        .smoke-blurred { filter: blur(6px) grayscale(50%); pointer-events: none; }
        .header-stats { display: flex; justify-content: center; gap: 30px; padding: 10px 0; flex-shrink: 0; }
        .coin-display { font-weight: 900; font-size: 22px; display: flex; align-items: center; gap: 8px; }
        .main-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 0; }
        #matching-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; text-align: center; }
        .milk-ripple-container { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 220px; height: 220px; border-radius: 50%; }
        .milk-wave { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 50%; background: #e0e5ec; box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), -15px -15px 30px rgba(255, 255, 255, 0.7), inset 10px 10px 20px rgba(163, 177, 198, 0.3), inset -10px -10px 20px rgba(255, 255, 255, 0.6); opacity: 0; pointer-events: none; z-index: -1; animation: milkRipple 6s infinite cubic-bezier(0.3, 0, 0.2, 1); }
        .milk-wave-1 { animation-delay: 0s; } .milk-wave-2 { animation-delay: 2s; } .milk-wave-3 { animation-delay: 4s; }
        @keyframes milkRipple { 0% { width: 220px; height: 220px; opacity: 0; } 30% { opacity: 1; } 100% { width: 480px; height: 480px; opacity: 0; } }
        .logo-box { width: 60px; height: 60px; margin-bottom: 12px; background-color: #55595c; mask: url('logo/loveme.svg') no-repeat center / contain; -webkit-mask: url('logo/loveme.svg') no-repeat center / contain; animation: elastic-glow 1.8s infinite ease-in-out; }
        @keyframes elastic-glow { 0%, 100% { transform: scale(1); background-color: #55595c; } 50% { transform: scale(1.25); background-color: #e64a61; } }
        .matching-status { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
        .opponent-info { font-weight: 600; font-size: 11px; color: #888; min-height: 20px; }
        #timer-digital { font-family: 'Digital Numbers', sans-serif; font-size: 42px; font-weight: 900; margin-bottom: 20px; transition: all 0.3s; }
        .timer-warning { color: #e64a61 !important; animation: timer-pulse 0.5s infinite alternate; }
        @keyframes timer-pulse { from { transform: scale(1); } to { transform: scale(1.2); } }
        #question-ui { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 320px; opacity: 1; }
        .q-text { font-size: 17px; font-weight: 800; text-align: center; margin-bottom: 20px; padding: 0 15px; }
        .answers-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; padding: 0 20px; }
        .ans-container { position: relative; width: 100%; }
        .ans-btn { width: 100%; background: #e0e5ec; border: none; border-radius: 40px; box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5); color: #55595c; padding: 15px 10px; font-size: 14px; font-weight: 800; cursor: pointer; transition: all 0.3s; min-height: 52px; display: flex; align-items: center; justify-content: center; text-align: center; word-wrap: break-word; line-height: 1.2; }
        .ans-btn:active { box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); }
        .ans-btn.selected-black { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7); color: #55595c; }
        .ans-btn.selected-opponent { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7); color: #e64a61; }
        .ans-btn.correct { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7); color: #6fb98f; }
        .ans-btn.wrong { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7); color: #e64a61; opacity: 0.7; }
        .ans-btn.locked { pointer-events: none; }
        .choice-label { position: absolute; bottom: -12px; font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 10px; display: none; background: #e0e5ec; box-shadow: 2px 2px 5px rgba(163,177,198,0.6), -2px -2px 5px rgba(255,255,255,0.5); }
        .label-you { color: #55595c; } .label-opponent { color: #e64a61; }
        body[dir="ltr"] .label-you { left: 10px; } body[dir="ltr"] .label-opponent { right: 10px; }
        body[dir="rtl"] .label-you { right: 10px; } body[dir="rtl"] .label-opponent { left: 10px; }
        .pot-container { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: 20px; gap: 15px; }
        .pot-display { background: #e0e5ec; color: #55595c; padding: 12px 40px; border-radius: 40px; font-size: 16px; font-weight: 900; box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5); transition: all 0.4s; }
        .pot-display.pot-updated { transform: scale(1.2); box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7); color: #6fb98f; }
        #waiting-opponent-alert { background: #e0e5ec; color: #e64a61; font-size: 12px; font-weight: 900; padding: 10px 20px; border-radius: 40px; box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.6), -6px -6px 12px rgba(255, 255, 255, 0.5); display: none; animation: alert-blink 0.8s infinite alternate; }
        @keyframes alert-blink { from { opacity: 1; } to { opacity: 0.5; } }
        #raise-container { display: flex; flex-direction: column; align-items: center; margin-top: 0; gap: 10px; max-height: 0; opacity: 0; overflow: hidden; pointer-events: none; transition: max-height 0.6s, opacity 0.4s, margin-top 0.6s; }
        #raise-container.active { max-height: 180px; opacity: 1; margin-top: 15px; pointer-events: auto; }
        .raise-title { font-size: 12px; font-weight: 900; text-transform: uppercase; color: #e64a61; }
        .raise-grid { display: flex; gap: 10px; width: 100%; max-width: 300px; justify-content: center; }
        .raise-btn { flex: 1; background: #e0e5ec; border: none; box-shadow: 4px 4px 8px rgba(163, 177, 198, 0.6), -4px -4px 8px rgba(255, 255, 255, 0.5); padding: 12px 0; font-size: 14px; font-weight: 900; cursor: pointer; border-radius: 15px; transition: 0.2s; }
        #result-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(224, 229, 236, 0.96); z-index: 9999; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s; }
        #result-overlay.show { opacity: 1; }
        .modern-box { background: #e0e5ec; border-radius: 40px; box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5); width: 320px; height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .back-to-lobby-btn { margin-top: 30px; padding: 15px 30px; background: #e0e5ec; color: #55595c; font-weight: 900; border: none; border-radius: 30px; box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.6), -5px -5px 10px rgba(255, 255, 255, 0.5); cursor: pointer; text-transform: uppercase; }
        #inventory-container { position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column-reverse; gap: 10px; z-index: 9506; pointer-events: none; }
        .inv-wrapper { opacity: 0; transform: scale(0); transition: all 0.5s; pointer-events: none; }
        .inv-wrapper.active { opacity: 1; transform: scale(1); pointer-events: auto; }
        .inv-btn { width: 50px; height: 50px; border-radius: 50%; background: #e0e5ec; border: none; box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.6), -5px -5px 10px rgba(255, 255, 255, 0.5); display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; position: relative; }
        .inv-badge { position: absolute; bottom: -4px; left: -4px; background: #e0e5ec; box-shadow: 2px 2px 5px rgba(163,177,198,0.6), -2px -2px 5px rgba(255,255,255,0.5); border-radius: 50%; width: 22px; height: 22px; font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        #chat-trigger-bar { display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 180px; height: 40px; background: #e0e5ec; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 10px rgba(163,177,198,0.4); align-items: center; justify-content: center; font-size: 12px; font-weight: 900; cursor: pointer; z-index: 500; }
        #chat-menu-overlay { position: fixed; bottom: 0; left: 0; width: 100%; height: 40vh; max-height: 300px; background: #e0e5ec; z-index: 501; border-radius: 30px 30px 0 0; box-shadow: 0 -15px 30px rgba(163,177,198,0.5); transform: translateY(100%); transition: transform 0.5s; display: flex; flex-direction: column; align-items: center; padding: 15px 15px 0; pointer-events: none; }
        #chat-menu-overlay.active { transform: translateY(0); pointer-events: auto; }
        .chat-close-handle { width: 40px; height: 5px; background: #a3b1c6; border-radius: 3px; margin-bottom: 15px; cursor: pointer; }
        .chat-options-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; flex: 1; overflow-y: auto; padding-bottom: 25px; }
        .chat-option-btn { min-height: 48px; background: transparent; border: none; font-size: clamp(14px, 4vw, 20px); font-weight: 900; color: #55595c; cursor: pointer; text-transform: uppercase; padding: 8px; border-radius: 15px; }
        #chat-bubbles-container { position: fixed; top: 0; right: 0; width: 220px; pointer-events: none; z-index: 9999; display: flex; flex-direction: column; align-items: flex-end; }
        .chat-bubble { padding: 10px 16px; font-size: 12px; font-weight: 900; margin-bottom: 10px; background: #e0e5ec; border-radius: 20px 0 20px 20px; box-shadow: 4px 4px 10px rgba(163,177,198,0.5); animation: bubble-pop 0.3s; }
        @keyframes bubble-pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        #insufficient-balance { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(224,229,236,0.9); z-index: 10000; align-items: center; justify-content: center; }
        .insufficient-box { background: #e0e5ec; border-radius: 40px; box-shadow: 9px 9px 16px rgba(163,177,198,0.6), -9px -9px 16px rgba(255,255,255,0.5); width: 320px; padding: 40px 20px; text-align: center; }
        .insufficient-box p { font-size: 24px; font-weight: 900; color: #e64a61; margin-bottom: 20px; }
        #debug-console { position: fixed; bottom: 50px; left: 0; width: 100%; background: rgba(0,0,0,0.7); color: #0f0; font-family: monospace; font-size: 10px; padding: 5px; z-index: 100000; max-height: 100px; overflow-y: auto; display: none; }
    </style>
</head>
<body dir="ltr">
    <div id="bg-status-bar" style="display:none; position:fixed; bottom:0; left:0; width:100%; background:#55595c; color:#6fb98f; font-family:monospace; font-size:11px; text-align:center; padding:6px 0; z-index:50;"></div>
    <div id="debug-console"></div>

    <div id="insufficient-balance">
        <div class="insufficient-box">
            <p>YETERSİZ BAKİYE</p>
            <button class="back-to-lobby-btn" onclick="window.location.replace('oyun.html#market')">MARKETE GİT</button>
        </div>
    </div>

    <div id="result-overlay">
        <div class="modern-box">
            <div id="res-dynamic-content"></div>
            <div id="res-text" style="font-size:15px; font-weight:900; margin-top:20px;"></div>
        </div>
    </div>

    <div id="inventory-container"></div>

    <div id="explanation-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(224,229,236,0.95); z-index:9000; align-items:center; justify-content:center;">
        <div class="exp-oval-box" style="background:#e0e5ec; border-radius:40px; box-shadow:9px 9px 16px rgba(163,177,198,0.6), -9px -9px 16px rgba(255,255,255,0.5); padding:40px 25px; width:85%; max-width:360px; text-align:center;">
            <div id="exp-oval-title" style="color:#6fb98f; font-weight:900; font-size:18px; margin-bottom:15px;"></div>
            <div id="exp-oval-text" style="color:#55595c; font-size:15px; font-weight:700;"></div>
        </div>
    </div>

    <div class="game-wrapper" id="main-game-wrapper">
        <div class="header-stats">
            <div class="coin-display"><i class="fa-solid fa-coins"></i><span id="my-coins">...</span></div>
            <div class="coin-display"><i class="fa-solid fa-trophy"></i><span id="my-score">...</span></div>
        </div>
        <div class="main-stage">
            <div id="matching-ui">
                <div class="milk-ripple-container">
                    <div class="milk-wave milk-wave-1"></div><div class="milk-wave milk-wave-2"></div><div class="milk-wave milk-wave-3"></div>
                    <div class="logo-box"></div>
                    <div class="matching-status" id="matching-status-text">SİSTEM BAŞLATILIYOR</div>
                    <div class="opponent-info" id="match-timer">BEKLENİYOR...</div>
                </div>
            </div>
            <div id="question-ui">
                <div id="timer-wrapper"><div id="timer-digital">20</div></div>
                <div class="q-text" id="q-text"></div>
                <div class="answers-grid" id="ans-container"></div>
                <div id="raise-container">
                    <div class="raise-title">BAHSİ ARTTIR</div>
                    <div class="raise-grid" id="raise-buttons"></div>
                </div>
                <div class="pot-container">
                    <div id="waiting-opponent-alert">RAKİP CEVABI BEKLENİYOR</div>
                    <div class="pot-display" id="pot-display">POT: <span id="pot-amount">...</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-trigger-bar">RAKİBİNİ KIZDIR</div>
    <div id="chat-bg-catcher" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:500; display:none;" onclick="toggleChatMenu()"></div>
    <div id="chat-menu-overlay">
        <div class="chat-close-handle" onclick="toggleChatMenu()"></div>
        <div class="chat-options-grid" id="chat-options"></div>
    </div>
    <div id="chat-bubbles-container"></div>

    <script>
        (function(){
            "use strict";

            // ---------- Debug Yardımcısı ----------
            const debugEl = document.getElementById('debug-console');
            function debug(msg) {
                console.log('[DEBUG]', msg);
                debugEl.style.display = 'block';
                debugEl.innerHTML += msg + '<br>';
                setTimeout(() => { if(debugEl.children.length > 10) debugEl.innerHTML = ''; }, 5000);
            }

            // ---------- Yapılandırma ----------
            const SERVER_URL = 'https://loveme-backend-6421.onrender.com';
            const VALID_RAISE_AMOUNTS = [20, 50, 75, 100];
            const CHAT_MESSAGES = {
                tr: ['Fazla yavaşsın!', 'Sadece şanstı!', 'Ağlamak yok!', 'Korktun mu?', 'Başarılar dilerim!'],
                en: ['Too slow!', 'Just lucky!', 'No crying!', 'Are you scared?', 'Good luck!']
            };
            
            // ---------- Global State ----------
            let socket = null;
            let user = { id: null, nickname: null, coins: 0, score: 0, inventory: { bomb:0, mask:0, time:0, joker:0 } };
            let match = {
                id: null, isBot: false, lang: 'tr', pot: 0,
                myRole: null, opponent: null,
                currentQuestion: null,
                myAnswer: null, opponentAnswer: null,
                roundActive: false, gameOver: false, hasAnswered: false, isEvaluating: false,
                timer: null, timeLeft: 20,
                raiseTimeout: null
            };
            
            // UI Elementleri
            const DOM = {
                coins: document.getElementById('my-coins'),
                score: document.getElementById('my-score'),
                matchingUI: document.getElementById('matching-ui'),
                questionUI: document.getElementById('question-ui'),
                qText: document.getElementById('q-text'),
                ansContainer: document.getElementById('ans-container'),
                timerDigital: document.getElementById('timer-digital'),
                potAmount: document.getElementById('pot-amount'),
                waitingAlert: document.getElementById('waiting-opponent-alert'),
                raiseContainer: document.getElementById('raise-container'),
                raiseButtons: document.getElementById('raise-buttons'),
                resultOverlay: document.getElementById('result-overlay'),
                resText: document.getElementById('res-text'),
                resDynamic: document.getElementById('res-dynamic-content'),
                insufficientBox: document.getElementById('insufficient-balance'),
                statusBar: document.getElementById('bg-status-bar'),
                chatTrigger: document.getElementById('chat-trigger-bar'),
                chatMenu: document.getElementById('chat-menu-overlay'),
                chatBg: document.getElementById('chat-bg-catcher'),
                chatOptions: document.getElementById('chat-options'),
                bubblesContainer: document.getElementById('chat-bubbles-container'),
                expOverlay: document.getElementById('explanation-overlay'),
                expTitle: document.getElementById('exp-oval-title'),
                expText: document.getElementById('exp-oval-text'),
                matchingStatus: document.getElementById('matching-status-text'),
                matchTimerText: document.getElementById('match-timer')
            };

            // Dil dosyası
            const lang = (navigator.language || 'en').split('-')[0];
            const i18n = {
                tr: { searching: 'RAKİP ARANIYOR', waiting: 'BEKLENİYOR', pot: 'POT', you: 'SİZ', opp: 'RAKİP', correct: 'DOĞRU', insufficient: 'YETERSİZ BAKİYE', raise_title: 'BAHSİ ARTTIR', preparing: 'ARENA HAZIRLANIYOR', sys_start: 'SİSTEM BAŞLATILIYOR', opponent_waiting: 'RAKİP CEVABI BEKLENİYOR' },
                en: { searching: 'SEARCHING', waiting: 'WAITING', pot: 'POT', you: 'YOU', opp: 'OPPONENT', correct: 'CORRECT', insufficient: 'INSUFFICIENT BALANCE', raise_title: 'RAISE BET', preparing: 'PREPARING ARENA', sys_start: 'SYSTEM STARTING', opponent_waiting: 'WAITING FOR OPPONENT' }
            };
            const t = i18n[lang] || i18n.en;
            
            // Çevirileri uygula
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (t[key]) el.textContent = t[key];
            });
            DOM.matchingStatus.textContent = t.sys_start;
            DOM.waitingAlert.textContent = t.opponent_waiting;
            document.querySelector('.raise-title').textContent = t.raise_title;

            // Yardımcı Fonksiyonlar
            function getAuthToken() {
                return localStorage.getItem('loveme_token') || localStorage.getItem('access_token') || localStorage.getItem('token');
            }

            function updateStatus(msg) {
                debug('Status: ' + msg);
                DOM.statusBar.textContent = msg;
                DOM.statusBar.style.display = 'block';
                setTimeout(() => DOM.statusBar.style.display = 'none', 3000);
            }

            function displayChatBubble(text, isMe) {
                const bubble = document.createElement('div');
                bubble.className = 'chat-bubble';
                bubble.style.background = isMe ? '#e0e5ec' : '#e0e5ec';
                bubble.style.color = isMe ? '#55595c' : '#e64a61';
                bubble.textContent = text;
                DOM.bubblesContainer.appendChild(bubble);
                setTimeout(() => bubble.remove(), 4000);
            }

            window.toggleChatMenu = function() {
                const isActive = DOM.chatMenu.classList.contains('active');
                if (isActive) {
                    DOM.chatMenu.classList.remove('active');
                    DOM.chatBg.style.display = 'none';
                } else {
                    DOM.chatMenu.classList.add('active');
                    DOM.chatBg.style.display = 'block';
                }
            };

            function buildChatOptions() {
                const messages = CHAT_MESSAGES[lang] || CHAT_MESSAGES.en;
                DOM.chatOptions.innerHTML = messages.map(msg => 
                    `<button class="chat-option-btn" onclick="sendChat('${msg}')">${msg}</button>`
                ).join('');
            }
            window.sendChat = function(msg) {
                displayChatBubble(msg, true);
                if (match.id) socket.emit('player_taunt', { matchId: match.id, message: msg });
                toggleChatMenu();
            };

            // ---------- Envanter ----------
            function renderInventory() {
                const container = document.getElementById('inventory-container');
                container.innerHTML = '';
                const items = ['bomb', 'mask', 'time', 'joker'];
                const icons = { bomb: 'bomb', mask: 'mask-ventilator', time: 'stopwatch', joker: 'masks-theater' };
                items.forEach(type => {
                    const count = user.inventory[type] || 0;
                    if (count > 0 && match.roundActive && !match.hasAnswered) {
                        const wrap = document.createElement('div');
                        wrap.className = 'inv-wrapper active';
                        wrap.innerHTML = `<div class="inv-btn" data-type="${type}"><i class="fa-solid fa-${icons[type]}"></i><span class="inv-badge">${count}</span></div>`;
                        wrap.onclick = () => useItem(type);
                        container.appendChild(wrap);
                    }
                });
            }

            async function useItem(type) {
                if (!match.id || user.inventory[type] <= 0 || match.hasAnswered) return;
                user.inventory[type]--;
                renderInventory();
                
                if (type === 'joker') {
                    const res = await fetch(`${SERVER_URL}/api/use-joker`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getAuthToken()}` },
                        body: JSON.stringify({ uid: user.id, questionId: match.currentQuestion.id })
                    });
                    const data = await res.json();
                    if (data.success) handleAnswer(data.correct_option);
                } else {
                    socket.emit('use_item', { matchId: match.id, item: type });
                    if (type === 'mask') {
                        document.getElementById('main-game-wrapper').classList.remove('smoke-blurred');
                    } else if (type === 'time') {
                        match.timeLeft += 10;
                        DOM.timerDigital.textContent = match.timeLeft;
                    }
                }
            }

            // ---------- Bahis Arttır ----------
            function buildRaiseButtons() {
                DOM.raiseButtons.innerHTML = VALID_RAISE_AMOUNTS.map(amt => 
                    `<button class="raise-btn" onclick="raiseBet(${amt})"><i class="fa-solid fa-coins"></i> ${amt}</button>`
                ).join('');
            }
            window.raiseBet = function(amount) {
                if (!match.id) return;
                socket.emit('raise_pot', { matchId: match.id, amount });
                DOM.raiseContainer.classList.remove('active');
            };

            // ---------- Soru Yükleme ----------
            function loadQuestion(qData) {
                debug('Soru yükleniyor: ' + (qData.q || qData.question_text));
                match.currentQuestion = qData;
                match.hasAnswered = false;
                match.isEvaluating = false;
                match.myAnswer = null;
                match.opponentAnswer = null;
                
                DOM.waitingAlert.style.display = 'none';
                DOM.qText.textContent = qData.q || qData.question_text;
                
                // Butonları oluştur
                const options = qData.a || qData.options;
                DOM.ansContainer.innerHTML = '';
                options.forEach((text, idx) => {
                    const wrap = document.createElement('div');
                    wrap.className = 'ans-container';
                    wrap.innerHTML = `
                        <button class="ans-btn" id="ans-btn-${idx}">${text}</button>
                        <div class="choice-label label-you" id="label-you-${idx}">${t.you}</div>
                        <div class="choice-label label-opponent" id="label-opp-${idx}">${t.opp}</div>
                    `;
                    const btn = wrap.querySelector('.ans-btn');
                    btn.onclick = () => handleAnswer(idx);
                    DOM.ansContainer.appendChild(wrap);
                });
                
                // Raise butonlarını aktifleştir
                DOM.raiseContainer.classList.add('active');
                if (match.raiseTimeout) clearTimeout(match.raiseTimeout);
                match.raiseTimeout = setTimeout(() => DOM.raiseContainer.classList.remove('active'), 4000);
                
                // Envanteri göster
                renderInventory();
                
                // Timer başlat
                match.timeLeft = 20;
                DOM.timerDigital.textContent = match.timeLeft;
                DOM.timerDigital.classList.remove('timer-warning');
                if (match.timer) clearInterval(match.timer);
                match.timer = setInterval(() => {
                    match.timeLeft--;
                    DOM.timerDigital.textContent = match.timeLeft;
                    if (match.timeLeft <= 5) DOM.timerDigital.classList.add('timer-warning');
                    if (match.timeLeft <= 0) {
                        clearInterval(match.timer);
                        if (!match.hasAnswered) handleAnswer(-1);
                    }
                }, 1000);
                
                // Butonları aktif et
                document.querySelectorAll('.ans-btn').forEach(b => b.classList.remove('locked'));
            }

            function handleAnswer(choice) {
                if (!match.roundActive || match.hasAnswered || match.gameOver) return;
                debug('Cevap verildi: ' + choice);
                match.hasAnswered = true;
                match.myAnswer = choice;
                clearInterval(match.timer);
                
                document.querySelectorAll('.ans-btn').forEach(b => b.classList.add('locked'));
                if (choice !== -1) {
                    const btn = document.getElementById(`ans-btn-${choice}`);
                    btn.classList.add('selected-black');
                    document.getElementById(`label-you-${choice}`).style.display = 'block';
                }
                DOM.raiseContainer.classList.remove('active');
                socket.emit('submit_answer', { matchId: match.id, choice });
                
                if (match.opponentAnswer === null) {
                    DOM.waitingAlert.style.display = 'block';
                } else {
                    evaluateRound();
                }
            }

            async function evaluateRound() {
                if (match.isEvaluating) return;
                match.isEvaluating = true;
                DOM.waitingAlert.style.display = 'none';
                debug('Round değerlendiriliyor...');
                
                const res = await fetch(`${SERVER_URL}/api/evaluate-round`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getAuthToken()}` },
                    body: JSON.stringify({
                        uid: user.id, matchId: match.id, questionId: match.currentQuestion.id,
                        myChoice: match.myAnswer, oppChoice: match.opponentAnswer,
                        lang: match.lang, mode: 'super_league'
                    })
                });
                const result = await res.json();
                debug('Sonuç alındı: ' + JSON.stringify(result));
                
                // Doğru cevabı göster
                const correctIdx = result.correct_option;
                document.querySelectorAll('.ans-btn').forEach((btn, idx) => {
                    btn.classList.remove('selected-black', 'selected-opponent');
                    if (idx === correctIdx) btn.classList.add('correct');
                    else if (idx === match.myAnswer || idx === match.opponentAnswer) btn.classList.add('wrong');
                    if (idx === match.opponentAnswer) {
                        document.getElementById(`label-opp-${idx}`).style.display = 'block';
                    }
                });
                
                // Skor ve coin güncelle
                user.coins = result.currentCoins;
                user.score += result.scoreChange;
                DOM.coins.textContent = user.coins;
                DOM.score.textContent = user.score;
                
                // Açıklama göster
                DOM.expTitle.textContent = `${t.correct}: ${match.currentQuestion.a[correctIdx]}`;
                DOM.expText.textContent = result.explanation;
                DOM.expOverlay.style.display = 'flex';
                
                setTimeout(() => {
                    DOM.expOverlay.style.display = 'none';
                    if (result.isWin || result.isTie || result.isBothWrong) {
                        showGameOver(result.isWin, result.isTie ? 'BERABERE!' : (result.isBothWrong ? 'İKİNİZ DE BİLEMEDİNİZ!' : null), result);
                    } else {
                        // Sonraki round
                        startNextRound(result.nextRoundFree);
                    }
                }, 3000);
            }

            function showGameOver(win, customText, result) {
                match.gameOver = true;
                DOM.resultOverlay.style.display = 'flex';
                setTimeout(() => DOM.resultOverlay.classList.add('show'), 50);
                
                let text = win ? 'KAZANDIN!' : 'KAYBETTİN!';
                if (customText) text = customText;
                DOM.resText.innerHTML = text;
                DOM.resText.style.color = win ? '#6fb98f' : '#e64a61';
                
                if (win) {
                    if (window.confetti) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
                
                setTimeout(() => {
                    DOM.resultOverlay.classList.remove('show');
                    setTimeout(() => {
                        DOM.resultOverlay.style.display = 'none';
                        if (result?.nextRoundFree) {
                            startNextRound(true);
                        } else {
                            // Maç bitti, yeni eşleşme
                            resetToMatching();
                        }
                    }, 500);
                }, 3000);
            }

            async function startNextRound(free) {
                debug('Sonraki round başlatılıyor, ücretsiz: ' + free);
                const res = await fetch(`${SERVER_URL}/api/get-question/super_league/${user.id}?lang=${match.lang}`, {
                    headers: { 'Authorization': `Bearer ${getAuthToken()}` }
                });
                const qData = await res.json();
                match.roundActive = true;
                match.gameOver = false;
                
                DOM.matchingUI.style.display = 'none';
                DOM.questionUI.style.display = 'flex';
                DOM.chatTrigger.style.display = 'flex';
                
                if (!free) {
                    const feeRes = await fetch(`${SERVER_URL}/api/match/next-round-fee`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getAuthToken()}` },
                        body: JSON.stringify({ uid: user.id, matchId: match.id, amount: 30, isBotDuel: match.isBot })
                    });
                    const feeData = await feeRes.json();
                    if (!feeData.success) {
                        DOM.insufficientBox.style.display = 'flex';
                        return;
                    }
                    user.coins = feeData.currentCoins;
                    DOM.coins.textContent = user.coins;
                }
                
                const potRes = await fetch(`${SERVER_URL}/api/get-match-pot/${match.id}`, {
                    headers: { 'Authorization': `Bearer ${getAuthToken()}` }
                });
                if (potRes.ok) {
                    const pData = await potRes.json();
                    match.pot = pData.pot;
                    DOM.potAmount.textContent = match.pot;
                }
                
                loadQuestion(qData);
            }

            function resetToMatching() {
                debug('Yeni eşleşme aranıyor...');
                match.id = null;
                match.roundActive = false;
                DOM.questionUI.style.display = 'none';
                DOM.matchingUI.style.display = 'flex';
                DOM.chatTrigger.style.display = 'none';
                DOM.matchingStatus.textContent = t.searching;
                DOM.matchTimerText.textContent = t.waiting;
                
                socket.emit('join_queue', { mode: 'super_league', uid: user.id, nickname: user.nickname, country: 'TR', lang });
            }

            // ---------- Socket Eventleri ----------
            function setupSocket() {
                debug('Socket bağlantısı kuruluyor...');
                socket = io(SERVER_URL, { transports: ['websocket'] });
                
                socket.on('connect', () => {
                    debug('Socket bağlandı, ID: ' + socket.id);
                    updateStatus('Bağlandı');
                    if (user.id) {
                        debug('Kuyruğa katılıyor: ' + user.nickname);
                        socket.emit('join_queue', { mode: 'super_league', uid: user.id, nickname: user.nickname, country: 'TR', lang });
                    } else {
                        debug('HATA: user.id yok!');
                    }
                });
                
                socket.on('connect_error', (err) => {
                    debug('Bağlantı hatası: ' + err.message);
                    updateStatus('Bağlantı hatası: ' + err.message);
                });
                
                socket.on('disconnect', (reason) => {
                    debug('Bağlantı koptu: ' + reason);
                    updateStatus('Bağlantı koptu');
                });
                
                socket.on('match_found', async (data) => {
                    debug('Eşleşme bulundu: ' + data.matchId);
                    match.id = data.matchId;
                    match.myRole = data.role;
                    match.lang = data.lang || lang;
                    match.isBot = false;
                    match.opponent = data.role === 'player1' ? data.player2 : data.player1;
                    
                    DOM.matchingStatus.textContent = t.preparing;
                    DOM.matchTimerText.textContent = match.opponent.nickname;
                    
                    if (data.role === 'player1') {
                        const q = await fetchQuestion();
                        socket.emit('share_question', { matchId: match.id, question: q });
                        startMatch(q);
                    }
                });
                
                socket.on('match_found_with_bot', async (data) => {
                    debug('Bot eşleşmesi: ' + data.matchId);
                    match.id = data.matchId;
                    match.isBot = true;
                    match.lang = data.lang || lang;
                    match.opponent = data.bot;
                    
                    DOM.matchingStatus.textContent = t.preparing;
                    DOM.matchTimerText.textContent = data.bot.nickname;
                    
                    const q = await fetchQuestion();
                    socket.emit('bot_start_round', { matchId: match.id, questionId: q.id, difficulty: q.difficulty });
                    startMatch(q);
                });
                
                socket.on('receive_question', (data) => {
                    debug('Rakipten soru alındı');
                    startMatch(data.question);
                });
                
                socket.on('opponent_answer', (data) => {
                    debug('Rakip cevap verdi: ' + data.choice);
                    match.opponentAnswer = data.choice;
                    if (match.hasAnswered) evaluateRound();
                });
                
                socket.on('bot_answer', (data) => {
                    debug('Bot cevap verdi: ' + data.answer);
                    match.opponentAnswer = data.answer;
                    if (match.hasAnswered) evaluateRound();
                });
                
                socket.on('pot_raised', (data) => {
                    debug('Pot arttırıldı: +' + data.amount);
                    match.pot += data.amount * 2;
                    DOM.potAmount.textContent = match.pot;
                });
                
                socket.on('balance_updated', (data) => {
                    if (data.coins !== undefined) {
                        user.coins = data.coins;
                        DOM.coins.textContent = user.coins;
                    }
                });
                
                socket.on('queue_error', (data) => {
                    debug('KUYRUK HATASI: ' + JSON.stringify(data));
                    updateStatus('Hata: ' + data.error);
                    if (data.error && (data.error.includes('bakiye') || data.error.includes('Yetersiz'))) {
                        DOM.insufficientBox.style.display = 'flex';
                    } else {
                        // Diğer hatalarda ana sayfaya dön
                        setTimeout(() => window.location.replace('oyun.html'), 3000);
                    }
                });
                
                socket.on('raise_error', (data) => {
                    updateStatus(data.error);
                    DOM.raiseContainer.classList.add('active');
                });
                
                socket.on('opponent_item', (data) => {
                    debug('Rakip eşya kullandı: ' + data.item);
                    if (data.item === 'bomb') {
                        document.getElementById('main-game-wrapper').classList.add('smoke-blurred');
                        setTimeout(() => document.getElementById('main-game-wrapper').classList.remove('smoke-blurred'), 5000);
                    } else if (data.item === 'time') {
                        match.timeLeft += 10;
                        DOM.timerDigital.textContent = match.timeLeft;
                    }
                });
                
                socket.on('opponent_taunt', (data) => displayChatBubble(data.message, false));
                socket.on('bot_taunt', (data) => displayChatBubble(data.message, false));
                
                socket.on('opponent_disconnected', () => {
                    if (!match.gameOver) {
                        showGameOver(true, 'RAKİP KAÇTI! HÜKMEN KAZANDINIZ!', { isWin: true });
                    }
                });
            }

            async function fetchQuestion() {
                const res = await fetch(`${SERVER_URL}/api/get-question/super_league/${user.id}?lang=${match.lang}`, {
                    headers: { 'Authorization': `Bearer ${getAuthToken()}` }
                });
                return await res.json();
            }

            async function startMatch(q) {
                debug('Maç başlatılıyor...');
                match.roundActive = true;
                match.gameOver = false;
                
                DOM.matchingUI.style.display = 'none';
                DOM.questionUI.style.display = 'flex';
                DOM.chatTrigger.style.display = 'flex';
                
                try {
                    const potRes = await fetch(`${SERVER_URL}/api/get-match-pot/${match.id}`, {
                        headers: { 'Authorization': `Bearer ${getAuthToken()}` }
                    });
                    if (potRes.ok) {
                        const pData = await potRes.json();
                        match.pot = pData.pot;
                        DOM.potAmount.textContent = match.pot;
                    }
                } catch(e) { debug('Pot alınamadı: ' + e.message); }
                
                loadQuestion(q);
            }

            // ---------- Başlat ----------
            async function init() {
                debug('Uygulama başlatılıyor...');
                const token = getAuthToken();
                if (!token) {
                    debug('Token bulunamadı, giriş sayfasına yönlendiriliyor.');
                    window.location.replace('oyun.html');
                    return;
                }
                
                try {
                    const meRes = await fetch(`${SERVER_URL}/api/auth/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const meData = await meRes.json();
                    user.id = meData.user.id;
                    debug('Kullanıcı ID: ' + user.id);
                    
                    const userRes = await fetch(`${SERVER_URL}/api/user/${user.id}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const userData = await userRes.json();
                    user.nickname = userData.nickname;
                    user.coins = (userData.free_coins || 0) + (userData.paid_coins || 0);
                    user.score = userData.super_league_stats?.score || 0;
                    user.inventory = userData.inventory || { bomb:0, mask:0, time:0, joker:0 };
                    
                    DOM.coins.textContent = user.coins;
                    DOM.score.textContent = user.score;
                    debug('Kullanıcı bilgileri alındı. Coin: ' + user.coins);
                    
                    buildChatOptions();
                    buildRaiseButtons();
                    
                    setupSocket();
                } catch (e) {
                    debug('Başlatma hatası: ' + e.message);
                    updateStatus('Bağlantı hatası');
                    setTimeout(() => window.location.replace('oyun.html'), 2000);
                }
            }

            init();
        })();
    </script>
</body>
</html>
