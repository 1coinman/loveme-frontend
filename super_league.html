<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="icon" type="image/png" href="logo/LoveMe.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOVEME - SÜPER LİG</title>
    <script>
        if (window.history.replaceState) window.history.replaceState(null, null, "/");
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 80)) { e.preventDefault(); return false; }
        });
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <style>
        /* (CSS aynı kalacak, uzun olduğu için burada tekrar yazmıyorum, mevcut CSS'niz aynen kalsın) */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; touch-action: manipulation; }
        html, body { width: 100%; height: 100%; height: 100dvh; overflow: hidden !important; background-color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; position: fixed; top: 0; left: 0; right: 0; bottom: 0; transition: background-color 0.3s ease; overscroll-behavior: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-touch-callout: none; }
        img { pointer-events: none; }
        .game-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100%; justify-content: flex-start; align-items: center; padding: 10px 0 40px 0; overflow: hidden; touch-action: none; transition: filter 0.5s; }
        .smoke-blurred { filter: blur(6px) grayscale(50%); pointer-events: none; }
        .header-stats { width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px 0; z-index: 9505; position: relative; flex-shrink: 0; gap: 30px; }
        .coin-display { font-weight: 900; font-size: 22px; display: flex; align-items: center; gap: 8px; color: #000; transition: color 0.3s; z-index: 100; }
        .main-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 0; }
        #matching-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; text-align: center; }
        .logo-box { width: 80px; height: 80px; margin-bottom: 20px; background-color: #000; -webkit-mask: url('logo/loveme.svg') no-repeat center; mask: url('logo/loveme.svg') no-repeat center; -webkit-mask-size: contain; mask-size: contain; animation: elastic-glow 1.8s infinite ease-in-out; }
        @keyframes elastic-glow { 0%, 100% { transform: scale(1); background-color: #000; } 50% { transform: scale(1.25); background-color: #ff0000; } }
        .matching-status { font-weight: 900; font-size: 18px; color: #000; margin-bottom: 10px; }
        .opponent-info { font-weight: 700; font-size: 14px; color: #666; min-height: 20px; }
        #timer-wrapper { position: relative; display: flex; justify-content: center; align-items: center; }
        #timer-digital { font-family: 'Digital Numbers', sans-serif; font-size: 42px; font-weight: 900; color: #000; margin-bottom: 20px; transition: all 0.3s ease; }
        .timer-warning { color: #ff0000 !important; animation: timer-pulse 0.5s infinite alternate; }
        .timer-add-pulse { color: #28a745 !important; transform: scale(1.3); }
        @keyframes timer-pulse { from { transform: scale(1); } to { transform: scale(1.2); } }
        .time-float-anim { position: absolute; top: -30px; color: #28a745; font-size: 20px; font-weight: 900; animation: floatUpFade 1.2s forwards; pointer-events: none; z-index: 50; }
        @keyframes floatUpFade { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }
        
        /* Soru arayüzü geçiş animasyonu için opacity ve transition ekledik */
        #question-ui { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 320px; transition: opacity 0.5s ease; opacity: 1;}
        
        .q-text { font-size: 17px; font-weight: 800; text-align: center; margin-bottom: 20px; color: #000; transition: color 0.3s; padding: 0 15px; }
        .answers-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; padding: 0 20px; }
        .ans-container { position: relative; width: 100%; }
        .ans-btn { width: 100%; background: #fff; border: 2.5px solid #000; color: #000; padding: 12px 10px; font-size: 14px; font-weight: 800; cursor: pointer; transition: all 0.3s; min-height: 52px; display: flex; align-items: center; justify-content: center; text-align: center; word-wrap: break-word; line-height: 1.2; border-radius: 30px; }
        body.alarm-active { background-color: #ff0000; }
        body.alarm-active .coin-display, body.alarm-active .q-text, body.alarm-active #timer-digital { color: #fff !important; }
        body.alarm-active .ans-btn { border-color: #fff; background: transparent; color: #fff; }
        .ans-btn:not(.locked):hover { background: #f0f0f0; }
        .ans-btn.selected-black { background: #000 !important; color: #fff !important; border-color: #000 !important; }
        .ans-btn.correct { background: #28a745 !important; border-color: #28a745 !important; color: #fff !important; }
        .ans-btn.wrong { background: #dc3545 !important; border-color: #dc3545 !important; color: #fff !important; }
        .ans-btn.locked { pointer-events: none; }
        .choice-label { position: absolute; bottom: -12px; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; display: none; z-index: 5; }
        .label-you { background: #000; color: #fff; }
        .label-opponent { background: #ff0000; color: #fff; }
        body[dir="ltr"] .label-you { left: 10px; }
        body[dir="ltr"] .label-opponent { right: 10px; }
        body[dir="rtl"] .label-you { right: 10px; }
        body[dir="rtl"] .label-opponent { left: 10px; }
        #explanation-box { display: none; width: 100%; padding: 15px 25px; margin-top: 15px; text-align: center; color: #000; font-size: 13px; font-weight: 700; border-top: 1px dashed #ccc; }
        .pot-container { width: 100%; display: flex; justify-content: center; margin-top: 20px; z-index: 10; position: relative; }
        .pot-display { background: #000; color: #fff; padding: 8px 30px; border-radius: 30px; font-size: 15px; font-weight: 900; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        .pot-display.pot-updated { background: #28a745; transform: scale(1.3); }
        #raise-container { display: none; width: 100%; flex-direction: column; align-items: center; margin-top: 15px; gap: 10px; }
        .raise-title { font-size: 12px; font-weight: 900; text-transform: uppercase; color: #ff0000; animation: fade-in 0.5s; }
        .raise-grid { display: flex; gap: 10px; width: 100%; max-width: 300px; justify-content: center; }
        .raise-btn { flex: 1; background: #fff; color: #000; border: 2.5px solid #000; padding: 10px 0; font-size: 14px; font-weight: 900; cursor: pointer; transition: 0.2s; border-radius: 4px; opacity: 0; transform: translateY(30px); animation: slideUpElastic 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
        .raise-btn:nth-child(1) { animation-delay: 0.1s; }
        .raise-btn:nth-child(2) { animation-delay: 0.2s; }
        .raise-btn:nth-child(3) { animation-delay: 0.3s; }
        .raise-btn:nth-child(4) { animation-delay: 0.4s; }
        .raise-btn.closing { animation: slideDownFade 0.4s forwards !important; }
        @keyframes slideUpElastic { 0% { opacity: 0; transform: translateY(30px) scale(0.9); } 70% { transform: translateY(-5px) scale(1.05); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes slideDownFade { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(30px) scale(0.9); } }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .floating-text { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: 900; color: #28a745; text-transform: uppercase; opacity: 0; pointer-events: none; z-index: 50; white-space: nowrap; }
        .floating-text.show { animation: float-up-fade 2s ease-out forwards; }
        @keyframes float-up-fade { 0% { opacity: 0; transform: translate(-50%, 10px); } 20% { opacity: 1; transform: translate(-50%, 0); } 80% { opacity: 1; transform: translate(-50%, -15px); } 100% { opacity: 0; transform: translate(-50%, -25px); } }
        #result-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; opacity: 0; transition: opacity 0.5s ease; } /* Animasyon eklendi */
        #result-overlay.show { opacity: 1; }
        #insufficient-balance { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; color: #000; text-align: center; padding: 20px;}
        #insufficient-balance p { font-size: 14px; font-weight: 600; color: #666; margin-top: 10px; }
        .back-to-lobby-btn { margin-top: 30px; padding: 15px 30px; background: #000; color: #fff; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .sad-logo-wrapper { width: 120px; height: 120px; margin-bottom: 30px; background-color: #000; opacity: 0.7; -webkit-mask: url('logo/loveme.svg') no-repeat center; mask: url('logo/loveme.svg') no-repeat center; -webkit-mask-size: contain; mask-size: contain; animation: sad-wobble 3s infinite ease-in-out; }
        @keyframes sad-wobble { 0%, 100% { transform: translateY(0) scale(1); opacity: 0.7; } 50% { transform: translateY(15px) scale(0.95); opacity: 0.3; } }
        #bg-status-bar { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background-color: #000; color: #0f0; font-family: monospace; font-size: 11px; text-align: center; padding: 6px 0; z-index: 50; font-weight: bold; transition: all 0.3s; }
        #chat-trigger-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 160px; height: 35px; background-color: #000; color: #fff; border-top-left-radius: 20px; border-top-right-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; letter-spacing: 1px; cursor: pointer; z-index: 500; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: none; }
        #chat-menu-overlay { position: fixed; bottom: 0; left: 0; width: 100%; height: 40vh; max-height: 300px; background-color: #fff; z-index: 501; border-top: 3px solid #000; border-top-left-radius: 30px; border-top-right-radius: 30px; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 15px 15px 0 15px; box-shadow: 0 -10px 20px rgba(0,0,0,0.1); pointer-events: none; }
        #chat-menu-overlay.active { transform: translateY(0); pointer-events: auto; }
        .chat-close-handle { width: 40px; height: 5px; background: #ddd; border-radius: 3px; margin-bottom: 15px; cursor: pointer; flex-shrink: 0; }
        .chat-options-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; flex: 1; overflow-y: auto; padding-bottom: 25px; touch-action: pan-y !important; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; scrollbar-width: none; -ms-overflow-style: none; }
        .chat-options-grid::-webkit-scrollbar { display: none; }
        .chat-option-btn { flex-shrink: 0; min-height: 48px; background: transparent; border: none; font-size: clamp(14px, 4vw, 20px); font-weight: 900; color: #000; cursor: pointer; text-transform: uppercase; padding: 8px; transition: 0.2s; }
        .chat-option-btn:active { transform: scale(0.9); color: #ff0000; }
        #chat-bubbles-container { position: fixed; top: 0; right: 0; width: 220px; height: auto; min-height: 10px; pointer-events: none; z-index: 9999; display: flex; flex-direction: column; align-items: flex-end; margin: 0; padding: 0; overflow: hidden; }
        body[dir="rtl"] #chat-bubbles-container { right: auto; left: 0; align-items: flex-start; }
        .chat-bubble { padding: 8px 14px; font-size: 12px; font-weight: 900; line-height: 1.3; text-align: center; max-width: 100%; margin: 0; margin-bottom: 5px; border: 2.5px solid; transform-origin: top right; animation: bubble-pop 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.5s ease, background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease; }
        body[dir="rtl"] .chat-bubble { transform-origin: top left; }
        .bubble-me { background-color: #000; color: #fff; border-color: #000; border-bottom-left-radius: 18px; border-top-left-radius: 18px; border-bottom-right-radius: 18px; border-top-right-radius: 0; }
        body[dir="rtl"] .bubble-me { border-radius: 18px; border-top-left-radius: 0; }
        .bubble-me.pushed { background-color: #fff; color: #000; border-color: #000; }
        .bubble-opp { background-color: #ff0000; color: #fff; border-color: #ff0000; border-bottom-left-radius: 18px; border-top-left-radius: 18px; border-bottom-right-radius: 18px; border-top-right-radius: 0; }
        body[dir="rtl"] .bubble-opp { border-radius: 18px; border-top-left-radius: 0; }
        .bubble-opp.pushed { background-color: #fff; color: #ff0000; border-color: #ff0000; }
        .chat-bubble.fading { opacity: 0; transform: translateY(30px) scale(0.8); }
        @keyframes bubble-pop { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        #chat-bg-catcher { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; display: none; }
        #inventory-container { position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column-reverse; z-index: 9506; pointer-events: none; }
        .inv-wrapper { height: 0; margin-top: 0; opacity: 0; transform: scale(0); transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .inv-wrapper.active { height: 50px; margin-top: 15px; opacity: 1; transform: scale(1); pointer-events: auto; }
        .inv-btn { width: 50px; height: 50px; border-radius: 50%; background: #fff; color: #000; border: 2.5px solid #000; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; pointer-events: auto; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .inv-btn.use-pulse { animation: invUsePulse 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        @keyframes invUsePulse { 50% { transform: scale(1.3); background: #28a745; border-color: #28a745; color: #fff; } }
        .inv-badge { position: absolute; bottom: -4px; left: -4px; background: #000; color: #fff; border: 2px solid #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        @media (max-height: 650px) { .logo-box { width: 60px; height: 60px; margin-bottom: 10px; } #timer-digital { font-size: 32px; margin-bottom: 10px; } .q-text { font-size: 15px; margin-bottom: 10px; } .ans-btn { min-height: 44px; padding: 8px 10px; font-size: 13px; } .answers-grid { gap: 10px; } .coin-display { font-size: 18px; } .pot-display { font-size: 13px; padding: 6px 20px; } .raise-btn { padding: 6px 0; font-size: 12px; } }
        @media (max-width: 340px) { .q-text { font-size: 14px; } .ans-btn { font-size: 12px; } }

        /* --- YENİ PUAN ANİMASYONLARI --- */
        @keyframes scoreElasticWin {
            0% { transform: scale(1); color: #000; }
            40% { transform: scale(1.6); color: #28a745; }
            80% { transform: scale(0.9); color: #28a745; }
            100% { transform: scale(1); color: #000; }
        }
        @keyframes scoreElasticLose {
            0% { transform: scale(1); color: #000; }
            40% { transform: scale(1.6); color: #dc3545; }
            80% { transform: scale(0.9); color: #dc3545; }
            100% { transform: scale(1); color: #000; }
        }
        .score-anim-win { animation: scoreElasticWin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        .score-anim-lose { animation: scoreElasticLose 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55); }

        .score-float {
            position: absolute;
            font-size: 20px;
            font-weight: 900;
            pointer-events: none;
            opacity: 0;
            z-index: 200;
            text-shadow: 0px 2px 4px rgba(0,0,0,0.3);
        }
        @keyframes floatUpGreen {
            0% { opacity: 0; transform: translateY(0) scale(0.8); }
            20% { opacity: 1; transform: translateY(-15px) scale(1.2); }
            80% { opacity: 1; transform: translateY(-35px) scale(1); }
            100% { opacity: 0; transform: translateY(-45px) scale(0.8); }
        }
        @keyframes floatDownRed {
            0% { opacity: 0; transform: translateY(0) scale(0.8); }
            20% { opacity: 1; transform: translateY(15px) scale(1.2); }
            80% { opacity: 1; transform: translateY(35px) scale(1); }
            100% { opacity: 0; transform: translateY(45px) scale(0.8); }
        }
        .float-up-win { color: #28a745; animation: floatUpGreen 1.5s forwards; }
        .float-down-lose { color: #dc3545; animation: floatDownRed 1.5s forwards; }

        /* --- YENİ AÇIKLAMA (EXPLANATION) OVERLAY ANİMASYONU --- */
        #explanation-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 9000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .exp-oval-box {
            background: #fff;
            border: 3.5px solid #000;
            border-radius: 40px;
            padding: 30px 25px;
            width: 85%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            opacity: 0;
            transform: translateY(50px) scale(0.9);
        }
        #exp-oval-title { color: #28a745; font-weight: 900; font-size: 18px; margin-bottom: 12px; }
        #exp-oval-text { color: #000; font-size: 15px; font-weight: 700; line-height: 1.4; }
        
        .exp-slide-in {
            animation: expSlideIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
        }
        .exp-slide-out {
            animation: expSlideOut 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
        }
        @keyframes expSlideIn {
            0% { transform: translateY(50px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes expSlideOut {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(0.9); opacity: 0; } /* YUKARI ÇIKIŞ MESAFESİ ARTIRILDI */
        }
    </style>
</head>
<body dir="ltr" ondragstart="return false" onselectstart="return false">

<div id="insufficient-balance">
    <div class="ui-trans" data-key="insufficient">YETERSİZ BAKİYE</div>
    <p class="ui-trans" data-key="return_lobby" style="color: #666; font-size: 14px; margin-top: 10px;">Markete yönlendiriliyorsunuz...</p>
    <button class="back-to-lobby-btn" onclick="window.location.replace('window.goToPage(3)')">MARKETE GİT</button>
</div>

<div id="result-overlay">

</div>

                    <button class="raise-btn" data-val="75"><i class="fa-solid fa-coins"></i> 75</button>
                    <button class="raise-btn" data-val="100"><i class="fa-solid fa-coins"></i> 100</button>

<div id="chat-trigger-bar" onclick="toggleChatMenu()" class="ui-trans" data-key="taunt_btn">RAKİBİNİ KIZDIR</div>
<div id="chat-bg-catcher" onclick="toggleChatMenu()"></div>
<div id="chat-menu-overlay">

    async function revealSelections(myC, oppC) {
        try {
            showDebug(`👉 revealSelections tetiklendi (Siz: ${myC}, Rakip: ${oppC})`);

            // Rakibin "RAKİP" etiketini göster

            // Butonları doğru/yanlış renklerine boya
            document.querySelectorAll('.ans-btn').forEach((btn, idx) => {
                if (idx === correctIdx) {
                    btn.classList.add('correct');
                    btn.classList.remove('selected-black');
                } else if (idx === myC || idx === oppC) {
                    btn.classList.add('wrong');
                    btn.classList.remove('selected-black');
                }
            });

            // ANLIK PUAN ANİMASYONU
            const amICorrect = (myC === correctIdx);

                animateScore(3, true);
            } else if (myC !== -1) {

                expOvalBox.classList.remove('exp-slide-in');

    async function finishFlow(myC, oppC) {
        try {
            const correctIdx = activeQuestion.c;
            const amICorrect = (myC === correctIdx);
            const isOppCorrect = (oppC === correctIdx);
            
            let isWin = false;
            let isTie = false;
            
            if (amICorrect && !isOppCorrect) {
                isWin = true; // Sadece sen bildin
            } else if (!amICorrect && isOppCorrect) {
                isWin = false; // Sadece rakip bildi
            } else if (amICorrect && isOppCorrect) {
                isTie = true; // İkiniz de bildiniz (Berabere)
            } else {
                isWin = false; // İkiniz de yanlış bildiniz (Kaybettiniz)
            }

            if (isWin) {
                showResult(true);
            } else if (isTie) {
                showResult(null, "BERABERE!");
            } else {
                showResult(false);
            }
        } catch (err) {
            showDebug("❌ finishFlow HATASI: " + err.message);
        }
    }

            // Reflow tetikle (animasyonun üst üste çalışabilmesi için)
            scoreSpan.classList.remove('score-anim-win', 'score-anim-lose');
            void scoreSpan.offsetWidth; 
            
            // Elastik renk değişimini başlat
            scoreSpan.classList.add(isWin ? 'score-anim-win' : 'score-anim-lose');
            
            // Yukarı/Aşağı kayan yazıyı oluştur
            const floatEl = document.createElement('div');
            floatEl.className = 'score-float ' + (isWin ? 'float-up-win' : 'float-down-lose');

            scoreContainer.style.position = 'relative';
            floatEl.style.left = '35px'; // Kupa ikonunun yanına hizalama
            floatEl.style.top = '0px';
            
            scoreContainer.appendChild(floatEl);
            
            // 1.5 saniye sonra kayan yazıyı DOM'dan temizle
            setTimeout(() => {
                if(floatEl.parentNode) floatEl.remove();
                scoreSpan.classList.remove('score-anim-win', 'score-anim-lose');
            }, 1500);
        } catch (err) {
            showDebug("❌ animateScore HATASI: " + err.message);
        }
    }

            showDebug("YENİ TUR BAŞLIYOR...");
            isGameOver = false; 
            
            // Ekranları temizle ve bekleme moduna geç
            const overlay = document.getElementById('result-overlay');
            overlay.classList.remove('show');
            setTimeout(() => { overlay.style.display = 'none'; }, 500); // Overlay'in yumuşak sönümlenmesi
            
            document.getElementById('res-dynamic-content').innerHTML = '';
            document.getElementById('question-ui').style.display = 'none';
            document.getElementById('matching-status-text').innerText = "YENİ SORU HAZIRLANIYOR...";
            document.getElementById('matching-ui').style.display = 'flex';
            
            // Potu ve arayüzü sıfırla
            currentPot = 10;
            document.getElementById('pot-amount').innerText = currentPot;
            
            // Envanteri yeni tura uygun hale getir
            renderInventory(); 

            if (isBotDuel) {
                try {
                    const q = await fetchQuestionFromSupabase();
                    q.correct_option = q.c; // SERVER.JS HATASINI ENGELLEYEN KOD
                    socket.emit('bot_start_round', { matchId: currentMatchId, question: q, difficulty: q.difficulty, currentPot: 10 });
                    await prepareAndPlay(q);
                } catch(err) {
                    showDebug("Soru alınamadı, lobiye dönülüyor: " + err.message);
                    resetGame();
                }
            } else {
                // Gerçek oyuncu düellosunda sadece Kurucu (player1) soruyu çeker ve dağıtır.
                if (myPlayerKey === 'player1') {
                    try {
                        const q = await fetchQuestionFromSupabase();
                        socket.emit('share_question', { matchId: currentMatchId, question: q });
                        await prepareAndPlay(q);
                    } catch(err) {
                        showDebug("Soru alınamadı, lobiye dönülüyor: " + err.message);
                        resetGame();
                    }
                }
                // Player 2 backend'den 'receive_question' eventini beklemeye devam edecek.
            }
        } catch (err) {
            showDebug("❌ startNextRound HATASI: " + err.message);
        }
    }

    function showResult(win, customText) {
        try {
            isGameOver = true;
            const overlay = document.getElementById('result-overlay');
            const resText = document.getElementById('res-text');
            const resDynamic = document.getElementById('res-dynamic-content');
            
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.classList.add('show'); }, 50); // Yumuşak beliriş
            
            let wonCoins = 0;
            let scoreChange = 0;
            
            if (win === true) {
                resText.innerHTML = customText || getRandomItem(activeWinTexts);
                resText.style.color = '#28a745';
                resDynamic.innerHTML = '';
                wonCoins = currentPot;
                scoreChange = 3;
                triggerFireworks(); // Kazanınca havai fişek patlat
            } else if (win === false) {
                resText.innerHTML = customText || getRandomItem(activeLoseTexts);
                resText.style.color = '#dc3545';
                resDynamic.innerHTML = '<div class="sad-logo-wrapper"></div>'; // Üzgün logo efekti
                wonCoins = 0;
                scoreChange = -1;
            } else {
                resText.innerHTML = customText; // Berabere
                resText.style.color = '#000';
                resDynamic.innerHTML = '';
                wonCoins = Math.floor(currentPot / 2); // Beraberede pot ikiye bölünür
                scoreChange = 0; // Beraberlikte puan VERİLMEZ
            }
            
            // Kazanılan/Kaybedilen veriyi veritabanına işle
            if (wonCoins > 0 || scoreChange !== 0) {
                fetch(`${SERVER_URL}/api/user/win`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getAuthToken()}` },
                    body: JSON.stringify({ 
                        uid: userDocId, 
                        coins: wonCoins, 
                        score: scoreChange,
                        isWin: win 
                    })
                }).catch(e => showDebug("Kayıt Hatası: " + e.message));
            }

            // 4 Saniye (okuma ve animasyon süresi) sonra YENİ TURA GEÇİŞ YAP
            setTimeout(() => {
                if (!hasAbandoned) { // Eğer bir taraf maçı terk etmediyse
                    startNextRound(); 
                } else {
                    resetGame(); // Terk etme durumu varsa lobiye at
                }
            }, 4000);
        } catch (err) {
            showDebug("❌ showResult HATASI: " + err.message);
        }
    }

    async function handleAbandon(isOpponent = false) {
        if (isGameOver) return;
        hasAbandoned = true;
        clearInterval(timerInterval);
        
        if (isOpponent) {
            showResult(true, activeAbandonWinText); // Rakip çıkarsa sen kazanırsın
        } else {
            showResult(false, "MAÇTAN AYRILDINIZ!");
        }
    }

    function resetGame() {
        window.location.replace('oyun.html');
    }

    // ========== SORU ÇEKME VE LOGLAMA ==========
    async function fetchQuestionFromSupabase() {
        try {
            showDebug("1. fetchQuestionFromSupabase BAŞLADI");
            const token = getAuthToken();
            if (!token) {
                showDebug("❌ HATA: Token yok!");
                throw new Error("Token yok");
            }
            
            showDebug("2. Sunucuya /get-question isteği atılıyor...");
            const res = await fetch(`${SERVER_URL}/api/get-question/super_league/${userDocId}`, {
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
            });
            
            if (!res.ok) {
                showDebug(`❌ HATA: Sunucu HTTP ${res.status} döndü`);
                throw new Error(`HTTP ${res.status}`);
            }
            
            const data = await res.json();
            showDebug("3. Sunucudan veri BAŞARIYLA geldi. Soru ID: " + data.id);
            
            return {
                id: data.id,
                q: data.question_text,
                a: data.options,
                c: data.correct_option,
                expl: data.explanation,
                difficulty: data.difficulty || 1,
                lang: 'tr'
            };
        } catch (err) {
            showDebug("❌ fetchQuestionFromSupabase HATASI: " + err.message);
            throw err;
        }
    }

    async function translateQuestion(qData, targetLangName) { /* aynı */ }

    // ========== OYUNU BAŞLATMA VE LOGLAMA ==========
    async function prepareAndPlay(incomingQ) {
        showDebug("4. prepareAndPlay BAŞLADI");
        try {
            if (!incomingQ) {
                showDebug("❌ HATA: incomingQ (Soru objesi) BOŞ GELDİ!");
                return;
            }
            
            let finalQ = incomingQ;
            
            if (finalQ.lang !== userLangCode) {
                showDebug("5. Çeviri yapılıyor...");
                finalQ = await translateQuestion(finalQ, userLangName);
                showDebug("6. Çeviri bitti.");
            }
            
            isMatchPlaying = true;
            document.getElementById('matching-ui').style.display = 'none';
            document.getElementById('question-ui').style.display = 'flex';
            document.getElementById('chat-trigger-bar').style.display = 'flex';
            renderInventory();
            
            showDebug("7. loadQuestion(finalQ) fonksiyonu çağrılıyor...");
            
            if (typeof loadQuestion === 'function') {
                try {
                    loadQuestion(finalQ);
                    showDebug("8. ✅ loadQuestion BAŞARIYLA ÇALIŞTI (Şıkların görünmesi lazım)");
                } catch (lqError) {
                    showDebug("❌ HATA (loadQuestion İÇİNDE): " + lqError.message);
                }
            } else {
                showDebug("❌ HATA: loadQuestion fonksiyonu BULUNAMADI!");
            }
            
        } catch(err) {
            showDebug("❌ HATA (prepareAndPlay içinde): " + err.message);
        }
    }

    function setupSocketListeners() {
        socket.on('match_found', async (data) => {
            showDebug("0. GERÇEK OYUNCU İLE EŞLEŞTİ.");
            matchmakingResolved = true;
            if(countdownInterval) clearInterval(countdownInterval);
            document.getElementById('matching-status-text').innerText = t.preparing;
            currentMatchId = data.matchId;
            myPlayerKey = data.role;
            opponentPlayerKey = myPlayerKey === 'player1' ? 'player2' : 'player1';
            const oppData = data[opponentPlayerKey];
            document.getElementById('match-timer').innerText = oppData.nickname;
            if(myPlayerKey === 'player1') {
                try {
                    const q = await fetchQuestionFromSupabase();
                    socket.emit('share_question', { matchId: currentMatchId, question: q });
                    await prepareAndPlay(q);
                } catch(err) {
                    showDebug("❌ KRİTİK HATA GERÇEK MAÇ BAŞLARKEN: " + err.message);
                    document.getElementById('matching-status-text').innerText = "SORU ALINAMADI! Lobiye dönülüyor...";
                    setTimeout(() => window.location.replace("oyun.html"), 4000);
                }
            }
        });
        socket.on('receive_question', async (data) => {
            showDebug("0. RAKİPTEN SORU GELDİ.");
            if(myPlayerKey === 'player2') await prepareAndPlay(data.question);
        });
        socket.on('match_found_with_bot', async (data) => {
            showDebug("0. BOT İLE EŞLEŞTİ. Soru isteniyor...");
            matchmakingResolved = true;
            if(countdownInterval) clearInterval(countdownInterval);
            document.getElementById('matching-status-text').innerText = t.preparing;
            isBotDuel = true;
            currentMatchId = data.matchId;
            document.getElementById('match-timer').innerText = data.bot.nickname;
            try {
                const q = await fetchQuestionFromSupabase();
                q.correct_option = q.c; // SERVER.JS HATASINI ENGELLEYEN KOD
                socket.emit('bot_start_round', { matchId: currentMatchId, question: q, difficulty: q.difficulty, currentPot: 10 });
                await prepareAndPlay(q);
            } catch(err) {
                showDebug("❌ KRİTİK HATA BOT MAÇI BAŞLARKEN: " + err.message);
                document.getElementById('matching-status-text').innerText = "SORU ALINAMADI! Lobiye dönülüyor...";
                setTimeout(() => window.location.replace("oyun.html"), 4000);
            }
        });
        socket.on('opponent_answer', (data) => { oppChoiceIdx = data.choice; checkRoundEnd(); });
        socket.on('bot_answer', (data) => { 
            // BOT CEVABI HATA ÖNLEYİCİ (Güvenli atanma)
            oppChoiceIdx = (data.answer !== undefined && data.answer !== null) ? data.answer : Math.floor(Math.random() * 4); 
            checkRoundEnd(); 
        });
        socket.on('opponent_raise', (data) => { currentPot += data.amount * 2; document.getElementById('pot-amount').innerText = currentPot; triggerRaiseAnimation(data.amount * 2); });
        socket.on('bot_raise_pot', (data) => { currentPot += data.amount * 2; document.getElementById('pot-amount').innerText = currentPot; triggerRaiseAnimation(data.amount * 2); });
        socket.on('opponent_item', (data) => applyOpponentItem(data.item));
        socket.on('bot_use_item', (data) => applyOpponentItem(data.item));
        socket.on('opponent_taunt', (data) => displayChatBubble(data.message, false));
        socket.on('bot_taunt', (data) => displayChatBubble(data.message, false));
        socket.on('opponent_disconnected', () => handleAbandon(true));
    }

    // --- YENİ: DİNAMİK MATCHMAKING VE BAKİYE DÜŞÜMÜ ---
    async function startMatchmaking() {
        matchmakingResolved = false;
        document.getElementById('matching-status-text').innerText = t.searching;
        document.getElementById('match-timer').innerHTML = `<span class="ui-trans" data-key="waiting">${t.waiting}</span> <span id="timer-sec">(8s)</span>`;
        const token = getAuthToken();
        
        try {
            await fetch(`${SERVER_URL}/api/user/deduct`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ uid: userDocId, amount: dynamicEntryFeeStandard }) // DİNAMİK DEĞER
            });
            userCoins -= dynamicEntryFeeStandard;
            document.getElementById('my-coins').innerText = userCoins;
        } catch(e) {}

        socket.emit('join_queue', { mode: 'super_league', uid: userDocId, nickname: myNickname, country: 'TR' });
        let waitSec = 8;
        countdownInterval = setInterval(() => {
            if (matchmakingResolved) { clearInterval(countdownInterval); return; }
            waitSec--;
            if (waitSec > 0) document.getElementById('match-timer').innerHTML = `<span class="ui-trans" data-key="waiting">${t.waiting}</span> <span id="timer-sec">(${waitSec}s)</span>`;
        }, 1000);
    }

    // --- YENİ: AYARLARI ÇEKME VE DİNAMİK BAŞLATMA ---
    async function init() {
        const statusEl = document.getElementById('matching-status-text');
        statusEl.innerText = "TOKEN KONTROL EDİLİYOR...";
        let token = getAuthToken();
        if (!token) {
            statusEl.innerText = "HATA: TOKEN BULUNAMADI! Lobiye yönlendiriliyorsunuz...";
            setTimeout(() => window.location.replace("oyun.html"), 3000);
            return;
        }
        statusEl.innerText = "SUNUCUYA BAĞLANILIYOR...";
        try {
            // 1. Ayarları Çek
            const settingsRes = await fetch(`${SERVER_URL}/api/game-settings`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (settingsRes.ok) {
                const settingsData = await settingsRes.json();
                const slMode = settingsData.game_modes.find(m => m.id === 'super_league');
                if (slMode) {
                    dynamicEntryFeeFirstTime = slMode.entry_fee_first_time;
                    dynamicEntryFeeStandard = slMode.entry_fee_standard;
                }
            }

            // 2. Kullanıcıyı Çek
            const meRes = await fetch(`${SERVER_URL}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!meRes.ok) throw new Error("Auth başarısız");
            const meData = await meRes.json();
            userDocId = meData.user.id;
            
            const userRes = await fetch(`${SERVER_URL}/api/user/${userDocId}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const userData = await userRes.json();
            myNickname = userData.nickname;
            const freeCoins = Number(userData.free_coins) || 0;
            const paidCoins = Number(userData.paid_coins) || Number(userData.coins) || 0;
            userCoins = freeCoins + paidCoins;
            document.getElementById('my-coins').innerText = userCoins;
            document.getElementById('my-score').innerText = userData.super_league_stats?.score || 0;
            
            const inv = userData.inventory || {};
            myInventory = { bomb: inv.bomb || 0, mask: inv.mask || 0, time: inv.time || 0, joker: inv.joker || 0 };
            renderInventory();

            // 3. Dinamik Ücret Kontrolü
            const needsEntryFee = !userData.has_entered_super_league;
            const requiredCoins = needsEntryFee ? (dynamicEntryFeeFirstTime + dynamicEntryFeeStandard) : dynamicEntryFeeStandard;
            
            if (userCoins < requiredCoins) {
                // Sadece Yetersiz Bakiye ve Markete Yönlendirme (Uzun bilgi kaldırıldı)
                document.getElementById('insufficient-balance').style.display = 'flex';
                setTimeout(() => window.location.replace("oyun.html#market"), 3000);
                return;
            }
            
            // 4. Lige Dinamik Giriş Bedeli Kesimi (İlk Giriş)
            if (needsEntryFee) {
                const enterRes = await fetch(`${SERVER_URL}/api/league/enter`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
                    body: JSON.stringify({ uid: userDocId, fee: dynamicEntryFeeFirstTime }) // Eğer server.js destekliyorsa dinamik bedeli gönder
                });
                if (!enterRes.ok) throw new Error("Lige giriş başarısız");
                userCoins -= dynamicEntryFeeFirstTime;
                document.getElementById('my-coins').innerText = userCoins;
            }

            document.querySelectorAll('.raise-btn').forEach(btn => { btn.onclick = () => window.raiseBet(parseInt(btn.getAttribute('data-val'))); });
            socket = io(SERVER_URL);
            updateStatus("sys_conn");
            setupSocketListeners();
            startMatchmaking();
            
        } catch (error) {
            statusEl.innerText = "SİSTEM HATASI: " + error.message;
        }
    }
    init();
</script>
