<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOVEME - SÜPER LİG</title>
    <link rel="icon" type="image/png" href="logo/LoveMe.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* ... (stiller aynı, ek olarak debug konsolu için) ... */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { width: 100%; height: 100dvh; overflow: hidden; background: #e0e5ec; color: #55595c; position: fixed; top: 0; left: 0; transition: background-color 0.3s; touch-action: none; }
        /* ... diğer stiller aynen ... */
        #debug-console { position: fixed; bottom: 50px; left: 0; width: 100%; background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 11px; padding: 8px; z-index: 100000; max-height: 120px; overflow-y: auto; display: block; }
    </style>
</head>
<body dir="ltr">
    <div id="bg-status-bar" style="display:none; position:fixed; bottom:0; left:0; width:100%; background:#55595c; color:#6fb98f; font-family:monospace; font-size:11px; text-align:center; padding:6px 0; z-index:50;"></div>
    <div id="debug-console">🟢 Sistem başlatılıyor...</div>

    <div id="insufficient-balance" style="display:none;"><div class="insufficient-box"><p>YETERSİZ BAKİYE</p><button class="back-to-lobby-btn" onclick="window.location.replace('oyun.html#market')">MARKETE GİT</button></div></div>
    <div id="result-overlay"><div class="modern-box"><div id="res-dynamic-content"></div><div id="res-text" style="font-size:15px; font-weight:900; margin-top:20px;"></div></div></div>
    <div id="inventory-container"></div>
    <div id="explanation-overlay" style="display:none;"><div class="exp-oval-box"><div id="exp-oval-title" style="color:#6fb98f;"></div><div id="exp-oval-text"></div></div></div>

    <div class="game-wrapper" id="main-game-wrapper">
        <!-- ... header, main-stage aynı ... -->
        <div class="header-stats"><div class="coin-display"><i class="fa-solid fa-coins"></i><span id="my-coins">...</span></div><div class="coin-display"><i class="fa-solid fa-trophy"></i><span id="my-score">...</span></div></div>
        <div class="main-stage">
            <div id="matching-ui"><div class="milk-ripple-container"><div class="milk-wave milk-wave-1"></div><div class="milk-wave milk-wave-2"></div><div class="milk-wave milk-wave-3"></div><div class="logo-box"></div><div class="matching-status" id="matching-status-text">SİSTEM BAŞLATILIYOR</div><div class="opponent-info" id="match-timer">BEKLENİYOR...</div></div></div>
            <div id="question-ui"><div id="timer-wrapper"><div id="timer-digital">20</div></div><div class="q-text" id="q-text"></div><div class="answers-grid" id="ans-container"></div><div id="raise-container"><div class="raise-title">BAHSİ ARTTIR</div><div class="raise-grid" id="raise-buttons"></div></div><div class="pot-container"><div id="waiting-opponent-alert">RAKİP CEVABI BEKLENİYOR</div><div class="pot-display" id="pot-display">POT: <span id="pot-amount">...</span></div></div></div>
        </div>
    </div>
    <div id="chat-trigger-bar">RAKİBİNİ KIZDIR</div>
    <div id="chat-bg-catcher" onclick="toggleChatMenu()"></div>
    <div id="chat-menu-overlay"><div class="chat-close-handle" onclick="toggleChatMenu()"></div><div class="chat-options-grid" id="chat-options"></div></div>
    <div id="chat-bubbles-container"></div>

    <script>
        (function(){
            "use strict";

            // Debug
            const debugEl = document.getElementById('debug-console');
            function debug(msg, isError = false) {
                console.log('[DEBUG]', msg);
                const line = document.createElement('div');
                line.textContent = (isError ? '🔴 ' : '🟢 ') + msg;
                debugEl.appendChild(line);
                debugEl.scrollTop = debugEl.scrollHeight;
                if (debugEl.children.length > 15) debugEl.removeChild(debugEl.children[0]);
            }

            const SERVER_URL = 'https://loveme-backend-6421.onrender.com';
            const VALID_RAISE_AMOUNTS = [20, 50, 75, 100];
            const CHAT_MESSAGES = {
                tr: ['Fazla yavaşsın!', 'Sadece şanstı!', 'Ağlamak yok!', 'Korktun mu?', 'Başarılar dilerim!'],
                en: ['Too slow!', 'Just lucky!', 'No crying!', 'Are you scared?', 'Good luck!']
            };
            
            let socket = null;
            let user = { id: null, nickname: null, coins: 0, score: 0, inventory: { bomb:0, mask:0, time:0, joker:0 } };
            let match = {
                id: null, isBot: false, lang: 'tr', pot: 0,
                myRole: null, opponent: null,
                currentQuestion: null,
                myAnswer: null, opponentAnswer: null,
                roundActive: false, gameOver: false, hasAnswered: false, isEvaluating: false,
                timer: null, timeLeft: 20,
                raiseTimeout: null
            };
            
            const DOM = {
                coins: document.getElementById('my-coins'), score: document.getElementById('my-score'),
                matchingUI: document.getElementById('matching-ui'), questionUI: document.getElementById('question-ui'),
                qText: document.getElementById('q-text'), ansContainer: document.getElementById('ans-container'),
                timerDigital: document.getElementById('timer-digital'), potAmount: document.getElementById('pot-amount'),
                waitingAlert: document.getElementById('waiting-opponent-alert'), raiseContainer: document.getElementById('raise-container'),
                raiseButtons: document.getElementById('raise-buttons'), resultOverlay: document.getElementById('result-overlay'),
                resText: document.getElementById('res-text'), resDynamic: document.getElementById('res-dynamic-content'),
                insufficientBox: document.getElementById('insufficient-balance'), statusBar: document.getElementById('bg-status-bar'),
                chatTrigger: document.getElementById('chat-trigger-bar'), chatMenu: document.getElementById('chat-menu-overlay'),
                chatBg: document.getElementById('chat-bg-catcher'), chatOptions: document.getElementById('chat-options'),
                bubblesContainer: document.getElementById('chat-bubbles-container'), expOverlay: document.getElementById('explanation-overlay'),
                expTitle: document.getElementById('exp-oval-title'), expText: document.getElementById('exp-oval-text'),
                matchingStatus: document.getElementById('matching-status-text'), matchTimerText: document.getElementById('match-timer')
            };

            const lang = (navigator.language || 'en').split('-')[0];
            const t = {
                tr: { searching: 'RAKİP ARANIYOR', waiting: 'BEKLENİYOR', pot: 'POT', you: 'SİZ', opp: 'RAKİP', correct: 'DOĞRU', insufficient: 'YETERSİZ BAKİYE', raise_title: 'BAHSİ ARTTIR', preparing: 'ARENA HAZIRLANIYOR', sys_start: 'SİSTEM BAŞLATILIYOR', opponent_waiting: 'RAKİP CEVABI BEKLENİYOR' },
                en: { searching: 'SEARCHING', waiting: 'WAITING', pot: 'POT', you: 'YOU', opp: 'OPPONENT', correct: 'CORRECT', insufficient: 'INSUFFICIENT BALANCE', raise_title: 'RAISE BET', preparing: 'PREPARING ARENA', sys_start: 'SYSTEM STARTING', opponent_waiting: 'WAITING FOR OPPONENT' }
            }[lang] || { searching: 'SEARCHING', waiting: 'WAITING', pot: 'POT', you: 'YOU', opp: 'OPPONENT', correct: 'CORRECT', insufficient: 'INSUFFICIENT BALANCE', raise_title: 'RAISE BET', preparing: 'PREPARING ARENA', sys_start: 'SYSTEM STARTING', opponent_waiting: 'WAITING FOR OPPONENT' };
            
            function getAuthToken() {
                return localStorage.getItem('loveme_token') || localStorage.getItem('access_token') || localStorage.getItem('token');
            }
            function updateStatus(msg) { DOM.statusBar.textContent = msg; DOM.statusBar.style.display = 'block'; setTimeout(() => DOM.statusBar.style.display = 'none', 5000); }

            // Queue timeout (20 saniye)
            let queueTimeout = null;
            let queueCountdown = null;

            function resetToMatching() {
                debug('Yeni eşleşme aranıyor...');
                match.id = null; match.roundActive = false;
                DOM.questionUI.style.display = 'none'; DOM.matchingUI.style.display = 'flex';
                DOM.chatTrigger.style.display = 'none';
                DOM.matchingStatus.textContent = t.searching;
                DOM.matchTimerText.textContent = t.waiting;
                
                if (queueTimeout) clearTimeout(queueTimeout);
                if (queueCountdown) clearInterval(queueCountdown);
                
                let secondsLeft = 20;
                queueCountdown = setInterval(() => {
                    secondsLeft--;
                    DOM.matchTimerText.textContent = `${t.waiting} (${secondsLeft}s)`;
                    if (secondsLeft <= 0) clearInterval(queueCountdown);
                }, 1000);
                
                queueTimeout = setTimeout(() => {
                    debug('Eşleşme zaman aşımı (20 saniye), ana sayfaya dönülüyor.', true);
                    updateStatus('Eşleşme bulunamadı');
                    clearInterval(queueCountdown);
                    setTimeout(() => window.location.replace('oyun.html'), 2000);
                }, 20000);
                
                socket.emit('join_queue', { mode: 'super_league', uid: user.id, nickname: user.nickname, country: 'TR', lang });
            }

            function setupSocket() {
                socket = io(SERVER_URL, { transports: ['websocket'], reconnectionAttempts: 3, timeout: 10000 });
                socket.on('connect', () => {
                    debug('Socket bağlandı, ID: ' + socket.id);
                    if (user.id) {
                        debug('Kuyruğa katılıyor: ' + user.nickname);
                        resetToMatching();
                    }
                });
                socket.on('connect_error', (err) => { debug('Bağlantı hatası: ' + err.message, true); setTimeout(() => window.location.replace('oyun.html'), 3000); });
                socket.on('disconnect', (reason) => { debug('Bağlantı koptu: ' + reason, true); if (!match.gameOver) setTimeout(() => window.location.replace('oyun.html'), 3000); });
                
                socket.on('match_found', async (data) => {
                    clearTimeout(queueTimeout); clearInterval(queueCountdown);
                    debug('Eşleşme bulundu: ' + data.matchId);
                    match.id = data.matchId; match.myRole = data.role; match.lang = data.lang || lang; match.isBot = false;
                    match.opponent = data.role === 'player1' ? data.player2 : data.player1;
                    DOM.matchingStatus.textContent = t.preparing;
                    DOM.matchTimerText.textContent = match.opponent.nickname;
                    if (data.role === 'player1') { const q = await fetchQuestion(); socket.emit('share_question', { matchId: match.id, question: q }); startMatch(q); }
                });
                
                socket.on('match_found_with_bot', async (data) => {
                    clearTimeout(queueTimeout); clearInterval(queueCountdown);
                    debug('Bot eşleşmesi: ' + data.matchId);
                    match.id = data.matchId; match.isBot = true; match.lang = data.lang || lang; match.opponent = data.bot;
                    DOM.matchingStatus.textContent = t.preparing;
                    DOM.matchTimerText.textContent = data.bot.nickname;
                    const q = await fetchQuestion();
                    socket.emit('bot_start_round', { matchId: match.id, questionId: q.id, difficulty: q.difficulty });
                    startMatch(q);
                });
                
                socket.on('queue_error', (data) => {
                    clearTimeout(queueTimeout); clearInterval(queueCountdown);
                    debug('KUYRUK HATASI: ' + JSON.stringify(data), true);
                    updateStatus('Hata: ' + data.error);
                    if (data.error && (data.error.includes('bakiye') || data.error.includes('Yetersiz'))) DOM.insufficientBox.style.display = 'flex';
                    else setTimeout(() => window.location.replace('oyun.html'), 3000);
                });

                // Diğer eventler aynı (opponent_answer, bot_answer, pot_raised, vs.)
                socket.on('opponent_answer', (data) => { match.opponentAnswer = data.choice; if (match.hasAnswered) evaluateRound(); });
                socket.on('bot_answer', (data) => { match.opponentAnswer = data.answer; if (match.hasAnswered) evaluateRound(); });
                socket.on('pot_raised', (data) => { match.pot += data.amount * 2; DOM.potAmount.textContent = match.pot; });
                socket.on('balance_updated', (data) => { if (data.coins !== undefined) { user.coins = data.coins; DOM.coins.textContent = user.coins; } });
                socket.on('raise_error', (data) => { updateStatus(data.error); DOM.raiseContainer.classList.add('active'); });
                socket.on('opponent_item', (data) => { if (data.item === 'bomb') { document.getElementById('main-game-wrapper').classList.add('smoke-blurred'); setTimeout(() => document.getElementById('main-game-wrapper').classList.remove('smoke-blurred'), 5000); } else if (data.item === 'time') { match.timeLeft += 10; DOM.timerDigital.textContent = match.timeLeft; } });
                socket.on('opponent_taunt', (data) => displayChatBubble(data.message, false));
                socket.on('bot_taunt', (data) => displayChatBubble(data.message, false));
                socket.on('opponent_disconnected', () => { if (!match.gameOver) showGameOver(true, 'RAKİP KAÇTI! HÜKMEN KAZANDINIZ!', { isWin: true }); });
            }

            async function fetchQuestion() {
                const res = await fetch(`${SERVER_URL}/api/get-question/super_league/${user.id}?lang=${match.lang}`, { headers: { 'Authorization': `Bearer ${getAuthToken()}` } });
                return await res.json();
            }

            async function startMatch(q) { /* ... aynı ... */ }
            function loadQuestion(qData) { /* ... aynı ... */ }
            function handleAnswer(choice) { /* ... aynı ... */ }
            async function evaluateRound() { /* ... aynı ... */ }
            function showGameOver(win, customText, result) { /* ... aynı ... */ }
            async function startNextRound(free) { /* ... aynı ... */ }
            function renderInventory() { /* ... aynı ... */ }
            async function useItem(type) { /* ... aynı ... */ }
            window.raiseBet = function(amount) { if (!match.id) return; socket.emit('raise_pot', { matchId: match.id, amount }); DOM.raiseContainer.classList.remove('active'); };
            window.toggleChatMenu = function() { /* ... aynı ... */ };
            window.sendChat = function(msg) { displayChatBubble(msg, true); if (match.id) socket.emit('player_taunt', { matchId: match.id, message: msg }); toggleChatMenu(); };
            function displayChatBubble(text, isMe) { /* ... aynı ... */ }
            function buildChatOptions() { /* ... aynı ... */ }
            function buildRaiseButtons() { DOM.raiseButtons.innerHTML = VALID_RAISE_AMOUNTS.map(amt => `<button class="raise-btn" onclick="raiseBet(${amt})"><i class="fa-solid fa-coins"></i> ${amt}</button>`).join(''); }

            async function init() {
                const token = getAuthToken(); if (!token) return window.location.replace('oyun.html');
                try {
                    const meRes = await fetch(`${SERVER_URL}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
                    const meData = await meRes.json(); user.id = meData.user.id;
                    const userRes = await fetch(`${SERVER_URL}/api/user/${user.id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                    const userData = await userRes.json();
                    user.nickname = userData.nickname;
                    user.coins = (userData.free_coins || 0) + (userData.paid_coins || 0);
                    user.score = userData.super_league_stats?.score || 0;
                    user.inventory = userData.inventory || { bomb:0, mask:0, time:0, joker:0 };
                    DOM.coins.textContent = user.coins; DOM.score.textContent = user.score;
                    debug('Kullanıcı bilgileri alındı. Coin: ' + user.coins);
                    buildChatOptions(); buildRaiseButtons();
                    setupSocket();
                } catch(e) { debug('Başlatma hatası: ' + e.message, true); setTimeout(() => window.location.replace('oyun.html'), 2000); }
            }
            init();
        })();
    </script>
</body>
</html>
