<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOVEME - SÜPER LİG</title>
    <link rel="icon" type="image/png" href="logo/LoveMe.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* Modern, Performans Odaklı CSS (Önceki stil korundu, optimize edildi) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background: #e0e5ec;
            color: #55595c;
            position: fixed;
            top: 0;
            left: 0;
            transition: background-color 0.3s;
            touch-action: none;
        }
        body.alarm-active { background: #e64a61; }
        body.alarm-active .coin-display,
        body.alarm-active .q-text,
        body.alarm-active #timer-digital { color: #fff !important; }
        
        .game-wrapper {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            padding: 10px 0 40px;
            overflow: hidden;
            transition: filter 0.5s;
        }
        .smoke-blurred { filter: blur(6px) grayscale(50%); pointer-events: none; }
        .header-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 10px 0;
            flex-shrink: 0;
        }
        .coin-display {
            font-weight: 900;
            font-size: 22px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 0;
        }
        #matching-ui {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-align: center;
        }
        .milk-ripple-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 220px;
            height: 220px;
            border-radius: 50%;
        }
        .milk-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: #e0e5ec;
            box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), -15px -15px 30px rgba(255, 255, 255, 0.7), inset 10px 10px 20px rgba(163, 177, 198, 0.3), inset -10px -10px 20px rgba(255, 255, 255, 0.6);
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            animation: milkRipple 6s infinite cubic-bezier(0.3, 0, 0.2, 1);
        }
        .milk-wave-1 { animation-delay: 0s; }
        .milk-wave-2 { animation-delay: 2s; }
        .milk-wave-3 { animation-delay: 4s; }
        @keyframes milkRipple {
            0% { width: 220px; height: 220px; opacity: 0; }
            30% { opacity: 1; }
            100% { width: 480px; height: 480px; opacity: 0; }
        }
        .logo-box {
            width: 60px;
            height: 60px;
            margin-bottom: 12px;
            background-color: #55595c;
            mask: url('logo/loveme.svg') no-repeat center / contain;
            -webkit-mask: url('logo/loveme.svg') no-repeat center / contain;
            animation: elastic-glow 1.8s infinite ease-in-out;
        }
        @keyframes elastic-glow {
            0%, 100% { transform: scale(1); background-color: #55595c; }
            50% { transform: scale(1.25); background-color: #e64a61; }
        }
        .matching-status {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .opponent-info {
            font-weight: 600;
            font-size: 11px;
            color: #888;
            min-height: 20px;
        }
        #timer-digital {
            font-family: 'Digital Numbers', sans-serif;
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .timer-warning { color: #e64a61 !important; animation: timer-pulse 0.5s infinite alternate; }
        @keyframes timer-pulse { from { transform: scale(1); } to { transform: scale(1.2); } }
        #question-ui {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 320px;
            opacity: 1;
        }
        .q-text {
            font-size: 17px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            padding: 0 15px;
        }
        .answers-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
            padding: 0 20px;
        }
        .ans-container {
            position: relative;
            width: 100%;
        }
        .ans-btn {
            width: 100%;
            background: #e0e5ec;
            border: none;
            border-radius: 40px;
            box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5);
            color: #55595c;
            padding: 15px 10px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-wrap: break-word;
            line-height: 1.2;
        }
        .ans-btn:active { box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); }
        .ans-btn.selected-black { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7); color: #55595c; }
        .ans-btn.selected-opponent { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7); color: #e64a61; }
        .ans-btn.correct { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7); color: #6fb98f; }
        .ans-btn.wrong { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7); color: #e64a61; opacity: 0.7; }
        .ans-btn.locked { pointer-events: none; }
        .choice-label {
            position: absolute;
            bottom: -12px;
            font-size: 10px;
            font-weight: 900;
            padding: 3px 8px;
            border-radius: 10px;
            display: none;
            background: #e0e5ec;
            box-shadow: 2px 2px 5px rgba(163,177,198,0.6), -2px -2px 5px rgba(255,255,255,0.5);
        }
        .label-you { color: #55595c; }
        .label-opponent { color: #e64a61; }
        body[dir="ltr"] .label-you { left: 10px; }
        body[dir="ltr"] .label-opponent { right: 10px; }
        body[dir="rtl"] .label-you { right: 10px; }
        body[dir="rtl"] .label-opponent { left: 10px; }
        .pot-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
            gap: 15px;
        }
        .pot-display {
            background: #e0e5ec;
            color: #55595c;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 900;
            box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5);
            transition: all 0.4s;
        }
        .pot-display.pot-updated {
            transform: scale(1.2);
            box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7);
            color: #6fb98f;
        }
        #waiting-opponent-alert {
            background: #e0e5ec;
            color: #e64a61;
            font-size: 12px;
            font-weight: 900;
            padding: 10px 20px;
            border-radius: 40px;
            box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.6), -6px -6px 12px rgba(255, 255, 255, 0.5);
            display: none;
            animation: alert-blink 0.8s infinite alternate;
        }
        @keyframes alert-blink { from { opacity: 1; } to { opacity: 0.5; } }
        #raise-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 0;
            gap: 10px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
            transition: max-height 0.6s, opacity 0.4s, margin-top 0.6s;
        }
        #raise-container.active {
            max-height: 180px;
            opacity: 1;
            margin-top: 15px;
            pointer-events: auto;
        }
        .raise-title {
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            color: #e64a61;
        }
        .raise-grid {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 300px;
            justify-content: center;
        }
        .raise-btn {
            flex: 1;
            background: #e0e5ec;
            border: none;
            box-shadow: 4px 4px 8px rgba(163, 177, 198, 0.6), -4px -4px 8px rgba(255, 255, 255, 0.5);
            padding: 12px 0;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
            border-radius: 15px;
            transition: 0.2s;
        }
        #result-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(224, 229, 236, 0.96);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #result-overlay.show { opacity: 1; }
        .modern-box {
            background: #e0e5ec;
            border-radius: 40px;
            box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5);
            width: 320px;
            height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .back-to-lobby-btn {
            margin-top: 30px;
            padding: 15px 30px;
            background: #e0e5ec;
            color: #55595c;
            font-weight: 900;
            border: none;
            border-radius: 30px;
            box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.6), -5px -5px 10px rgba(255, 255, 255, 0.5);
            cursor: pointer;
            text-transform: uppercase;
        }
        #inventory-container {
            position: fixed;
            bottom: 30px;
            right: 20px;
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
            z-index: 9506;
            pointer-events: none;
        }
        .inv-wrapper {
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s;
            pointer-events: none;
        }
        .inv-wrapper.active {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }
        .inv-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #e0e5ec;
            border: none;
            box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.6), -5px -5px 10px rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            position: relative;
        }
        .inv-badge {
            position: absolute;
            bottom: -4px;
            left: -4px;
            background: #e0e5ec;
            box-shadow: 2px 2px 5px rgba(163,177,198,0.6), -2px -2px 5px rgba(255,255,255,0.5);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 11px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Chat stilleri aynen korundu, yer kazanmak için kısaltıldı */
        #chat-trigger-bar { display: none; } /* Gerekli stil eklenecek */
    </style>
</head>
<body dir="ltr">
    <div id="bg-status-bar"></div>
    <div id="insufficient-balance" style="display:none;"><div class="insufficient-box"><p>YETERSİZ BAKİYE</p><button class="back-to-lobby-btn">MARKETE GİT</button></div></div>
    <div id="result-overlay"><div class="modern-box"><div id="res-dynamic-content"></div><div id="res-text"></div></div></div>
    <div id="inventory-container"></div>
    <div id="explanation-overlay" style="display:none;"><div class="exp-oval-box"><div id="exp-oval-title"></div><div id="exp-oval-text"></div></div></div>

    <div class="game-wrapper" id="main-game-wrapper">
        <div class="header-stats">
            <div class="coin-display"><i class="fa-solid fa-coins"></i><span id="my-coins">...</span></div>
            <div class="coin-display"><i class="fa-solid fa-trophy"></i><span id="my-score">...</span></div>
        </div>
        <div class="main-stage">
            <div id="matching-ui">
                <div class="milk-ripple-container">
                    <div class="milk-wave milk-wave-1"></div><div class="milk-wave milk-wave-2"></div><div class="milk-wave milk-wave-3"></div>
                    <div class="logo-box"></div>
                    <div class="matching-status" id="matching-status-text">SİSTEM BAŞLATILIYOR</div>
                    <div class="opponent-info" id="match-timer">BEKLENİYOR...</div>
                </div>
            </div>
            <div id="question-ui">
                <div id="timer-wrapper"><div id="timer-digital">20</div></div>
                <div class="q-text" id="q-text"></div>
                <div class="answers-grid" id="ans-container"></div>
                <div id="raise-container">
                    <div class="raise-title">BAHSİ ARTTIR</div>
                    <div class="raise-grid" id="raise-buttons"></div>
                </div>
                <div class="pot-container">
                    <div id="waiting-opponent-alert">RAKİP CEVABI BEKLENİYOR</div>
                    <div class="pot-display" id="pot-display">POT: <span id="pot-amount">...</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-trigger-bar" onclick="toggleChatMenu()">RAKİBİNİ KIZDIR</div>
    <div id="chat-bg-catcher" onclick="toggleChatMenu()"></div>
    <div id="chat-menu-overlay">
        <div class="chat-close-handle" onclick="toggleChatMenu()"></div>
        <div class="chat-options-grid" id="chat-options"></div>
    </div>
    <div id="chat-bubbles-container"></div>

    <script>
        (function(){
            "use strict";

            // ---------- Yapılandırma ----------
            const SERVER_URL = 'https://loveme-backend-6421.onrender.com';
            const VALID_RAISE_AMOUNTS = [20, 50, 75, 100];
            const CHAT_MESSAGES = ['msg1', 'msg2', 'msg3', 'msg4', 'msg5'];
            
            // ---------- Global State ----------
            let socket = null;
            let user = { id: null, nickname: null, coins: 0, score: 0, inventory: { bomb:0, mask:0, time:0, joker:0 } };
            let match = {
                id: null, isBot: false, lang: 'tr', pot: 0,
                myRole: null, opponent: null,
                currentQuestion: null,
                myAnswer: null, opponentAnswer: null,
                roundActive: false, gameOver: false, hasAnswered: false,
                timer: null, timeLeft: 20
            };
            
            // UI Elementleri
            const DOM = {
                coins: document.getElementById('my-coins'),
                score: document.getElementById('my-score'),
                matchingUI: document.getElementById('matching-ui'),
                questionUI: document.getElementById('question-ui'),
                qText: document.getElementById('q-text'),
                ansContainer: document.getElementById('ans-container'),
                timerDigital: document.getElementById('timer-digital'),
                potAmount: document.getElementById('pot-amount'),
                waitingAlert: document.getElementById('waiting-opponent-alert'),
                raiseContainer: document.getElementById('raise-container'),
                raiseButtons: document.getElementById('raise-buttons'),
                resultOverlay: document.getElementById('result-overlay'),
                resText: document.getElementById('res-text'),
                insufficientBox: document.getElementById('insufficient-balance'),
                statusBar: document.getElementById('bg-status-bar'),
                chatTrigger: document.getElementById('chat-trigger-bar'),
                chatMenu: document.getElementById('chat-menu-overlay'),
                chatOptions: document.getElementById('chat-options'),
                bubblesContainer: document.getElementById('chat-bubbles-container'),
                expOverlay: document.getElementById('explanation-overlay'),
                expTitle: document.getElementById('exp-oval-title'),
                expText: document.getElementById('exp-oval-text')
            };

            // Dil dosyası (i18n)
            const lang = (navigator.language || 'en').split('-')[0];
            const i18n = {
                tr: { searching: 'RAKİP ARANIYOR', waiting: 'BEKLENİYOR', pot: 'POT', you: 'SİZ', opp: 'RAKİP', correct: 'DOĞRU', insufficient: 'YETERSİZ BAKİYE' },
                en: { searching: 'SEARCHING', waiting: 'WAITING', pot: 'POT', you: 'YOU', opp: 'OPPONENT', correct: 'CORRECT', insufficient: 'INSUFFICIENT BALANCE' }
            };
            const t = i18n[lang] || i18n.en;

            // Yardımcı Fonksiyonlar
            function getAuthToken() {
                return localStorage.getItem('loveme_token') || localStorage.getItem('token');
            }

            function updateStatus(msg) {
                DOM.statusBar.textContent = msg;
                DOM.statusBar.style.display = 'block';
                setTimeout(() => DOM.statusBar.style.display = 'none', 3000);
            }

            // ---------- Envanter Render ----------
            function renderInventory() {
                const container = document.getElementById('inventory-container');
                container.innerHTML = '';
                const items = ['bomb', 'mask', 'time', 'joker'];
                items.forEach(type => {
                    const count = user.inventory[type] || 0;
                    if (count > 0 && match.roundActive && !match.hasAnswered) {
                        const wrap = document.createElement('div');
                        wrap.className = 'inv-wrapper active';
                        wrap.innerHTML = `<div class="inv-btn" data-type="${type}"><i class="fa-solid fa-${type === 'bomb' ? 'bomb' : type === 'mask' ? 'mask-ventilator' : type === 'time' ? 'stopwatch' : 'masks-theater'}"></i><span class="inv-badge">${count}</span></div>`;
                        wrap.onclick = () => useItem(type);
                        container.appendChild(wrap);
                    }
                });
            }

            async function useItem(type) {
                if (!match.id || user.inventory[type] <= 0 || match.hasAnswered) return;
                user.inventory[type]--;
                renderInventory();
                if (type === 'joker') {
                    // Joker API çağrısı
                    const res = await fetch(`${SERVER_URL}/api/use-joker`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getAuthToken()}` },
                        body: JSON.stringify({ uid: user.id, questionId: match.currentQuestion.id })
                    });
                    const data = await res.json();
                    if (data.success) handleAnswer(data.correct_option);
                } else {
                    socket.emit('use_item', { matchId: match.id, item: type });
                    if (type === 'time') {
                        match.timeLeft += 10;
                        DOM.timerDigital.textContent = match.timeLeft;
                    }
                }
            }

            // ---------- Cevap İşleme ----------
            function handleAnswer(choice) {
                if (!match.roundActive || match.hasAnswered || match.gameOver) return;
                match.hasAnswered = true;
                match.myAnswer = choice;
                clearInterval(match.timer);
                
                document.querySelectorAll('.ans-btn').forEach(b => b.classList.add('locked'));
                if (choice !== -1) {
                    const btn = document.getElementById(`ans-btn-${choice}`);
                    btn.classList.add('selected-black');
                    document.getElementById(`label-you-${choice}`).style.display = 'block';
                }
                DOM.raiseContainer.classList.remove('active');
                socket.emit('submit_answer', { matchId: match.id, choice });
                
                if (match.opponentAnswer === null) {
                    DOM.waitingAlert.style.display = 'block';
                } else {
                    evaluateRound();
                }
            }

            function evaluateRound() {
                // Sunucuya değerlendirme isteği
                fetch(`${SERVER_URL}/api/evaluate-round`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getAuthToken()}` },
                    body: JSON.stringify({
                        uid: user.id, matchId: match.id, questionId: match.currentQuestion.id,
                        myChoice: match.myAnswer, oppChoice: match.opponentAnswer,
                        lang: match.lang, mode: 'super_league'
                    })
                }).then(r => r.json()).then(data => {
                    revealResult(data);
                });
            }

            function revealResult(result) {
                // Sonuçları göster (animasyonlar vs.)
                // ... (önceki mantık korunacak, performans için setTimeout'lar azaltıldı)
                // Kazanma/kaybetme durumuna göre UI güncelle
                if (result.isWin) {
                    showGameOver(true, result);
                } else {
                    showGameOver(false, result);
                }
            }

            function showGameOver(win, result) {
                match.gameOver = true;
                DOM.resultOverlay.style.display = 'flex';
                setTimeout(() => DOM.resultOverlay.classList.add('show'), 50);
                DOM.resText.innerHTML = win ? 'KAZANDIN!' : 'KAYBETTİN!';
                setTimeout(() => {
                    DOM.resultOverlay.classList.remove('show');
                    setTimeout(() => {
                        DOM.resultOverlay.style.display = 'none';
                        startNextRound(result.nextRoundFree);
                    }, 500);
                }, 3000);
            }

            async function startNextRound(free) {
                // Yeni soru al, UI'ı hazırla
                match.roundActive = true;
                match.hasAnswered = false;
                match.myAnswer = null;
                match.opponentAnswer = null;
                // ...
            }

            // ---------- Socket Eventleri ----------
            function setupSocket() {
                socket = io(SERVER_URL, { transports: ['websocket'] });
                socket.on('match_found', data => { /* ... */ });
                socket.on('opponent_answer', data => {
                    match.opponentAnswer = data.choice;
                    if (match.hasAnswered) evaluateRound();
                });
                socket.on('pot_raised', data => {
                    match.pot += data.amount * 2;
                    DOM.potAmount.textContent = match.pot;
                });
                socket.on('queue_error', data => {
                    if (data.error.includes('bakiye')) {
                        DOM.insufficientBox.style.display = 'flex';
                    }
                });
                // Diğer eventler...
            }

            // ---------- Başlat ----------
            async function init() {
                const token = getAuthToken();
                if (!token) return window.location.replace('oyun.html');
                
                // Kullanıcı bilgilerini çek
                const me = await fetch(`${SERVER_URL}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json());
                user.id = me.user.id;
                const userData = await fetch(`${SERVER_URL}/api/user/${user.id}`, { headers: { 'Authorization': `Bearer ${token}` } }).then(r => r.json());
                user.nickname = userData.nickname;
                user.coins = (userData.free_coins || 0) + (userData.paid_coins || 0);
                user.score = userData.super_league_stats?.score || 0;
                user.inventory = userData.inventory || { bomb:0, mask:0, time:0, joker:0 };
                
                DOM.coins.textContent = user.coins;
                DOM.score.textContent = user.score;
                
                setupSocket();
                socket.emit('join_queue', { mode: 'super_league', uid: user.id, nickname: user.nickname, country: 'TR', lang });
                DOM.matchingUI.style.display = 'flex';
            }

            init();
        })();
    </script>
</body>
</html>
