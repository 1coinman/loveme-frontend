<!DOCTYPE html>

<head>

    <script>
        if (window.history.replaceState) {
            window.history.replaceState(null, null, "/");
        }

    <script>
        // 1. Sağ Tıklamayı (Context Menu) Engelle
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // 2. Klavye Kısayollarını (F12, Kaydet, Kaynağı Gör vb.) Engelle
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.keyCode === 83) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.keyCode === 80) { e.preventDefault(); return false; }
        });
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

    <style>
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            touch-action: manipulation;
        }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            height: 100dvh; 
            overflow: hidden !important; 
            background-color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            transition: background-color 0.3s ease; 
            overscroll-behavior: none;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; 
            -webkit-touch-callout: none;
        }
        img { pointer-events: none; }

        .game-wrapper { 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            width: 100%; 
            justify-content: flex-start; 
            align-items: center; 
            padding: 10px 0 40px 0; 
            overflow: hidden;
            touch-action: none;
            transition: filter 0.5s;
        }

        .smoke-blurred { filter: blur(6px) grayscale(50%); pointer-events: none; }

        .header-stats { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 10px 0;
            z-index: 10; 
            flex-shrink: 0; 
            gap: 30px; 
        }
        
        .coin-display { font-weight: 900; font-size: 22px; display: flex; align-items: center; gap: 8px; color: #000; transition: color 0.3s; z-index: 100; }
        
        .main-stage { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            min-height: 0; 
        }
        
        #matching-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; text-align: center; }
        .logo-box { width: 80px; height: 80px; margin-bottom: 20px; background-color: #000; -webkit-mask: url('logo/loveme.svg') no-repeat center; mask: url('logo/loveme.svg') no-repeat center; -webkit-mask-size: contain; mask-size: contain; animation: elastic-glow 1.8s infinite ease-in-out; }
        @keyframes elastic-glow { 0%, 100% { transform: scale(1); background-color: #000; } 50% { transform: scale(1.25); background-color: #ff0000; } }
        
        .matching-status { font-weight: 900; font-size: 18px; color: #000; margin-bottom: 10px; }
        .opponent-info { font-weight: 700; font-size: 14px; color: #666; min-height: 20px; }
        
        #timer-wrapper { position: relative; display: flex; justify-content: center; align-items: center; }
        #timer-digital { font-family: 'Digital Numbers', sans-serif; font-size: 42px; font-weight: 900; color: #000; margin-bottom: 20px; transition: all 0.3s ease; }
        .timer-warning { color: #ff0000 !important; animation: timer-pulse 0.5s infinite alternate; }
        .timer-add-pulse { color: #28a745 !important; transform: scale(1.3); }
        @keyframes timer-pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        .time-float-anim { position: absolute; top: -30px; color: #28a745; font-size: 20px; font-weight: 900; animation: floatUpFade 1.2s forwards; pointer-events: none; z-index: 50; }
        @keyframes floatUpFade { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }

        #question-ui { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 320px; }
        .q-text { font-size: 17px; font-weight: 800; text-align: center; margin-bottom: 20px; color: #000; transition: color 0.3s; padding: 0 15px; }
        .answers-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; padding: 0 20px; }
        .ans-container { position: relative; width: 100%; }
        
        .ans-btn { 
            width: 100%; background: #fff; border: 2.5px solid #000; color: #000; 
            padding: 12px 10px; font-size: 14px; font-weight: 800; 
            cursor: pointer; transition: all 0.3s; 
            min-height: 52px; display: flex; align-items: center; justify-content: center;
            text-align: center; word-wrap: break-word; line-height: 1.2;
            border-radius: 30px;
        }
        
        body.alarm-active { background-color: #ff0000; }
        body.alarm-active .coin-display, body.alarm-active .q-text, body.alarm-active #timer-digital { color: #fff !important; }
        body.alarm-active .ans-btn { border-color: #fff; background: transparent; color: #fff; }

        .ans-btn:not(.locked):hover { background: #f0f0f0; }
        .ans-btn.selected-black { background: #000 !important; color: #fff !important; border-color: #000 !important; }
        .ans-btn.correct { background: #28a745 !important; border-color: #28a745 !important; color: #fff !important; }
        .ans-btn.wrong { background: #dc3545 !important; border-color: #dc3545 !important; color: #fff !important; }
        .ans-btn.locked { pointer-events: none; }
        .choice-label { position: absolute; bottom: -12px; font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 4px; display: none; z-index: 5; }
        
        .label-you { background: #000; color: #fff; }
        .label-opponent { background: #ff0000; color: #fff; }
        
        body[dir="ltr"] .label-you { left: 10px; }
        body[dir="ltr"] .label-opponent { right: 10px; }
        body[dir="rtl"] .label-you { right: 10px; }
        body[dir="rtl"] .label-opponent { left: 10px; }

        #explanation-box { display: none; width: 100%; padding: 15px 25px; margin-top: 15px; text-align: center; color: #000; font-size: 13px; font-weight: 700; border-top: 1px dashed #ccc; }

        /* POT Konteyneri */
        .pot-container { width: 100%; display: flex; justify-content: center; margin-top: 20px; z-index: 10; position: relative; }
        .pot-display { background: #000; color: #fff; padding: 8px 30px; border-radius: 30px; font-size: 15px; font-weight: 900; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        .pot-display.pot-updated { background: #28a745; transform: scale(1.3); }

        /* Bahis Butonları Alanı */
        #raise-container { display: none; width: 100%; flex-direction: column; align-items: center; margin-top: 15px; gap: 10px; }
        .raise-title { font-size: 12px; font-weight: 900; text-transform: uppercase; color: #ff0000; animation: fade-in 0.5s; }
        .raise-grid { display: flex; gap: 10px; width: 100%; max-width: 300px; justify-content: center; }

        /* Buton Animasyonları */
        .raise-btn {
            flex: 1; background: #fff; color: #000; border: 2.5px solid #000; padding: 10px 0;
            font-size: 14px; font-weight: 900; cursor: pointer; transition: 0.2s; border-radius: 4px;
            opacity: 0; transform: translateY(30px);
            animation: slideUpElastic 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
        }
        .raise-btn:nth-child(1) { animation-delay: 0.1s; }
        .raise-btn:nth-child(2) { animation-delay: 0.2s; }
        .raise-btn:nth-child(3) { animation-delay: 0.3s; }
        .raise-btn:nth-child(4) { animation-delay: 0.4s; }
        .raise-btn.closing { animation: slideDownFade 0.4s forwards !important; }

        /* Keyframes */
        @keyframes slideUpElastic { 0% { opacity: 0; transform: translateY(30px) scale(0.9); } 70% { transform: translateY(-5px) scale(1.05); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes slideDownFade { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(30px) scale(0.9); } }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

        /* Yüzen Animasyon Text'i */
        .floating-text {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            font-size: 14px; font-weight: 900; color: #28a745; text-transform: uppercase;
            opacity: 0; pointer-events: none; z-index: 50; white-space: nowrap;
        }
        .floating-text.show { animation: float-up-fade 2s ease-out forwards; }
        @keyframes float-up-fade { 0% { opacity: 0; transform: translate(-50%, 10px); } 20% { opacity: 1; transform: translate(-50%, 0); } 80% { opacity: 1; transform: translate(-50%, -15px); } 100% { opacity: 0; transform: translate(-50%, -25px); } }

        #result-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        
        #insufficient-balance { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; font-weight: 900; font-size: 24px; color: #000; text-align: center; padding: 20px;}
        #insufficient-balance p { font-size: 14px; font-weight: 600; color: #666; margin-top: 10px; }
        .back-to-lobby-btn { margin-top: 30px; padding: 15px 30px; background: #000; color: #fff; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        .sad-logo-wrapper {
            width: 120px; height: 120px; margin-bottom: 30px; background-color: #000; opacity: 0.7;
            -webkit-mask: url('logo/loveme.svg') no-repeat center; mask: url('logo/loveme.svg') no-repeat center;

            0%, 100% { transform: translateY(0) scale(1); opacity: 0.7; }
            50% { transform: translateY(15px) scale(0.95); opacity: 0.3; } 
        }

        #bg-status-bar {
            display: none; 
            position: fixed; bottom: 0; left: 0; width: 100%; background-color: #000;
            color: #0f0; font-family: monospace; font-size: 11px; text-align: center;
            padding: 6px 0; z-index: 50; font-weight: bold; transition: all 0.3s;
        }

        #chat-trigger-bar {

            background-color: #fff; z-index: 501; border-top: 3px solid #000;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);

            pointer-events: none; 
        }
        #chat-menu-overlay.active { 
            transform: translateY(0); 
            pointer-events: auto; 
        }
        
        .chat-close-handle { width: 40px; height: 5px; background: #ddd; border-radius: 3px; margin-bottom: 15px; cursor: pointer; flex-shrink: 0; }
        
        .chat-options-grid {
            display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px;
            flex: 1; 
            overflow-y: auto; 
            padding-bottom: 25px; 
            touch-action: pan-y !important; 
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain; 
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .chat-options-grid::-webkit-scrollbar { display: none; }

        .chat-option-btn {
            flex-shrink: 0; min-height: 48px;
            background: transparent; border: none; font-size: clamp(14px, 4vw, 20px); font-weight: 900;
            color: #000; cursor: pointer; text-transform: uppercase; padding: 8px; transition: 0.2s;
        }
        .chat-option-btn:active { transform: scale(0.9); color: #ff0000; }

        #chat-bubbles-container {
            position: fixed; top: 0; right: 0; width: 220px; height: auto; min-height: 10px;
            pointer-events: none; z-index: 9999; display: flex; flex-direction: column; align-items: flex-end;
            margin: 0; padding: 0; overflow: hidden;
        }
        body[dir="rtl"] #chat-bubbles-container { right: auto; left: 0; align-items: flex-start; }

        .chat-bubble {
            padding: 8px 14px; font-size: 12px; font-weight: 900; line-height: 1.3;
            text-align: center; max-width: 100%; margin: 0; margin-bottom: 5px;
            border: 2.5px solid;
            transform-origin: top right; animation: bubble-pop 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards;
            transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.5s ease, background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }
        body[dir="rtl"] .chat-bubble { transform-origin: top left; }

        .bubble-me {
            background-color: #000; color: #fff; border-color: #000;
            border-bottom-left-radius: 18px; border-top-left-radius: 18px; border-bottom-right-radius: 18px; border-top-right-radius: 0;
        }
        body[dir="rtl"] .bubble-me { border-radius: 18px; border-top-left-radius: 0; }
        .bubble-me.pushed { background-color: #fff; color: #000; border-color: #000; }

        .bubble-opp {
            background-color: #ff0000; color: #fff; border-color: #ff0000;
            border-bottom-left-radius: 18px; border-top-left-radius: 18px; border-bottom-right-radius: 18px; border-top-right-radius: 0;
        }
        body[dir="rtl"] .bubble-opp { border-radius: 18px; border-top-left-radius: 0; }
        .bubble-opp.pushed { background-color: #fff; color: #ff0000; border-color: #ff0000; }

        .chat-bubble.fading { opacity: 0; transform: translateY(30px) scale(0.8); }

        @keyframes bubble-pop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        #chat-bg-catcher {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; display: none;
        }

        /* ENVANTER SİSTEMİ CSS */
        #inventory-container {
            position: fixed; bottom: 30px; right: 20px;
            display: flex; flex-direction: column-reverse; 
            z-index: 9500; pointer-events: none;
        }

        .inv-wrapper {
            height: 0; margin-top: 0; opacity: 0; transform: scale(0);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }

        .inv-wrapper.active {
            height: 50px; margin-top: 15px; opacity: 1; transform: scale(1);
            pointer-events: auto;
        }

        .inv-btn {
            width: 50px; height: 50px; border-radius: 50%;
            background: #fff; color: #000; border: 2.5px solid #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer; pointer-events: auto;
            position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .inv-btn.use-pulse { animation: invUsePulse 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); }

        @keyframes invUsePulse { 
            50% { transform: scale(1.3); background: #28a745; border-color: #28a745; color: #fff; } 
        }

        .inv-badge {
            position: absolute; bottom: -4px; left: -4px;
            background: #000; color: #fff; border: 2px solid #fff;
            border-radius: 50%; width: 20px; height: 20px;
            font-size: 10px; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
        }

        @media (max-height: 650px) {
            .logo-box { width: 60px; height: 60px; margin-bottom: 10px; }
            #timer-digital { font-size: 32px; margin-bottom: 10px; }
            .q-text { font-size: 15px; margin-bottom: 10px; }
            .ans-btn { min-height: 44px; padding: 8px 10px; font-size: 13px; }
            .answers-grid { gap: 10px; }
            .coin-display { font-size: 18px; }
            .pot-display { font-size: 13px; padding: 6px 20px; }
            .raise-btn { padding: 6px 0; font-size: 12px; }
        }

        @media (max-width: 340px) {
            .q-text { font-size: 14px; }
            .ans-btn { font-size: 12px; }
        }
    </style>
</head>

<script>
    // BAĞLANTI VE API AYARLARI
    // TODO: BURAYI KENDİ CANLI BACKEND DOMAIN'İN İLE DEĞİŞTİRMEYİ UNUTMA!
    const SERVER_URL = window.location.origin.includes('localhost') ? 'http://localhost:3000' : 'https://senin-backend-domainin.com'; 
    const GEMINI_API_KEY = "AIzaSyCRgWh0uhyZMJjjq44sub2dc_7GRB3wwJo"; 
    
    // Akıllı Auth Token Bulucu
    function bulAuthToken() {
        // 1. Önce standart isimleri kontrol et
        if (localStorage.getItem('access_token')) return localStorage.getItem('access_token');
        if (localStorage.getItem('token')) return localStorage.getItem('token');
        
        // 2. Supabase'in otomatik atadığı karmaşık key'i (sb-...-auth-token) bul
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            if (key && (key.includes('-auth-token') || key.includes('supabase'))) {
                try {
                    let data = JSON.parse(localStorage.getItem(key));
                    if (data && data.access_token) return data.access_token;
                } catch (e) { }
            }
        }
        return ""; // Hiçbir şey bulamazsa boş döner

    function triggerFireworks() {
        var duration = 4000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 };
        function randomInRange(min, max) { return Math.random() * (max - min) + min; }
        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            var particleCount = 50 * (timeLeft / duration);
            if(window.confetti) {
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));

            }
        }, 250);
    }

    function playAlarmSound(freq, duration) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

            return response;
        } catch (error) {
            clearTimeout(id);
            throw error;
        }
    }

    // MULTI-LANGUAGE TRANSLATION VIA GEMINI
    async function translateQuestion(qData, targetLangName) {
        const prompt = `Translate the following trivia data accurately and naturally into ${targetLangName}:
Question: ${qData.q}
Option 0: ${qData.a[0]}
Option 1: ${qData.a[1]}
Option 2: ${qData.a[2]}
Option 3: ${qData.a[3]}
Explanation: ${qData.expl}
Ensure output is ONLY valid JSON.`;
        try {
            const response = await fetchWithTimeout(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { 
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                q: { type: "STRING" },
                                a0: { type: "STRING" }, a1: { type: "STRING" }, a2: { type: "STRING" }, a3: { type: "STRING" },
                                expl: { type: "STRING" }
                            },
                            required: ["q", "a0", "a1", "a2", "a3", "expl"]
                        }
                    }
                })
            }, 12000); 
            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            const parsed = JSON.parse(text);
            return {
                q: parsed.q,
                a: [parsed.a0, parsed.a1, parsed.a2, parsed.a3],
                c: qData.c,
                expl: parsed.expl,
                lang: userLangCode,
                id: qData.id,
                difficulty: qData.difficulty || 1
            };
        } catch (e) { return qData; }
    }

    async function pullQuestionFromServer() {
        try {
            const res = await fetch(`${SERVER_URL}/api/get-question/super_league/${userDocId}`, { headers: getHeaders() });
            if(!res.ok) throw new Error("Question fail");
            let data = await res.json();
            return {
                id: data.id,
                q: data.question_text,
                a: data.options,
                c: data.correct_option,
                expl: data.explanation,
                difficulty: data.difficulty || 1,
                lang: 'tr'
            };
        } catch(e) {
            updateStatus("sys_warn");
            const fallbacks = localFallbackQuestions[userLangCode] || localFallbackQuestions['en'];
            const randomFallback = getRandomItem(fallbacks);
            return {
                q: randomFallback.q, a: [...randomFallback.a], c: randomFallback.c, expl: randomFallback.expl,
                lang: userLangCode, id: "local_" + Date.now(), difficulty: 3
            };
        }
    }

    // ANA BAŞLATICI FONKSİYON (DEBUG MODU EKLENDİ)
    async function init() {
        try {
            if (!AUTH_TOKEN) { 
                alert("HATA 1: AUTH_TOKEN bulunamadı! Lobi sayfasından Süper Lig'e token (access_token) aktarılamıyor."); 
                // window.location.replace("index.html"); 
                return; 
            }
            
            const meRes = await fetch(`${SERVER_URL}/api/auth/me`, { headers: getHeaders() });
            const meData = await meRes.json();
            
            if (!meRes.ok || !meData.user) { 
                alert("HATA 2: Token geçersiz veya Backend API'ye ulaşılamıyor. Backend Cevabı: " + JSON.stringify(meData)); 
                return; 
            }
            
            userDocId = meData.user.id;
            
            const userRes = await fetch(`${SERVER_URL}/api/user/${userDocId}`, { headers: getHeaders() });
            const userData = await userRes.json();

            if (!userRes.ok) {
                alert("HATA 3: Kullanıcı verileri Supabase'den çekilemedi. Cevap: " + JSON.stringify(userData));
                return;
            }
            
            myNickname = userData.nickname;
            userCoins = (Number(userData.free_coins) || 0) + (Number(userData.coins) || 0);
            
            document.getElementById('my-coins').innerText = userCoins;
            document.getElementById('my-score').innerText = userData.super_league_stats?.score || 0;
            
            const inv = userData.inventory || {};
            myInventory = { bomb: inv.bomb || 0, mask: inv.mask || 0, time: inv.time || 0, joker: inv.joker || 0 };
            renderInventory();

            const needsEntryFee = !userData.has_entered_super_league;
            const requiredCoins = needsEntryFee ? 380 : 30;

            if (userCoins < requiredCoins) {
                const msg = needsEntryFee ? (t.insufficient || "SÜPER LİG GİRİŞ (350) + OYUN (30) İÇİN YETERSİZ") : (t.insufficient || "YETERSİZ BAKİYE (30 KOİN GEREKLİ)");
                document.getElementById('insufficient-balance').querySelector('.ui-trans').innerText = msg;
                document.getElementById('insufficient-balance').style.display = 'flex';
                setTimeout(() => { window.location.replace("oyun.html"); }, 4000);
                return;
            }

            if (needsEntryFee) {
                const enterRes = await fetch(`${SERVER_URL}/api/league/enter`, { method: 'POST', headers: getHeaders(), body: JSON.stringify({ uid: userDocId }) });
                if(!enterRes.ok) {
                    alert("HATA 4: Lige giriş işlemi API tarafından reddedildi.");
                    return;
                }
                userCoins -= 350;
            }

            document.querySelectorAll('.raise-btn').forEach(btn => {
                btn.onclick = () => window.raiseBet(parseInt(btn.getAttribute('data-val')));
            });

            // SOCKET BAĞLANTISI
            socket = io(SERVER_URL);
            updateStatus("sys_conn");
            setupSocketListeners();
            startMatchmaking();

        } catch (error) {
            alert("SİSTEM ÇÖKTÜ: " + error.message);
            console.error("Başlatma hatası:", error);
            // window.location.replace("index.html"); 
        }
    }

    function setupSocketListeners() {
        socket.on('match_found', async (data) => {
            matchmakingResolved = true;
            if(countdownInterval) clearInterval(countdownInterval);
            document.getElementById('matching-status-text').innerText = t.preparing;
            
            currentMatchId = data.matchId;
            myPlayerKey = data.role; // player1 veya player2
            opponentPlayerKey = myPlayerKey === 'player1' ? 'player2' : 'player1';
            
            const oppData = data[opponentPlayerKey];
            document.getElementById('match-timer').innerText = oppData.nickname;

            // Player1 soruyu çeker ve Player2'ye gönderir (Senkronizasyon)
            if(myPlayerKey === 'player1') {
                 const q = await pullQuestionFromServer();
                 socket.emit('share_question', { matchId: currentMatchId, question: q });
                 prepareAndPlay(q);
            }
        });

        socket.on('receive_question', async (data) => {
             if(myPlayerKey === 'player2') {
                 prepareAndPlay(data.question);
             }
        });

        socket.on('match_found_with_bot', async (data) => {
            matchmakingResolved = true;
            if(countdownInterval) clearInterval(countdownInterval);
            document.getElementById('matching-status-text').innerText = t.preparing;
            
            isBotDuel = true;
            currentMatchId = data.matchId;
            document.getElementById('match-timer').innerText = data.bot.nickname;
            
            const q = await pullQuestionFromServer();
            socket.emit('bot_start_round', { matchId: currentMatchId, question: q, difficulty: q.difficulty, currentPot: 10 });
            prepareAndPlay(q);
        });

        // BOT VEYA RAKİP ETKİLEŞİMLERİ
        socket.on('opponent_answer', (data) => { oppChoiceIdx = data.choice; checkRoundEnd(); });
        socket.on('bot_answer', (data) => { oppChoiceIdx = data.answer; checkRoundEnd(); });
        
        socket.on('opponent_raise', (data) => triggerRaise(data.amount));
        socket.on('bot_raise_pot', (data) => triggerRaise(data.amount));
        
        socket.on('opponent_item', (data) => applyOpponentItem(data.item));
        socket.on('bot_use_item', (data) => applyOpponentItem(data.item));
        
        socket.on('opponent_taunt', (data) => displayChatBubble(data.message, false));
        socket.on('bot_taunt', (data) => displayChatBubble(data.message, false));

        socket.on('opponent_disconnected', () => handleAbandon(true));
    }

    async function prepareAndPlay(incomingQ) {
        let finalQ = incomingQ;
        if (incomingQ.lang !== userLangCode) {
            finalQ = await translateQuestion(incomingQ, userLangName);
        }
        
        readyQuestionToPlay = finalQ;
        
        // UI Hazırlıkları
        isMatchPlaying = true; 
        document.getElementById('matching-ui').style.display = 'none';
        document.getElementById('question-ui').style.display = 'flex';
        document.getElementById('chat-trigger-bar').style.display = 'flex'; 
        renderInventory();
        loadQuestion(readyQuestionToPlay);
    }

    function checkRoundEnd() {
        if (myChoiceIdx !== -1 && oppChoiceIdx !== -1 && !isGameOver) {
            isGameOver = true;
            clearInterval(timerInterval);
            stopEffects();
            document.getElementById('chat-trigger-bar').style.display = 'none'; 
            revealSelections(myChoiceIdx, oppChoiceIdx); 
        }
    }

    async function handleAbandon(isOpponent = false) {
        if (hasAbandoned || isGameOver) return;
        hasAbandoned = true; stopEffects();
        
        if (!isOpponent) {
            try {
                await fetch(`${SERVER_URL}/api/user/win`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ uid: userDocId, coins: 0, score: -1, isWin: false })
                });
            } catch(e) {}
            window.location.replace("oyun.html");
        } else {
            // Rakip kaçtı, kazanma işlemi
            isGameOver = true;
            try {
                await fetch(`${SERVER_URL}/api/user/win`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ uid: userDocId, coins: currentPot, score: 3, isWin: true })
                });
            } catch(e) {}
            showResult(true, activeAbandonWinText);
        }
    }

    function resetGame() {
        document.getElementById('result-overlay').style.display = 'none';
        document.getElementById('question-ui').style.display = 'none';
        document.getElementById('chat-trigger-bar').style.display = 'none';
        document.getElementById('raise-container').style.display = 'none';
        document.getElementById('chat-bubbles-container').innerHTML = '';
        document.getElementById('matching-ui').style.display = 'flex';
        document.getElementById('matching-status-text').innerText = t.searching;
        
        activeQuestion = null; readyQuestionToPlay = null;
        isMatchPlaying = false; timerInterval = null;
        timeLeft = 20; isGameOver = false; hasAnswered = false; currentMatchId = null;
        myPlayerKey = null; opponentPlayerKey = null; isBotDuel = false; matchmakingResolved = false;
        hasAbandoned = false; currentPot = 10;
        myChoiceIdx = -1; oppChoiceIdx = -1;
        
        document.getElementById('main-game-wrapper').classList.remove('smoke-blurred');
        renderInventory(); 
        document.getElementById('pot-amount').innerText = "10";

        if(countdownInterval) clearInterval(countdownInterval);
        if(raiseTimeout) clearTimeout(raiseTimeout);
        if(smokeTimeout) clearTimeout(smokeTimeout);
        
        if (userCoins < 30) {
            document.getElementById('insufficient-balance').querySelector('.ui-trans').innerText = (t.insufficient || "YETERSİZ BAKİYE (30 KOİN GEREKLİ)");
            document.getElementById('insufficient-balance').style.display = 'flex';
            setTimeout(() => { window.location.replace("oyun.html"); }, 3000);
            return;
        }
        startMatchmaking();
    }

    async function startMatchmaking() {
        matchmakingResolved = false;
        document.getElementById('match-timer').innerHTML = `<span class="ui-trans" data-key="waiting">${t.waiting}</span> <span id="timer-sec">(8s)</span>`;
        
        // API'den 30 coin düş
        try {
            await fetch(`${SERVER_URL}/api/user/deduct`, {
                method: 'POST', headers: getHeaders(), body: JSON.stringify({ uid: userDocId, amount: 30 })
            });
            userCoins -= 30;
            document.getElementById('my-coins').innerText = userCoins;
        } catch(e) { }

        socket.emit('join_queue', { mode: 'super_league', uid: userDocId, nickname: myNickname, country: 'TR' });
        
        let waitSec = 8;
        countdownInterval = setInterval(() => {
            if (matchmakingResolved) { clearInterval(countdownInterval); return; }
            waitSec--;
            if (waitSec > 0) {
                document.getElementById('match-timer').innerHTML = `<span class="ui-trans" data-key="waiting">${t.waiting}</span> <span id="timer-sec">(${waitSec}s)</span>`;
            }
        }, 1000);
    }

    function loadQuestion(qData) {
        activeQuestion = qData;
        document.getElementById('q-text').innerText = qData.q;
        const container = document.getElementById('ans-container');
        container.innerHTML = "";
        hasAnswered = false; isGameOver = false; timeLeft = 20; 
        myChoiceIdx = -1; oppChoiceIdx = -1;
        document.getElementById('timer-digital').innerText = "20";
        document.getElementById('timer-digital').classList.remove('timer-warning');
        document.getElementById('explanation-box').style.display = "none";
        document.getElementById('pot-amount').innerText = currentPot;
        
        renderInventory();
        
        qData.a.forEach((choice, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = "ans-container";
            wrapper.innerHTML = `<button class="ans-btn" id="ans-${i}">${choice}</button>
                                <span class="choice-label label-you" id="label-you-${i}">${t.you}</span>
                                <span class="choice-label label-opponent" id="label-opponent-${i}">${t.opp}</span>`;
            wrapper.querySelector('button').onclick = () => handleAnswer(i);
            container.appendChild(wrapper);
        });
        
        const raiseContainer = document.getElementById('raise-container');
        raiseContainer.style.display = 'flex';
        document.querySelectorAll('.raise-btn').forEach(b => b.classList.remove('closing'));
        clearTimeout(raiseTimeout);
        raiseTimeout = setTimeout(() => {
            document.querySelectorAll('.raise-btn').forEach(b => b.classList.add('closing'));
            setTimeout(() => { raiseContainer.style.display = 'none'; }, 400);
        }, 5000);
        
        startTimer();
    }

    window.raiseBet = async function(amount) {
        if (userCoins < amount) { 
            showRaiseWarning(t.insufficient || "Yetersiz Bakiye!"); 
            return; 
        }

        clearTimeout(raiseTimeout);
        document.querySelectorAll('.raise-btn').forEach(b => b.classList.add('closing'));
        setTimeout(() => { document.getElementById('raise-container').style.display = 'none'; }, 400);

        try {
            await fetch(`${SERVER_URL}/api/user/deduct`, { method: 'POST', headers: getHeaders(), body: JSON.stringify({ uid: userDocId, amount: amount }) });
            userCoins -= amount;
            document.getElementById('my-coins').innerText = userCoins;
        } catch(e) {}

        currentPot += amount * 2;
        triggerRaiseAnimation(amount * 2);
        document.getElementById('pot-amount').innerText = currentPot;

        if (!isBotDuel && currentMatchId) {
            socket.emit('raise_pot', { matchId: currentMatchId, amount: amount });
        }
    };

    function showRaiseWarning(msg) {
        const rw = document.getElementById('raise-warning');
        rw.innerText = msg;
        rw.style.display = 'block';
        setTimeout(() => { rw.style.display = 'none'; }, 2500);
    }

    function triggerRaise(amount) {
        currentPot += amount * 2;
        document.getElementById('pot-amount').innerText = currentPot;
        triggerRaiseAnimation(amount * 2);
    }

    function applyOpponentItem(itemType) {
        if (itemType === 'bomb') {
            const gameWrapper = document.getElementById('main-game-wrapper');
            gameWrapper.classList.add('smoke-blurred'); 
            clearTimeout(smokeTimeout);
            smokeTimeout = setTimeout(() => { gameWrapper.classList.remove('smoke-blurred'); }, 5000);
        } else if (itemType === 'time') {
            // Rakip zaman kullandıysa bize görsel bildirim gelebilir, ancak şu anlık bir şey yapmaya gerek yok
        }
    }

    function triggerRaiseAnimation(amount) {
        const floatText = document.getElementById('floating-raise-text');
        const potDisplay = document.getElementById('pot-display');
        
        floatText.innerText = `+ ${amount} ${t.added_coin || "Koin"}`;
        floatText.classList.remove('show');
        void floatText.offsetWidth; 
        floatText.classList.add('show');

        potDisplay.classList.add('pot-updated');
        setTimeout(() => { potDisplay.classList.remove('pot-updated'); }, 400);
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-digital').innerText = timeLeft;
            if (timeLeft <= 10 && timeLeft > 5 && !hasAnswered) {
                if (navigator.vibrate) navigator.vibrate([300, 200]);
                playAlarmSound(440, 0.2);
                document.body.classList.toggle('alarm-active');
            } else if (timeLeft <= 5 && timeLeft > 0 && !hasAnswered) {
                document.getElementById('timer-digital').classList.add('timer-warning');
                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50]);
                playAlarmSound(880, 0.1);
                document.body.classList.toggle('alarm-active');
            }
            if(timeLeft <= 0) { 
                clearInterval(timerInterval); stopEffects();
                if(!hasAnswered) handleAnswer(-1); 
            }
        }, 1000);
    }

    function handleAnswer(idx) {
        if(hasAnswered) return;
        hasAnswered = true; stopEffects();
        myChoiceIdx = idx;
        renderInventory(); 

        clearTimeout(raiseTimeout);
        document.querySelectorAll('.raise-btn').forEach(b => b.classList.add('closing'));
        setTimeout(() => { document.getElementById('raise-container').style.display = 'none'; }, 400);
        
        const btns = document.querySelectorAll('.ans-btn');
        btns.forEach((b, i) => { b.classList.add('locked'); if(i === idx) b.classList.add('selected-black'); });
        
        if (!isBotDuel) { 
            socket.emit('submit_answer', { matchId: currentMatchId, choice: idx });
        }
        checkRoundEnd();
    }

    async function revealSelections(myC, oppC) {
        const qData = activeQuestion;
        if(myC !== -1 && document.getElementById(`label-you-${myC}`)) document.getElementById(`label-you-${myC}`).style.display = "block";
        if(oppC !== -1 && document.getElementById(`label-opponent-${oppC}`)) document.getElementById(`label-opponent-${oppC}`).style.display = "block";
        const btns = document.querySelectorAll('.ans-btn');
        if(btns[qData.c]) btns[qData.c].classList.add('correct');
        if(myC !== -1 && myC !== qData.c && btns[myC]) btns[myC].classList.add('wrong');
        document.getElementById('exp-correct-ans').innerText = `${t.correct}: ` + qData.a[qData.c];
        document.getElementById('exp-text').innerText = qData.expl;
        document.getElementById('explanation-box').style.display = "block";
        
        setTimeout(() => finishFlow(myC, oppC), 5000);
    }

    async function finishFlow(myC, oppC) {
        const myCorrect = (myC !== -1 && myC === activeQuestion.c);
        const oppCorrect = (oppC !== -1 && oppC === activeQuestion.c);
        const myTimeout = (myC === -1);
        const oppTimeout = (oppC === -1);
        
        let myReward = 0;
        
        if (isBotDuel) {
            if (myCorrect) myReward = currentPot;
        } else {
            if (myTimeout && oppTimeout) { myReward = 0; } 
            else if (oppTimeout && !myTimeout) { myReward = Math.floor(currentPot * 0.75); } 
            else if (myTimeout && !oppTimeout) { myReward = 0; } 
            else {
                if (myCorrect && oppCorrect) { myReward = currentPot / 2; } 
                else if (myCorrect && !oppCorrect) { myReward = currentPot; } 
            }
        }

        let scoreChange = 0;
        if (myCorrect && !oppCorrect) { scoreChange = 3; } 
        else if (!myCorrect) { scoreChange = -1; }

        try {
            await fetch(`${SERVER_URL}/api/user/win`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ uid: userDocId, coins: myReward, score: scoreChange, isWin: (scoreChange >= 0) })
            });
            userCoins += myReward;
            document.getElementById('my-coins').innerText = userCoins;
        } catch(e) {}

        const won = (scoreChange > 0 || (scoreChange === 0 && myCorrect));
        const finalText = won ? getRandomItem(activeWinTexts) : getRandomItem(activeLoseTexts);
        
        showResult(won, finalText);
    }

    function showResult(win, customText) {
        const overlay = document.getElementById('result-overlay');
        const dynamicContent = document.getElementById('res-dynamic-content');
        overlay.style.display = 'flex';
        if (win) { dynamicContent.innerHTML = ''; triggerFireworks(); } 
        else { dynamicContent.innerHTML = `<div class="sad-logo-wrapper"></div>`; }
        document.getElementById('res-text').innerHTML = customText;
        setTimeout(() => { resetGame(); }, 4500); 
    }

    // UYGULAMAYI BAŞLAT
    init();
</script>
