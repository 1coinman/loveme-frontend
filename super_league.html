    const loseTextsByLang = { tr: ["BİR SONRAKİ SEFERE<br>SEN KAZANACAKSIN", "DÜNYANIN SONU DEĞİL,<br>HAYDİ TEKRAR DENE", "RAKİBİN ŞUAN<br>ÇOK MUTLU OLMALI", "KAYBETTİN ÜZGÜNÜM,<br>SANA GÜVENİYORDUM", "KAZANMANIN BİR YOLUNU<br>BULMALISIN", "SEN DAHA İYİ CEVAPLAR<br>VEREBİLİRSİN, SANA GÜVENİYORUM", "HEY! SONRAKİ TURU<br>SEN KAZANACAKSIN", "VAZGEÇMEK<br>YOK", "BU CEVABI<br>SENDEN BEKLEMEZDİM", "RAKİBİNİN ALAY ETMESİNE<br>İZİN VERME"] };
    const abandonWinTexts = { tr: "RAKİP KAÇTI!<br>HÜKMEN KAZANDINIZ!" };
    const activeWinTexts = winTextsByLang[userLangCode] || winTextsByLang['tr'];
    const activeLoseTexts = loseTextsByLang[userLangCode] || loseTextsByLang['tr'];
    const activeAbandonWinText = abandonWinTexts[userLangCode] || abandonWinTexts['tr'];

    // Global değişkenler
    let activeQuestion = null;
    let isMatchPlaying = false; 
    let userDocId = null, myNickname = null, userCoins = 0;
    let timerInterval = null, timeLeft = 20, isGameOver = false, hasAnswered = false; 
    let currentMatchId = null, myPlayerKey = null, opponentPlayerKey = null;
    let isBotDuel = false;
    let matchmakingResolved = false;
    let hasAbandoned = false;
    let countdownInterval = null;
    let raiseTimeout = null;
    let currentPot = 10; 
    let myChoiceIdx = -1;
    let oppChoiceIdx = -1;
    let myInventory = { bomb: 0, mask: 0, time: 0, joker: 0 };
    const invIcons = { bomb: '<i class="fa-solid fa-bomb"></i>', mask: '<i class="fa-solid fa-mask-ventilator"></i>', time: '<i class="fa-solid fa-stopwatch"></i>', joker: '<i class="fa-solid fa-masks-theater"></i>' };
    let smokeTimeout = null;

    function getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function updateStatus(messageKey) { const bar = document.getElementById('bg-status-bar'); bar.innerText = t[messageKey] || messageKey; bar.style.display = 'block'; setTimeout(() => bar.style.display = 'none', 3000); }
    function stopEffects() { document.body.classList.remove('alarm-active'); }
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function unlockAudio() { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }
    document.body.addEventListener('touchstart', unlockAudio, { once: true });
    document.body.addEventListener('click', unlockAudio, { once: true });
    function playAlarmSound(freq, duration) { if(audioCtx.state === 'suspended') audioCtx.resume(); const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + duration); }

    function ensureInventoryDOM() {
        const container = document.getElementById('inventory-container');
        if (container.children.length === 0) {
            const order = ['bomb', 'mask', 'time', 'joker'];
            order.forEach(type => {
                let wrap = document.createElement('div');
                wrap.id = `inv-wrap-${type}`;
                wrap.className = 'inv-wrapper';
                let btn = document.createElement('div');
                btn.id = `inv-btn-${type}`;
                btn.className = 'inv-btn';
                btn.innerHTML = `${invIcons[type]}<div class="inv-badge" id="inv-badge-${type}">0</div>`;
                btn.onclick = () => window.useInventoryItem(type);
                wrap.appendChild(btn);
                container.appendChild(wrap);
            });
        }
    }
    function renderInventory() {
        ensureInventoryDOM(); 
        const order = ['bomb', 'mask', 'time', 'joker'];
        order.forEach((type) => {
            let wrap = document.getElementById(`inv-wrap-${type}`);
            let badge = document.getElementById(`inv-badge-${type}`);
            let count = myInventory[type] || 0;
            if (count > 0 && isMatchPlaying && !hasAnswered) {
                badge.innerText = count;
                wrap.classList.add('active');
            } else {
                wrap.classList.remove('active');
            }
        });
    }
    window.useInventoryItem = async function(type) {
        if (!userDocId || myInventory[type] <= 0 || hasAnswered) return;
        if (!isBotDuel && !currentMatchId) return;
        myInventory[type] -= 1;
        renderInventory();
        const btn = document.getElementById(`inv-btn-${type}`);
        if(btn) { btn.classList.remove('use-pulse'); void btn.offsetWidth; btn.classList.add('use-pulse'); }
        try {
            await fetch(`${SERVER_URL}/api/user/deduct-item`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getAuthToken()}` },
                body: JSON.stringify({ uid: userDocId, itemId: type })
            });
        } catch(e) { }
        if (type === 'bomb') { if (!isBotDuel) socket.emit('use_item', { matchId: currentMatchId, item: 'bomb' }); } 
        else if (type === 'mask') { clearTimeout(smokeTimeout); document.getElementById('main-game-wrapper').classList.remove('smoke-blurred'); }
        else if (type === 'time') { timeLeft += 10; const timerEl = document.getElementById('timer-digital'); timerEl.innerText = timeLeft; timerEl.classList.remove('timer-warning'); timerEl.classList.remove('timer-add-pulse'); void timerEl.offsetWidth; timerEl.classList.add('timer-add-pulse'); const wrapper = document.getElementById('timer-wrapper'); const floatText = document.createElement('div'); floatText.className = 'time-float-anim'; floatText.innerText = `+10`; wrapper.appendChild(floatText); setTimeout(() => { timerEl.classList.remove('timer-add-pulse'); }, 500); setTimeout(() => { if(floatText.parentNode) floatText.remove(); }, 1200); if (!isBotDuel) socket.emit('use_item', { matchId: currentMatchId, item: 'time' }); }
        else if (type === 'joker') { if (activeQuestion) handleAnswer(activeQuestion.c); }
    };
    window.toggleChatMenu = function() {
        const menu = document.getElementById('chat-menu-overlay');
        const bg = document.getElementById('chat-bg-catcher');
        if (menu.classList.contains('active')) { menu.classList.remove('active'); bg.style.display = 'none'; } 
        else { menu.classList.add('active'); bg.style.display = 'block'; }
    };
    window.sendChat = function(msgKey) {
        displayChatBubble(msgKey, true);
        if (currentMatchId && !isBotDuel) socket.emit('player_taunt', { matchId: currentMatchId, message: msgKey });
    };
    function displayChatBubble(msgKey, isMe) {
        const container = document.getElementById('chat-bubbles-container');
        const text = t[msgKey];
        if(!text) return;
        const existingBubbles = container.querySelectorAll('.chat-bubble');
        existingBubbles.forEach(b => { b.classList.add('pushed'); if(existingBubbles.length > 1) { if(!b.classList.contains('fading')) { b.classList.add('fading'); setTimeout(() => { if (b.parentNode) b.remove(); }, 500); } } });
        const bubble = document.createElement('div');
        bubble.className = isMe ? 'chat-bubble bubble-me' : 'chat-bubble bubble-opp';
        bubble.innerText = text;
        container.insertBefore(bubble, container.firstChild);
        setTimeout(() => { if (bubble && bubble.parentNode) { bubble.classList.add('fading'); setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 500); } }, 4000);
    }
    function triggerFireworks() { var duration = 4000; var animationEnd = Date.now() + duration; var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 }; function randomInRange(min, max) { return Math.random() * (max - min) + min; } var interval = setInterval(function() { var timeLeft = animationEnd - Date.now(); if (timeLeft <= 0) return clearInterval(interval); var particleCount = 50 * (timeLeft / duration); if(window.confetti) { confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } })); confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } })); } }, 250); }
    function triggerRaiseAnimation(amount) {
        const floatText = document.getElementById('floating-raise-text');
        const potDisplay = document.getElementById('pot-display');
        floatText.innerText = `+ ${amount} ${t.added_coin || "Koin"}`;
        floatText.classList.remove('show'); void floatText.offsetWidth; floatText.classList.add('show');
        potDisplay.classList.add('pot-updated');
        setTimeout(() => potDisplay.classList.remove('pot-updated'), 400);
    }
    window.raiseBet = async function(amount) {
        if (userCoins < amount) { const rw = document.getElementById('raise-warning'); rw.innerText = t.insufficient; rw.style.display = 'block'; setTimeout(() => rw.style.display = 'none', 2500); return; }
        clearTimeout(raiseTimeout);
        document.querySelectorAll('.raise-btn').forEach(b => b.classList.add('closing'));
        setTimeout(() => document.getElementById('raise-container').style.display = 'none', 400);
        const token = getAuthToken();
        try {
            await fetch(`${SERVER_URL}/api/user/deduct`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ uid: userDocId, amount })
            });
            userCoins -= amount;
            document.getElementById('my-coins').innerText = userCoins;
        } catch(e) {}
        currentPot += amount * 2;
        triggerRaiseAnimation(amount * 2);
        document.getElementById('pot-amount').innerText = currentPot;
        if (!isBotDuel && currentMatchId) socket.emit('raise_pot', { matchId: currentMatchId, amount });
    };
    function applyOpponentItem(itemType) {
        if (itemType === 'bomb') {
            document.getElementById('main-game-wrapper').classList.add('smoke-blurred');
            clearTimeout(smokeTimeout);
            smokeTimeout = setTimeout(() => document.getElementById('main-game-wrapper').classList.remove('smoke-blurred'), 5000);
        }
    }
    function startTimer() { /* aynı */ }
    function loadQuestion(qData) { /* aynı */ }
    function handleAnswer(idx) { /* aynı */ }
    function checkRoundEnd() { /* aynı */ }
    async function revealSelections(myC, oppC) { /* aynı */ }
    async function finishFlow(myC, oppC) { /* aynı */ }
    function showResult(win, customText) { /* aynı */ }
    async function handleAbandon(isOpponent = false) { /* aynı */ }
    function resetGame() { /* aynı */ }

    // ========== SORU ÇEKME (SADECE SUPABASE) ==========
    async function fetchQuestionFromSupabase() {
        const token = getAuthToken();
        if (!token) throw new Error("Token yok");
        const res = await fetch(`${SERVER_URL}/api/get-question/super_league/${userDocId}`, {
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        return {
            id: data.id,
            q: data.question_text,
            a: data.options,
            c: data.correct_option,
            expl: data.explanation,
            difficulty: data.difficulty || 1,
            lang: 'tr'
        };
    }

    async function translateQuestion(qData, targetLangName) { /* aynı */ }

    async function prepareAndPlay(incomingQ) {
        let finalQ = incomingQ;
        if (finalQ.lang !== userLangCode) finalQ = await translateQuestion(finalQ, userLangName);
        isMatchPlaying = true;
        document.getElementById('matching-ui').style.display = 'none';
        document.getElementById('question-ui').style.display = 'flex';
        document.getElementById('chat-trigger-bar').style.display = 'flex';
        renderInventory();
        loadQuestion(finalQ);
    }

    function setupSocketListeners() {
        socket.on('match_found', async (data) => {
            matchmakingResolved = true;
            if(countdownInterval) clearInterval(countdownInterval);
            document.getElementById('matching-status-text').innerText = t.preparing;
            currentMatchId = data.matchId;
            myPlayerKey = data.role;
            opponentPlayerKey = myPlayerKey === 'player1' ? 'player2' : 'player1';
            const oppData = data[opponentPlayerKey];
            document.getElementById('match-timer').innerText = oppData.nickname;
            if(myPlayerKey === 'player1') {
                try {
                    const q = await fetchQuestionFromSupabase();
                    socket.emit('share_question', { matchId: currentMatchId, question: q });
                    await prepareAndPlay(q);
                } catch(err) {
                    document.getElementById('matching-status-text').innerText = "SORU ALINAMADI! Lobiye dönülüyor...";
                    setTimeout(() => window.location.replace("oyun.html"), 3000);
                }
            }
        });
        socket.on('receive_question', async (data) => {
            if(myPlayerKey === 'player2') await prepareAndPlay(data.question);
        });
        socket.on('match_found_with_bot', async (data) => {
            matchmakingResolved = true;
            if(countdownInterval) clearInterval(countdownInterval);
            document.getElementById('matching-status-text').innerText = t.preparing;
            isBotDuel = true;
            currentMatchId = data.matchId;
            document.getElementById('match-timer').innerText = data.bot.nickname;
            try {
                const q = await fetchQuestionFromSupabase();
                socket.emit('bot_start_round', { matchId: currentMatchId, question: q, difficulty: q.difficulty, currentPot: 10 });
                await prepareAndPlay(q);
            } catch(err) {
                document.getElementById('matching-status-text').innerText = "SORU ALINAMADI! Lobiye dönülüyor...";
                setTimeout(() => window.location.replace("oyun.html"), 3000);
            }
        });
        socket.on('opponent_answer', (data) => { oppChoiceIdx = data.choice; checkRoundEnd(); });
        socket.on('bot_answer', (data) => { oppChoiceIdx = data.answer; checkRoundEnd(); });
        socket.on('opponent_raise', (data) => { currentPot += data.amount * 2; document.getElementById('pot-amount').innerText = currentPot; triggerRaiseAnimation(data.amount * 2); });
        socket.on('bot_raise_pot', (data) => { currentPot += data.amount * 2; document.getElementById('pot-amount').innerText = currentPot; triggerRaiseAnimation(data.amount * 2); });
        socket.on('opponent_item', (data) => applyOpponentItem(data.item));
        socket.on('bot_use_item', (data) => applyOpponentItem(data.item));
        socket.on('opponent_taunt', (data) => displayChatBubble(data.message, false));
        socket.on('bot_taunt', (data) => displayChatBubble(data.message, false));
        socket.on('opponent_disconnected', () => handleAbandon(true));
    }

    async function startMatchmaking() {
        matchmakingResolved = false;
        document.getElementById('matching-status-text').innerText = t.searching;
        document.getElementById('match-timer').innerHTML = `<span class="ui-trans" data-key="waiting">${t.waiting}</span> <span id="timer-sec">(8s)</span>`;
        const token = getAuthToken();
        try {
            await fetch(`${SERVER_URL}/api/user/deduct`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ uid: userDocId, amount: 30 })
            });
            userCoins -= 30;
            document.getElementById('my-coins').innerText = userCoins;
        } catch(e) {}
        socket.emit('join_queue', { mode: 'super_league', uid: userDocId, nickname: myNickname, country: 'TR' });
        let waitSec = 8;
        countdownInterval = setInterval(() => {
            if (matchmakingResolved) { clearInterval(countdownInterval); return; }
            waitSec--;
            if (waitSec > 0) document.getElementById('match-timer').innerHTML = `<span class="ui-trans" data-key="waiting">${t.waiting}</span> <span id="timer-sec">(${waitSec}s)</span>`;
        }, 1000);
    }

    async function init() {
        const statusEl = document.getElementById('matching-status-text');
        statusEl.innerText = "TOKEN KONTROL EDİLİYOR...";
        let token = getAuthToken();
        if (!token) {
            statusEl.innerText = "HATA: TOKEN BULUNAMADI! Lobiye yönlendiriliyorsunuz...";
            setTimeout(() => window.location.replace("oyun.html"), 3000);
            return;
        }
        statusEl.innerText = "SUNUCUYA BAĞLANILIYOR...";
        try {
            const meRes = await fetch(`${SERVER_URL}/api/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!meRes.ok) throw new Error("Auth başarısız");
            const meData = await meRes.json();
            userDocId = meData.user.id;
            const userRes = await fetch(`${SERVER_URL}/api/user/${userDocId}`, { headers: { 'Authorization': `Bearer ${token}` } });
            const userData = await userRes.json();
            myNickname = userData.nickname;
            const freeCoins = Number(userData.free_coins) || 0;
            const paidCoins = Number(userData.paid_coins) || Number(userData.coins) || 0;
            userCoins = freeCoins + paidCoins;
            document.getElementById('my-coins').innerText = userCoins;
            document.getElementById('my-score').innerText = userData.super_league_stats?.score || 0;
            const inv = userData.inventory || {};
            myInventory = { bomb: inv.bomb || 0, mask: inv.mask || 0, time: inv.time || 0, joker: inv.joker || 0 };
            renderInventory();
            const needsEntryFee = !userData.has_entered_super_league;
            const requiredCoins = needsEntryFee ? 380 : 30;
            if (userCoins < requiredCoins) {
                const msg = needsEntryFee ? "SÜPER LİG GİRİŞ (350) + OYUN (30) İÇİN YETERSİZ BAKİYE" : "YETERSİZ BAKİYE (30 KOİN GEREKLİ)";
                document.getElementById('insufficient-balance').querySelector('.ui-trans').innerText = msg;
                document.getElementById('insufficient-balance').style.display = 'flex';
                setTimeout(() => window.location.replace("oyun.html"), 4000);
                return;
            }
            if (needsEntryFee) {
                const enterRes = await fetch(`${SERVER_URL}/api/league/enter`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ uid: userDocId }) });
                if (!enterRes.ok) throw new Error("Lige giriş başarısız");
                userCoins -= 350;
                document.getElementById('my-coins').innerText = userCoins;
            }
            document.querySelectorAll('.raise-btn').forEach(btn => { btn.onclick = () => window.raiseBet(parseInt(btn.getAttribute('data-val'))); });
            socket = io(SERVER_URL);
            updateStatus("sys_conn");
            setupSocketListeners();
            startMatchmaking();
        } catch (error) {
            statusEl.innerText = "SİSTEM HATASI: " + error.message;
        }
    }
    init();
