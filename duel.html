<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="icon" type="image/png" href="logo/LoveMe.png">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script>
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if ([123, 73, 74, 85, 83, 80].includes(e.keyCode) && (e.ctrlKey || e.keyCode === 123)) { 
                e.preventDefault(); return false; 
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LOVEME - Düello</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <style>
        /* =========================================
           1. ZEMİN, FONTLAR VE RENK PALETİ
           Arkaplan: #e0e5ec
           Ana Metin: #55595c
           Kırmızı (Hata/Uyarı/Rakip): #e64a61
           Yeşil (Doğru/Kazanç): #6fb98f
        ========================================= */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; touch-action: manipulation; }
        html, body { width: 100%; height: 100%; height: 100dvh; overflow: hidden !important; background-color: #e0e5ec; color: #55595c; position: fixed; top: 0; left: 0; right: 0; bottom: 0; transition: background-color 0.3s ease; overscroll-behavior: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-touch-callout: none; }
        img { pointer-events: none; }
        
        .game-wrapper { display: flex; flex-direction: column; height: 100dvh; width: 100%; justify-content: flex-start; align-items: center; padding: 10px 0 40px 0; overflow: hidden; touch-action: none; transition: filter 0.8s ease; }
        .smoke-blurred { filter: blur(12px) grayscale(50%); pointer-events: none; }
        
        .header-stats { width: 100%; display: flex; justify-content: center; align-items: center; padding: 10px 0 5px 0; z-index: 10; flex-shrink: 0; }
        .coin-display { font-weight: 900; font-size: 22px; display: flex; align-items: center; gap: 8px; color: #55595c; transition: color 0.3s; z-index: 100; }
        
        /* Neumorphism Skor Tablosu */
        .scoreboard-container { display: none; justify-content: center; align-items: center; gap: 15px; width: 100%; z-index: 10; margin-bottom: 10px; }
        .score-box { display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #e0e5ec; color: #55595c; padding: 8px 14px; border-radius: 15px; box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.6), -5px -5px 10px rgba(255, 255, 255, 0.5); min-width: 80px; max-width: 100px; opacity: 0; transform: translateY(20px); transition: all 0.4s ease; }
        .score-box.anim-in { animation: scoreSlideUpElastic 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
        .score-box:nth-child(1) { animation-delay: 0.1s; }
        .score-box.score-leading { box-shadow: inset 4px 4px 8px rgba(163, 177, 198, 0.6), inset -4px -4px 8px rgba(255, 255, 255, 0.5); color: #6fb98f; }
        .score-divider { font-family: 'Digital Numbers', sans-serif; font-size: 20px; font-weight: 900; color: #55595c; opacity: 0; transform: translateY(20px); }
        .score-divider.anim-in { animation: scoreSlideUpElastic 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55) 0.2s forwards; }
        .score-box:nth-child(3) { animation-delay: 0.3s; }
        @keyframes scoreSlideUpElastic { 0% { opacity: 0; transform: translateY(20px) scale(0.9); } 70% { transform: translateY(-5px) scale(1.05); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .score-name { font-size: 12px; font-weight: 900; margin-bottom: 4px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }
        .score-number { font-family: 'Digital Numbers', sans-serif; font-size: 24px; line-height: 1; }
        .rematch-scoreboard { margin-top: 15px; margin-bottom: 0; }

        /* Main stage */
        .main-stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 0; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; padding-bottom: 20px; }
        .main-stage::-webkit-scrollbar { display: none; }

        /* Ana Kapsayıcı Merkezi Hizalama */
        #matching-ui { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            text-align: center; 
            position: relative; 
        }

        /* Dalga Animasyonunun Merkezi Bölgesi */
        .milk-ripple-container { 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 220px; 
            height: 220px; 
            border-radius: 50%; 
            z-index: 1; 
        }

        /* Neumorphic Dalga Efekti */
        .milk-wave { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            border-radius: 50%; 
            background: #e0e5ec; 
            box-shadow: 15px 15px 30px rgba(163, 177, 198, 0.4), 
                        -15px -15px 30px rgba(255, 255, 255, 0.7), 
                        inset 10px 10px 20px rgba(163, 177, 198, 0.3), 
                        inset -10px -10px 20px rgba(255, 255, 255, 0.6); 
            opacity: 0; 
            pointer-events: none; 
            z-index: -1; 
            animation: milkRipple 6s infinite cubic-bezier(0.3, 0, 0.2, 1); 
        }

        /* Dalgaların Gecikme Süreleri */
        .milk-wave-1 { animation-delay: 0s; }
        .milk-wave-2 { animation-delay: 2s; }
        .milk-wave-3 { animation-delay: 4s; }

        @keyframes milkRipple { 
            0% { width: 220px; height: 220px; opacity: 0; } 
            30% { opacity: 1; } 
            100% { width: 480px; height: 480px; opacity: 0; } 
        }

        /* Logo Maskeleme ve Esneme Animasyonu */
        .logo-box { 
            width: 60px; 
            height: 60px; 
            margin-bottom: 12px; 
            background-color: #55595c; 
            -webkit-mask: url('logo/loveme.svg') no-repeat center; 
            mask: url('logo/loveme.svg') no-repeat center; 
            -webkit-mask-size: contain; 
            mask-size: contain; 
            animation: elastic-glow 1.8s infinite ease-in-out; 
        }

        @keyframes elastic-glow { 
            0%, 100% { transform: scale(1); background-color: #55595c; } 
            50% { transform: scale(1.25); background-color: #e64a61; } 
        }

        /* Tipografi - "Sistem Başlatılıyor" */
        .matching-status { 
            font-weight: 600; 
            font-size: 13px; 
            color: #55595c; 
            margin-bottom: 6px; 
            letter-spacing: 0.5px; 
        }

        /* Tipografi - "Bekleniyor" Alt Metni */
        .opponent-info { 
            font-weight: 600; 
            font-size: 11px; 
            color: #888; 
            min-height: 20px; 
            letter-spacing: 0.5px; 
        }

        /* Mobil Ekranlar İçin Düzenlemeler */
        @media (max-height: 650px) { 
            .logo-box { width: 50px; height: 50px; margin-bottom: 8px; } 
        }
        
        #timer-wrapper { position: relative; margin-bottom: 20px; }
        #timer-digital { font-family: 'Digital Numbers', sans-serif; font-size: 42px; font-weight: 900; color: #55595c; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        .timer-warning { color: #e64a61 !important; animation: timer-pulse 0.5s infinite alternate; }
        @keyframes timer-pulse { from { transform: scale(1); } to { transform: scale(1.2); } }
        .timer-add-pulse { color: #6fb98f !important; transform: scale(1.4); }
        .time-float-anim { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); color: #6fb98f; font-weight: 900; font-size: 24px; pointer-events: none; opacity: 0; font-family: 'Digital Numbers', sans-serif; animation: timeFloatUp 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes timeFloatUp { 0% { opacity: 0; transform: translate(-50%, 30px) scale(0.5); } 30% { opacity: 1; transform: translate(-50%, -10px) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -40px) scale(1); } }

        #question-ui { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 320px; position: relative; margin: 0 auto; padding-top: 20px;}
        .q-text { font-size: 17px; font-weight: 800; text-align: center; margin-bottom: 20px; color: #55595c; transition: color 0.3s; padding: 0 15px; }
        
        /* =========================================
           2. CEVAP KUTULARI (Neumorphism)
        ========================================= */
        .answers-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; padding: 0 20px; }
        .ans-container { position: relative; width: 100%; }
        
        .ans-btn { 
            width: 100%; background: #e0e5ec; border: none; border-radius: 40px; 
            box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5); 
            color: #55595c; padding: 15px 10px; font-size: 14px; font-weight: 800; cursor: pointer; 
            transition: all 0.3s; min-height: 52px; display: flex; align-items: center; justify-content: center; text-align: center; 
            word-wrap: break-word; line-height: 1.2; 
        }
        .ans-btn:not(.locked):hover { box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); }
        .ans-btn.selected-black { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7) !important; color: #55595c !important; }
        .ans-btn.selected-opponent { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7) !important; color: #e64a61 !important; }
        .ans-btn.correct { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7) !important; color: #6fb98f !important; }
        .ans-btn.wrong { box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7) !important; color: #e64a61 !important; opacity: 0.7; }
        .ans-btn.locked { pointer-events: none; }

        .choice-label { position: absolute; bottom: -12px; font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 10px; display: none; z-index: 5; text-transform: uppercase; background: #e0e5ec; box-shadow: 2px 2px 5px rgba(163,177,198,0.6), -2px -2px 5px rgba(255,255,255,0.5); }
        .label-you { color: #55595c; }
        .label-opponent { color: #e64a61; }
        body[dir="ltr"] .label-you { left: 10px; }
        body[dir="ltr"] .label-opponent { right: 10px; }
        body[dir="rtl"] .label-you { right: 10px; }
        body[dir="rtl"] .label-opponent { left: 10px; }

        /* Alarm/Süre Sonu Stili */
        body.alarm-active { background-color: #e64a61; }
        body.alarm-active .coin-display, body.alarm-active .q-text, body.alarm-active #timer-digital { color: #fff !important; }
        body.alarm-active .ans-btn { background: transparent; color: #fff; box-shadow: none; border: 2px solid #fff; }

        /* =========================================
           3. POT & BAHİS
        ========================================= */
        .pot-container { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 20px; z-index: 10; position: relative; gap: 15px; min-height: 80px; }
        .pot-display { background: #e0e5ec; color: #55595c; padding: 12px 40px; border-radius: 40px; font-size: 16px; font-weight: 900; box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5); transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        .pot-display.pot-updated { transform: scale(1.2); box-shadow: inset 6px 6px 10px rgba(163, 177, 198, 0.7), inset -6px -6px 10px rgba(255, 255, 255, 0.7); color: #6fb98f; }
        
        #raise-container { display: flex; width: 100%; flex-direction: column; align-items: center; gap: 10px; max-height: 0; opacity: 0; overflow: hidden; pointer-events: none; transition: max-height 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55), opacity 0.4s ease, margin-top 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55), padding 0.6s ease; }
        #raise-container.active { max-height: 250px; opacity: 1; margin-top: 15px; pointer-events: auto; padding: 10px 5px 20px 5px; }
        .raise-title { font-size: 12px; font-weight: 900; text-transform: uppercase; color: #e64a61; animation: fade-in 0.5s; }
        .raise-grid { display: flex; gap: 10px; width: 100%; max-width: 300px; justify-content: center; }
        .raise-btn { flex: 1; background: #e0e5ec; color: #55595c; border: none; box-shadow: 4px 4px 8px rgba(163, 177, 198, 0.6), -4px -4px 8px rgba(255, 255, 255, 0.5); padding: 12px 0; font-size: 14px; font-weight: 900; cursor: pointer; border-radius: 15px; transition: 0.2s; opacity: 0; transform: translateY(30px); animation: slideUpElastic 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
        .raise-btn:active { box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); }
        .raise-btn.closing { animation: slideDownFade 0.4s forwards !important; }
        
        /* EKSİK OLAN ANİMASYON EKLENDİ */
        @keyframes slideUpElastic {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); }
            70% { opacity: 1; transform: translateY(-5px) scale(1.05); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideDownFade { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(30px) scale(0.9); } }
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        
        .floating-text { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 14px; font-weight: 900; color: #6fb98f; text-transform: uppercase; opacity: 0; pointer-events: none; z-index: 50; white-space: nowrap; }
        .floating-text.show { animation: float-up-fade 2s ease-out forwards; }
        @keyframes float-up-fade { 0% { opacity: 0; transform: translate(-50%, 10px); } 20% { opacity: 1; transform: translate(-50%, 0); } 80% { opacity: 1; transform: translate(-50%, -15px); } 100% { opacity: 0; transform: translate(-50%, -25px); } }

        /* =========================================
           4. ENVANTER
        ========================================= */
        #inventory-container { position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column-reverse; z-index: 9506; pointer-events: none; gap: 10px;}
        .inv-wrapper { height: 0; margin-top: 0; opacity: 0; transform: scale(0); transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .inv-wrapper.active { height: 50px; margin-top: 10px; opacity: 1; transform: scale(1); pointer-events: auto; }
        .inv-btn { width: 50px; height: 50px; border-radius: 50%; background: #e0e5ec; color: #55595c; border: none; box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.6), -5px -5px 10px rgba(255, 255, 255, 0.5); display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; transition: 0.2s;}
        .inv-btn:active { box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); }
        .inv-btn.use-pulse { animation: invUsePulse 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        .inv-badge { position: absolute; bottom: -4px; left: -4px; background: #e0e5ec; color: #55595c; box-shadow: 2px 2px 5px rgba(163,177,198,0.6), -2px -2px 5px rgba(255,255,255,0.5); border-radius: 50%; width: 22px; height: 22px; font-size: 11px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        @keyframes invUsePulse { 50% { transform: scale(1.3); box-shadow: inset 5px 5px 10px rgba(163,177,198,0.7), inset -5px -5px 10px rgba(255,255,255,0.7); color: #6fb98f; } }

        /* =========================================
           5. RAKİBİ KIZDIR & CHAT
        ========================================= */
        #chat-trigger-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 180px; height: 40px; background-color: #e0e5ec; color: #55595c; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0px -5px 10px rgba(163, 177, 198, 0.4), 0px 0px 10px rgba(255, 255, 255, 0.5); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; letter-spacing: 1px; cursor: pointer; z-index: 500; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: none; }
        #chat-bg-catcher { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 500; display: none; }
        #chat-menu-overlay { position: fixed; bottom: 0; left: 0; width: 100%; height: 40vh; max-height: 300px; background-color: #e0e5ec; z-index: 501; border-top-left-radius: 30px; border-top-right-radius: 30px; box-shadow: 0 -15px 30px rgba(163, 177, 198, 0.5); transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 15px 15px 0 15px; pointer-events: none; }
        #chat-menu-overlay.active { transform: translateY(0); pointer-events: auto; }
        .chat-close-handle { width: 40px; height: 5px; background: #a3b1c6; border-radius: 3px; margin-bottom: 15px; cursor: pointer; flex-shrink: 0; }
        .chat-options-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; flex: 1; overflow-y: auto; padding-bottom: 25px; touch-action: pan-y !important; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; scrollbar-width: none; -ms-overflow-style: none; }
        .chat-options-grid::-webkit-scrollbar { display: none; }
        .chat-option-btn { flex-shrink: 0; min-height: 48px; background: transparent; border: none; font-size: clamp(14px, 4vw, 16px); font-weight: 900; color: #55595c; cursor: pointer; text-transform: uppercase; padding: 10px; transition: 0.2s; border-radius: 15px; }
        .chat-option-btn:active { background: rgba(163, 177, 198, 0.3); color: #e64a61; transform: scale(0.95); }
        
        #chat-bubbles-container { position: fixed; top: 0; right: 0; width: 220px; height: auto; min-height: 10px; pointer-events: none; z-index: 9999; display: flex; flex-direction: column; align-items: flex-end; margin: 0; padding: 0; overflow: hidden; }
        body[dir="rtl"] #chat-bubbles-container { right: auto; left: 0; align-items: flex-start; }
        .chat-bubble { padding: 10px 16px; font-size: 12px; font-weight: 900; line-height: 1.3; text-align: center; max-width: 100%; margin: 0; margin-bottom: 10px; transform-origin: top right; animation: bubble-pop 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1), opacity 0.5s ease; box-shadow: 4px 4px 10px rgba(163,177,198,0.5), -4px -4px 10px rgba(255,255,255,0.5); }
        body[dir="rtl"] .chat-bubble { transform-origin: top left; }
        .bubble-me { background-color: #e0e5ec; color: #55595c; border-radius: 20px 0 20px 20px; }
        body[dir="rtl"] .bubble-me { border-radius: 20px 20px 0 20px; }
        .bubble-opp { background-color: #e0e5ec; color: #e64a61; border-radius: 20px 0 20px 20px; }
        body[dir="rtl"] .bubble-opp { border-radius: 20px 20px 0 20px; }
        .chat-bubble.fading { opacity: 0; transform: translateY(30px) scale(0.8); }

        /* =========================================
           6. SONUÇ VE AÇIKLAMA EKRANLARI
        ========================================= */
        #rematch-overlay, #explanation-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(224, 229, 236, 0.96); z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.4s ease; padding: 20px; text-align: center; }
        #rematch-overlay.show, #explanation-overlay.show { opacity: 1; display: flex; }
        
        .modern-box, .exp-oval-box { background: #e0e5ec; border-radius: 40px; box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5); padding: 40px 25px; text-align: center; }
        .modern-box { width: 100%; max-width: 360px; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: iosGenieIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .exp-oval-box { width: 85%; max-width: 360px; transform: scale(0.1) translateY(200px); }
        
        #exp-oval-title { color: #6fb98f; font-weight: 900; font-size: 18px; margin-bottom: 15px; }
        #exp-oval-text { color: #55595c; font-size: 15px; font-weight: 700; line-height: 1.5; }

        .rematch-title { font-size: 24px; font-weight: 900; line-height: 1.4; color: #55595c; margin-bottom: 30px; }
        .rematch-actions { display: flex; gap: 12px; width: 100%; max-width: 320px; }
        .btn-leave { flex: 1; padding: 15px; background: #e0e5ec; color: #55595c; border: none; box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.6), -5px -5px 10px rgba(255, 255, 255, 0.5); font-weight: 900; font-size: 14px; cursor: pointer; border-radius: 15px; transition: 0.2s; }
        .btn-leave:active { box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); }
        .btn-rematch { flex: 1; padding: 15px; background: #e0e5ec; color: #55595c; border: none; box-shadow: 5px 5px 10px rgba(163, 177, 198, 0.6), -5px -5px 10px rgba(255, 255, 255, 0.5); font-weight: 900; font-size: 14px; cursor: pointer; border-radius: 15px; transition: 0.2s; }
        .btn-rematch:active { box-shadow: inset 3px 3px 6px rgba(163, 177, 198, 0.6), inset -3px -3px 6px rgba(255, 255, 255, 0.5); }

        @keyframes sad-wobble { 0%, 100% { transform: translateY(0) scale(1); opacity: 0.7; } 50% { transform: translateY(15px) scale(0.95); opacity: 0.3; } }
        
        #waiting-opponent-alert { display: none; color: #e64a61; font-size: 14px; font-weight: 900; margin: 20px auto 0 auto; text-align: center; width: 100%; animation: text-blink 1.2s infinite; letter-spacing: 1px; }
        @keyframes text-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* =========================================
           DİĞER ANİMASYONLAR & COIN ANIMATION
        ========================================= */
        .intro-hidden { opacity: 0; pointer-events: none; }
        .anim-smoke-in { animation: smokeIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; opacity: 0; }
        .anim-smoke-out { animation: smokeOut 0.5s ease-in forwards; }
        .anim-genie-in, .exp-slide-in { animation: iosGenieIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .anim-genie-out, .exp-slide-out { animation: iosGenieOut 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes smokeIn { 0% { filter: blur(12px) grayscale(100%); opacity: 0; transform: scale(0.9); } 100% { filter: blur(0); opacity: 1; transform: scale(1); } }
        @keyframes smokeOut { 0% { filter: blur(0); opacity: 1; transform: scale(1); } 100% { filter: blur(10px); opacity: 0; transform: scale(0.9); } }
        @keyframes iosGenieIn { 0% { opacity: 0; transform: scale(0.1) translateY(200px); } 60% { opacity: 1; transform: scale(1.05) translateY(-10px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes iosGenieOut { 0% { opacity: 1; transform: scale(1) translateY(0); } 40% { opacity: 1; transform: scale(1.05) translateY(-10px); } 100% { opacity: 0; transform: scale(0.1) translateY(200px); } }
        @keyframes bubble-pop { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeOutDown { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(20px); } }
        .fade-out-down { animation: fadeOutDown 0.5s forwards !important; }

        /* Round Transition & Toast */
        #round-transition-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #e0e5ec; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        .round-num-text { font-family: 'Digital Numbers', sans-serif; font-size: 110px; font-weight: 900; color: #6fb98f; opacity: 0; line-height: 1; margin-bottom: 10px; }
        .round-duel-text { font-size: 30px; font-weight: 900; color: #6fb98f; letter-spacing: 20px; margin-right: -20px; opacity: 0; }
        .anim-elastic-grow { animation: elasticGrowFade 2.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
        .anim-elastic-grow-delay { animation: elasticGrowFade 2.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) 0.1s forwards; }
        @keyframes elasticGrowFade { 0% { transform: scale(0); opacity: 0; } 20% { transform: scale(1.1); opacity: 1; } 60% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
        
        #insufficient-toast { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, 50px); background: #e0e5ec; color: #55595c; padding: 20px 40px; border-radius: 15px; box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5); font-size: 18px; font-weight: 900; text-align: center; z-index: 100000; opacity: 0; pointer-events: none; }
        .toast-animate-in { display: flex !important; align-items: center; justify-content: center; animation: toastElasticIn 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards; }
        .toast-animate-out { display: flex !important; align-items: center; justify-content: center; animation: toastSlideUpOut 0.5s ease forwards; }
        @keyframes toastElasticIn { 0% { opacity: 0; transform: translate(-50%, 50px); } 100% { opacity: 1; transform: translate(-50%, -50%); } }
        @keyframes toastSlideUpOut { 0% { opacity: 1; transform: translate(-50%, -50%); } 100% { opacity: 0; transform: translate(-50%, -100px); } }

        /* Ana rakamın (my-coins) elastik olarak büyüyüp küçülmesi ve renk değiştirmesi */
        @keyframes scoreElasticWin { 
            0% { transform: scale(1); color: #55595c; } 
            40% { transform: scale(1.6); color: #6fb98f; } /* Yeşilimsi */
            80% { transform: scale(0.9); color: #6fb98f; } 
            100% { transform: scale(1); color: #55595c; } 
        }

        @keyframes scoreElasticLose { 
            0% { transform: scale(1); color: #55595c; } 
            40% { transform: scale(1.6); color: #e64a61; } /* Kırmızımsı */
            80% { transform: scale(0.9); color: #e64a61; } 
            100% { transform: scale(1); color: #55595c; } 
        }

        .score-anim-win { animation: scoreElasticWin 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
        .score-anim-lose { animation: scoreElasticLose 1.2s cubic-bezier(0.68, -0.55, 0.27, 1.55); }

        /* Uçan '+X' veya '-X' metninin temel özellikleri */
        .score-float { 
            position: absolute; 
            font-size: 20px; 
            font-weight: 900; 
            pointer-events: none; 
            opacity: 0; 
            z-index: 200; 
            text-shadow: 2px 2px 5px rgba(163,177,198,0.5); 
        }

        /* Yukarı uçarak kaybolma animasyonu (Kazanma) */
        @keyframes floatUpGreen { 
            0% { opacity: 0; transform: translateY(0) scale(0.8); } 
            20% { opacity: 1; transform: translateY(-15px) scale(1.2); } 
            80% { opacity: 1; transform: translateY(-35px) scale(1); } 
            100% { opacity: 0; transform: translateY(-45px) scale(0.8); } 
        }

        /* Aşağı düşerek kaybolma animasyonu (Kaybetme) */
        @keyframes floatDownRed { 
            0% { opacity: 0; transform: translateY(0) scale(0.8); } 
            20% { opacity: 1; transform: translateY(15px) scale(1.2); } 
            80% { opacity: 1; transform: translateY(35px) scale(1); } 
            100% { opacity: 0; transform: translateY(45px) scale(0.8); } 
        }

        .float-up-win { color: #6fb98f; animation: floatUpGreen 1.5s forwards; }
        .float-down-lose { color: #e64a61; animation: floatDownRed 1.5s forwards; }

    </style>
</head>

<script>
    const userLangCode = (navigator.language || navigator.userLanguage || "en").split('-')[0].toLowerCase();
    const rtlLanguages = ['ar', 'he', 'fa', 'ur'];
    if (rtlLanguages.includes(userLangCode)) document.body.setAttribute('dir', 'rtl'); 
    
    const i18n = {
        tr: { title: "LOVEME - Düello", searching: "SİSTEM BAŞLATILIYOR", waiting: "BEKLENİYOR...", waiting_answer: "RAKİBİN CEVABI BEKLENİYOR", pot: "POT", you: "SİZ", opp: "RAKİP", correct: "DOĞRU", insufficient: "YETERSİZ BAKİYE", taunt_btn: "RAKİBİNİ KIZDIR", msg1: "Fazla yavaşsın!", msg2: "Sadece şanstı!", msg3: "Ağlamak yok!", msg4: "Korktun mu?", msg5: "Başarılar dilerim!", btn_leave: "AYRIL", btn_rematch: "TEKRAR", rematch_waiting: "Rakibin kararı bekleniyor...", raise_title: "BAHSİ ARTTIR", added_coin: "KOIN EKLENDİ", opp_won: "Rakibin Kazandı", opp_rematch: "Rakip oyuna devam etmek istiyor!", tie_pot: "BERABERE" },
        en: { title: "LOVEME - Duel", searching: "SYSTEM STARTING", waiting: "WAITING...", waiting_answer: "WAITING FOR OPPONENT'S ANSWER", pot: "POT", you: "YOU", opp: "OPPONENT", correct: "CORRECT", insufficient: "INSUFFICIENT BALANCE", taunt_btn: "TAUNT OPPONENT", msg1: "Too slow!", msg2: "Just lucky!", msg3: "No crying!", msg4: "Are you scared?", msg5: "Good luck!", btn_leave: "LEAVE", btn_rematch: "REMATCH", rematch_waiting: "Waiting for opponent...", raise_title: "RAISE BET", added_coin: "COINS ADDED", opp_won: "Opponent Won", opp_rematch: "Opponent wants to continue!", tie_pot: "DRAW" }
    };
    
    const t = i18n[userLangCode] || i18n['en'];
    document.title = t.title;
    document.querySelectorAll('.ui-trans').forEach(el => {
        const key = el.getAttribute('data-key');
        if (t[key]) el.innerHTML = t[key];
    });

    const winTextsByLang = { tr: ["TEBRİKLER<br>SEN KAZANDIN!", "MÜKEMMEL<br>CEVAP!"], en: ["CONGRATULATIONS<br>YOU WON!", "EXCELLENT<br>ANSWER!"] };
    const loseTextsByLang = { tr: ["BİR SONRAKİ SEFERE<br>SEN KAZANACAKSIN", "HAYDİ TEKRAR DENE"], en: ["YOU WILL WIN<br>NEXT TIME", "TRY AGAIN"] };
    const activeWinTexts = winTextsByLang[userLangCode] || winTextsByLang['en'];
    const activeLoseTexts = loseTextsByLang[userLangCode] || loseTextsByLang['en'];

    const BACKEND_URL = "https://loveme-backend-6421.onrender.com";
    let token = localStorage.getItem('loveme_token');
    if (!token) window.location.replace("/");
    
    let currentUser = null;
    let socket = null;
    let matchId = null;
    let isHost = false;
    let myRole = null;
    let opponentRole = null;
    
    let myNick = "Oyuncu 1";
    let oppNick = "Oyuncu 2";
    
    let baseBet = 0;
    let baseTime = 20;
    let currentPot = 0;
    
    let myScore = 0;
    let oppScore = 0;
    let userCoins = 0; 
    
    let isMatchPlaying = false;
    let isStarting = false;
    let activeQuestion = null;
    let timeLeft = 20;
    let timerInterval = null;
    let hasAnswered = false;
    let myChoice = null;
    let oppChoice = null;
    let wasTie = false; 
    
    let myInventory = { bomb: 0, mask: 0, time: 0, joker: 0 };
    let raiseTimeout = null;
    let smokeTimeout = null;
    
    let iWantsRematch = false;
    let oppWantsRematch = false;

    const invIcons = {
        bomb: '<i class="fa-solid fa-bomb"></i>', mask: '<i class="fa-solid fa-mask-ventilator"></i>',
        time: '<i class="fa-solid fa-stopwatch"></i>', joker: '<i class="fa-solid fa-masks-theater"></i>'
    };

    function animateCoin(amount, isWin) {
        try {
            const coinSpan = document.getElementById('my-coins');
            const coinContainer = coinSpan.parentElement;
            coinSpan.innerText = userCoins;
            
            // Önceki animasyon sınıflarını temizle ve yeniden tetiklemek için reflow yap
            coinSpan.classList.remove('score-anim-win', 'score-anim-lose');
            void coinSpan.offsetWidth; 
            
            // Yeni duruma göre kazanma veya kaybetme animasyonunu ekle
            coinSpan.classList.add(isWin ? 'score-anim-win' : 'score-anim-lose');
            
            // Yukarı/aşağı kayan ve kaybolan ekstra metin (+50, -20 vb.)
            const floatEl = document.createElement('div');
            floatEl.className = 'score-float ' + (isWin ? 'float-up-win' : 'float-down-lose');
            floatEl.innerText = (amount > 0 ? '+' : '') + amount;
            
            coinContainer.style.position = 'relative';
            floatEl.style.left = '35px'; 
            floatEl.style.top = '0px';
            coinContainer.appendChild(floatEl);
            
            // Animasyon bitince DOM'dan temizle
            setTimeout(() => { 
                if(floatEl.parentNode) floatEl.remove(); 
                coinSpan.classList.remove('score-anim-win', 'score-anim-lose'); 
            }, 1500);
        } catch (err) {}
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playAlarmSound(freq, duration) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    
    document.body.addEventListener('touchstart', () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
    document.body.addEventListener('click', () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });

    function stopEffects() { document.body.classList.remove('alarm-active'); }
    
    function triggerFireworks() {
        if (typeof confetti === 'undefined') return;
        var duration = 3000; var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10000 };
        function randomInRange(min, max) { return Math.random() * (max - min) + min; }
        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    }
    
    window.showInsufficientToast = function(msg) {
        const toast = document.getElementById('insufficient-toast');
        if(msg) toast.innerHTML = msg;
        toast.classList.remove('toast-animate-out'); toast.classList.add('toast-animate-in');
        setTimeout(() => { toast.classList.remove('toast-animate-in'); toast.classList.add('toast-animate-out'); }, 2500);
    };

    async function fetchAPI(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
        const res = await fetch(`${BACKEND_URL}/api${endpoint}`, { ...options, headers });
        return res.json();
    }

    function updateScoreboardUI() {
        let myClean = (myNick && myNick.trim() !== '') ? myNick.trim() : "Oyuncu 1";
        let oppClean = (oppNick && oppNick.trim() !== '') ? oppNick.trim() : "Oyuncu 2";

        document.getElementById('ig-my-name').innerText = myClean;
        document.getElementById('ig-my-score').innerText = myScore;
        document.getElementById('ig-opp-name').innerText = oppClean;
        document.getElementById('ig-opp-score').innerText = oppScore;

        document.getElementById('rm-my-name').innerText = myClean;
        document.getElementById('rm-my-score').innerText = myScore;
        document.getElementById('rm-opp-name').innerText = oppClean;
        document.getElementById('rm-opp-score').innerText = oppScore;

        const boxes = ['ig-my-score-box', 'ig-opp-score-box', 'rm-my-score-box', 'rm-opp-score-box'];
        boxes.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.classList.remove('score-leading');
        });

        if (myScore > oppScore) {
            document.getElementById('ig-my-score-box').classList.add('score-leading');
            document.getElementById('rm-my-score-box').classList.add('score-leading');
        } else if (oppScore > myScore) {
            document.getElementById('ig-opp-score-box').classList.add('score-leading');
            document.getElementById('rm-opp-score-box').classList.add('score-leading');
        }
    }

    function triggerScoreboardAnimation(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.style.display = 'flex'; 
        const children = container.querySelectorAll('.score-box, .score-divider');
        children.forEach(child => {
            child.classList.remove('anim-in');
            void child.offsetWidth; 
            child.classList.add('anim-in');
        });
    }

    async function initGame() {
        const urlParams = new URLSearchParams(window.location.search);
        matchId = urlParams.get('matchId');
        if (!matchId) { window.location.replace("oyun.html"); return; }

        const authData = await fetchAPI('/auth/me');
        if (!authData || authData.error) { window.location.replace("/"); return; }
        currentUser = authData.user;
        
        const profile = await fetchAPI(`/user/${currentUser.id}`);
        if(profile) {
            currentUser.nickname = profile.nickname;
            userCoins = (Number(profile.free_coins) || 0) + (Number(profile.coins) || 0);
            document.getElementById('my-coins').innerText = userCoins;
            myInventory = profile.inventory || { bomb: 0, mask: 0, time: 0, joker: 0 };
        }

        const matchData = await fetchAPI(`/invites/status/${matchId}?t=${Date.now()}`);
        
        if (!matchData || matchData.error || !matchData.hostUid) { 
            alert("Sistem seni tanımadı! Lütfen oyun.html'deki daveti iptal edip tekrar at.");
            window.location.replace("oyun.html"); 
            return; 
        }

        baseBet = 0;
        if (matchData.betAmount !== undefined && matchData.betAmount !== null) baseBet = parseInt(matchData.betAmount);
        else if (matchData.bet !== undefined && matchData.bet !== null) baseBet = parseInt(matchData.bet);
        else if (matchData.fee !== undefined && matchData.fee !== null) baseBet = parseInt(matchData.fee);
        else if (matchData.amount !== undefined && matchData.amount !== null) baseBet = parseInt(matchData.amount);
        else if (matchData.customPot !== undefined && matchData.customPot !== null) baseBet = parseInt(matchData.customPot);
        else if (matchData.pot !== undefined && matchData.pot !== null) baseBet = parseInt(matchData.pot);

        baseTime = 20;
        if (matchData.gameTime !== undefined && matchData.gameTime !== null) {
            baseTime = parseInt(matchData.gameTime);
        }

        isHost = (currentUser.id === matchData.hostUid);
        myRole = isHost ? 'host' : 'guest';
        opponentRole = isHost ? 'guest' : 'host';
        
        myNick = currentUser.nickname || "Oyuncu 1";
        oppNick = isHost ? matchData.guestName : matchData.hostName;
        if (!oppNick || oppNick.trim() === '') oppNick = "Oyuncu 2";
        
        document.getElementById('match-timer').innerText = oppNick.toUpperCase();

        socket = io(BACKEND_URL); 
        setupSocketListeners();

        socket.emit('join_custom_match', { 
            matchId: matchId, 
            uid: currentUser.id, 
            nickname: myNick, 
            role: myRole, 
            country: 'TR', 
            lang: userLangCode 
        });
        
        updateScoreboardUI();
    }

    function setupSocketListeners() {
        
        socket.on('sync_nickname', (data) => {
            if (data.nickname && data.nickname.trim() !== '') {
                oppNick = data.nickname;
                const matchTimerEl = document.getElementById('match-timer');
                if (matchTimerEl) matchTimerEl.innerText = oppNick.toUpperCase();
                updateScoreboardUI();
            }
        });

        socket.on('round_start_error', (data) => {
            isStarting = false;
            let msg = data.error;
            if (data.insufficientUid) {
                msg = data.insufficientUid === currentUser.id ? t.insufficient : `${data.insufficientNick || oppNick} BAKİYESİ YETERSİZ`;
            }
            window.showInsufficientToast(msg);
            setTimeout(() => window.location.replace("oyun.html"), 2500);
        });

        socket.on('player_joined_custom', (data) => {
            if (data.nickname && data.nickname.trim() !== '') {
                oppNick = data.nickname;
                const matchTimerEl = document.getElementById('match-timer');
                if (matchTimerEl) matchTimerEl.innerText = oppNick.toUpperCase();
                updateScoreboardUI();
            }

            if (isHost && data.role === 'guest') {
                if (!isMatchPlaying && !isStarting) {
                    isStarting = true;
                    socket.emit('request_custom_round_start', { matchId, lang: userLangCode, isTie: wasTie });
                }
            } else if (!isHost && data.role === 'host') {
                socket.emit('player_taunt', { matchId, message: "SYS_GUEST_READY" });
            }
        });

        socket.on('receive_custom_question', (data) => {
            isStarting = false;
            baseBet = data.fee; 
            currentPot = data.pot;
            
            if (baseBet > 0 && !wasTie) {
                userCoins = Math.max(0, userCoins - baseBet);
                animateCoin(-baseBet, false);
            }
            
            startRoundUI(data.question);
        });

        socket.on('opponent_answer', (data) => { 
            oppChoice = data.answer; 
            checkRoundEnd(); 
        });
        
        socket.on('pot_raised', (data) => { applyRaise(data.amount); });
        socket.on('raise_error', (data) => { window.showInsufficientToast(data.error); });
        socket.on('opponent_item', (data) => { handleOpponentItem(data.item); });

        socket.on('opponent_taunt', (data) => { 
            if (data.message === "REMATCH_REQ") {
                oppWantsRematch = true;
                const waiting = document.getElementById('rematch-waiting');
                waiting.innerText = t.opp_rematch;
                waiting.style.display = 'block';
                checkRematchStart();
            } else if (data.message === "SYS_GUEST_READY" && isHost) {
                if (!isMatchPlaying && !isStarting) {
                    isStarting = true;
                    socket.emit('request_custom_round_start', { matchId, lang: userLangCode, isTie: wasTie });
                }
            } else {
                displayChatBubble(data.message, false); 
            }
        });

        socket.on('opponent_disconnected', () => { 
            if (!isMatchPlaying) {
                window.showInsufficientToast("RAKİP OYUNDAN ÇIKTI");
                setTimeout(() => window.location.replace("oyun.html"), 2000);
                return;
            }
            hasAnswered = true;
            clearInterval(timerInterval);
            finishRound(true); 
        });
    }

    function startRoundUI(qData) {
        activeQuestion = qData;
        isMatchPlaying = true;
        hasAnswered = false;
        myChoice = null; 
        oppChoice = null; 
        timeLeft = baseTime;
        
        updateScoreboardUI();
        triggerScoreboardAnimation('in-game-scoreboard');
        
        document.getElementById('waiting-opponent-alert').style.display = 'none';

        document.getElementById('matching-ui').style.display = 'none';
        document.getElementById('question-ui').style.display = 'flex';
        document.getElementById('chat-trigger-bar').style.display = 'flex';
        document.getElementById('pot-amount').innerText = currentPot;

        const qTextEl = document.getElementById('q-text');
        qTextEl.innerText = qData.question_text || qData.q;
        qTextEl.classList.remove('anim-smoke-in');
        void qTextEl.offsetWidth;
        qTextEl.classList.add('anim-smoke-in');

        const container = document.getElementById('ans-container');
        container.innerHTML = "";
        
        let myClean = (myNick && myNick.trim() !== '') ? myNick.trim() : "Oyuncu 1";
        let oppClean = (oppNick && oppNick.trim() !== '') ? oppNick.trim() : "Oyuncu 2";

        const options = qData.options || qData.a;
        options.forEach((choice, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = "ans-container anim-genie-in";
            wrapper.style.animationDelay = `${i * 0.1}s`;
            wrapper.innerHTML = `
                <button class="ans-btn" id="ans-btn-${i}">${choice}</button>
                <span class="choice-label label-you" id="label-you-${i}">${myClean}</span>
                <span class="choice-label label-opponent" id="label-opp-${i}">${oppClean}</span>`;
            wrapper.querySelector('button').onclick = () => handleAnswer(i);
            container.appendChild(wrapper);
        });

        const raiseContainer = document.getElementById('raise-container');
        clearTimeout(raiseTimeout);
        raiseContainer.classList.remove('active');

        const shouldShowRaise = true; 

        if (shouldShowRaise) {
            raiseTimeout = setTimeout(() => {
                if (isMatchPlaying && !hasAnswered) {
                    raiseContainer.classList.add('active');
                    document.querySelectorAll('.raise-btn').forEach(btn => {
                        btn.classList.remove('closing');
                        
                        btn.style.animation = 'none';
                        void btn.offsetWidth; 
                        btn.style.animation = ''; 
                        
                        btn.onclick = () => sendRaise(parseInt(btn.getAttribute('data-val')));
                    });
                    
                    raiseTimeout = setTimeout(() => {
                        document.querySelectorAll('.raise-btn').forEach(b => b.classList.add('closing'));
                        setTimeout(() => { raiseContainer.classList.remove('active'); }, 400);
                    }, 5000);
                }
            }, 5000); 
        }

        renderInventory();
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        document.getElementById('timer-digital').innerText = timeLeft;
        document.getElementById('timer-digital').classList.remove('timer-warning');
        document.body.classList.remove('alarm-active');

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-digital').innerText = timeLeft;
            
            if (timeLeft <= 10 && timeLeft > 5 && !hasAnswered) {
                if (navigator.vibrate) navigator.vibrate([300, 200]);
            } else if (timeLeft <= 5 && timeLeft > 0 && !hasAnswered) {
                document.getElementById('timer-digital').classList.add('timer-warning');
                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50]);
            }

            if(timeLeft <= 0) { 
                clearInterval(timerInterval); stopEffects();
                if(!hasAnswered) handleAnswer(-1); 
            }
        }, 1000);
    }

    function handleAnswer(idx) {
        try {
            if (!isMatchPlaying || hasAnswered) return; 
            hasAnswered = true;
            myChoice = idx;
            clearInterval(timerInterval); 
            stopEffects();
            renderInventory(); 
            
            document.querySelectorAll('.ans-btn').forEach(b => b.classList.add('locked'));
            
            if (idx !== -1) {
                const myBtn = document.getElementById(`ans-btn-${idx}`);
                myBtn.classList.add('selected-black');
                document.getElementById(`label-you-${idx}`).style.display = 'block';
            }
            
            clearTimeout(raiseTimeout);
            document.querySelectorAll('.raise-btn').forEach(b => b.classList.add('closing'));
            setTimeout(() => { document.getElementById('raise-container').classList.remove('active'); }, 400);
            
            socket.emit('submit_answer', { matchId: matchId, answer: idx });
            
            if (oppChoice === null) {
                document.getElementById('waiting-opponent-alert').style.display = 'block';
            }
            
            checkRoundEnd();
        } catch (err) {
            console.log("❌ handleAnswer HATASI: " + err.message);
        }
    }

    function checkRoundEnd() {
        try {
            if (!isMatchPlaying) return; 

            if (myChoice !== null && oppChoice !== null) {
                document.getElementById('waiting-opponent-alert').style.display = 'none';
                clearInterval(timerInterval);
                document.getElementById('raise-container').classList.remove('active');
                
                if (oppChoice !== -1) {
                    const oppBtn = document.getElementById(`ans-btn-${oppChoice}`);
                    if (oppBtn && oppChoice !== myChoice) {
                        oppBtn.classList.add('selected-opponent');
                    }
                    const oppLabel = document.getElementById(`label-opp-${oppChoice}`);
                    if (oppLabel) oppLabel.style.display = 'block';
                }

                setTimeout(() => {
                    if (isMatchPlaying) finishRound(false); 
                }, 3000); 
                
            } else if (timeLeft <= 0 && myChoice !== null) {
                setTimeout(() => {
                    if (oppChoice === null && isMatchPlaying) {
                        oppChoice = -1;
                        document.getElementById('waiting-opponent-alert').style.display = 'none';
                        finishRound(false); 
                    }
                }, 2000);
            }
        } catch (err) {
            console.log("❌ checkRoundEnd HATASI: " + err.message);
        }
    }

    async function finishRound(isOpponentDisconnected) {
        isMatchPlaying = false;
        clearInterval(timerInterval);
        stopEffects();
        document.getElementById('chat-trigger-bar').style.display = 'none';
        document.getElementById('main-game-wrapper').classList.remove('smoke-blurred');

        let res = {};
        try {
            res = await fetchAPI('/evaluate-round', {
                method: 'POST',
                body: JSON.stringify({
                    matchId, mode: 'duel', questionId: activeQuestion.id,
                    myChoice, oppChoice, isOpponentDisconnected, lang: userLangCode
                })
            });
            if (res.error) throw new Error(res.error);
        } catch (err) {
            console.error("Evaluate Hatası:", err);
            res = { isWin: false, isTie: false, isBothWrong: true, wonCoins: 0, scoreChange: -1, correct_option: 0 };
        }

        if (res.isTie) {
            wasTie = true; 
        } else {
            wasTie = false;
            if(res.wonCoins > 0) {
                userCoins = userCoins + res.wonCoins;
                animateCoin(res.wonCoins, true);
            }
        }

        revealSelections(myChoice, oppChoice, res, activeQuestion, res.correct_option, isOpponentDisconnected);
    }

    function revealSelections(myC, oppC, resultData, qData, finalCorrectIdx, isOpponentDisconnected) {
        try {
            const correctIdx = finalCorrectIdx !== undefined ? parseInt(finalCorrectIdx) : (qData.c !== undefined ? qData.c : qData.correct_option);
            
            document.querySelectorAll('.ans-btn').forEach((btn, idx) => {
                btn.classList.remove('selected-black', 'selected-opponent'); 
                if (idx === correctIdx) {
                    btn.classList.add('correct');
                } else if (idx === myC || idx === oppC) {
                    btn.classList.add('wrong');
                }
            });

            if (resultData.isWin) {
                myScore++;
            } else if (!resultData.isTie && !resultData.isBothWrong) { 
                oppScore++;
            }
            
            updateScoreboardUI();

            setTimeout(() => {
                const expOverlay = document.getElementById('explanation-overlay');
                const expOvalBox = expOverlay.querySelector('.exp-oval-box');
                const expTitle = document.getElementById('exp-oval-title');
                const expText = document.getElementById('exp-oval-text');
                const qUi = document.getElementById('question-ui'); 
                
                const qOptions = qData.a || qData.options;
                expTitle.innerText = t.correct + ": " + qOptions[correctIdx];
                expText.innerText = resultData.explanation || qData.expl || qData.explanation || "";
                
                expOverlay.classList.add('show');
                
                setTimeout(() => {
                    qUi.style.opacity = '0'; 
                    expOvalBox.classList.remove('exp-slide-out');
                    expOvalBox.classList.add('exp-slide-in');
                }, 50);

                setTimeout(() => {
                    expOvalBox.classList.remove('exp-slide-in');
                    expOvalBox.classList.add('exp-slide-out'); 
                    
                    setTimeout(() => {
                        expOverlay.classList.remove('show');
                        qUi.style.opacity = '1'; 
                        showRematchScreen(resultData.isWin, resultData.isTie, isOpponentDisconnected, resultData.isBothWrong); 
                    }, 600); 
                    
                }, 4500); 
                
            }, 2000); 

        } catch (err) {
            console.log("❌ revealSelections HATASI: " + err.message);
        }
    }

    function showRematchScreen(isWin, isTie, isOpponentDisconnected, isBothWrong) {
        
        if (isTie && !isOpponentDisconnected) {
            isStarting = false;
            document.getElementById('question-ui').style.display = 'none';
            document.getElementById('matching-ui').style.display = 'flex';
            
            document.getElementById('matching-status-text').innerText = t.tie_pot || "BERABERE";
            
            if (isHost) {
                setTimeout(() => {
                    socket.emit('request_custom_round_start', { matchId, lang: userLangCode, isTie: true });
                }, 1500);
            }
            return;
        }
        
        document.getElementById('question-ui').style.display = 'none';
        const overlay = document.getElementById('rematch-overlay');
        const title = document.getElementById('rematch-title');
        const sadLogo = document.getElementById('rematch-sad-logo');
        const actionsBox = document.getElementById('rematch-actions-box');
        
        const btnRematch = document.querySelector('.btn-rematch');
        const btnLeave = document.querySelector('.btn-leave');
        if (btnRematch) btnRematch.classList.remove('locked-green', 'locked-red');
        if (btnLeave) btnLeave.classList.remove('locked-green', 'locked-red');
        document.getElementById('rematch-waiting').style.display = 'none';

        overlay.classList.remove('fade-out-down');
        sadLogo.style.display = 'none';
        
        updateScoreboardUI();
        triggerScoreboardAnimation('rematch-scoreboard');

        if (isOpponentDisconnected) {
            title.innerHTML = "RAKİP KAÇTI!<br><span style='font-size:18px; color:#6fb98f;'>HÜKMEN KAZANDIN</span>";
            title.style.color = "#55595c";
            sadLogo.style.display = 'none';
            actionsBox.style.display = 'none'; 
            triggerFireworks(); 
            
            setTimeout(() => {
                window.location.replace('oyun.html');
            }, 4000);
        } else {
            actionsBox.style.display = 'flex'; 
            if (isWin) {
                title.innerHTML = activeWinTexts[Math.floor(Math.random() * activeWinTexts.length)];
                title.style.color = "#6fb98f";
                triggerFireworks();
            } else if (isBothWrong) {
                title.innerHTML = "İKİNİZ DE BİLEMEDİNİZ!<br><span style='font-size:16px; color:#e64a61;'>POT SIFIRLANDI</span>";
                title.style.color = "#e64a61";
                sadLogo.style.display = 'block';
            } else {
                title.innerHTML = activeLoseTexts[Math.floor(Math.random() * activeLoseTexts.length)] + `<br><span style='font-size:16px; color:#e64a61;'>${t.opp_won || "Rakibin Kazandı"}</span>`;
                title.style.color = "#e64a61";
                sadLogo.style.display = 'block';
            }
        }

        overlay.classList.add('show');
    }

    window.handleRematchDecision = function(wantsRematch, btnElement) {
        if (!wantsRematch) {
            btnElement.classList.add('locked-red');
            window.location.replace("oyun.html");
            socket.disconnect();
        } else {
            iWantsRematch = true;
            btnElement.classList.add('locked-green');
            document.getElementById('rematch-waiting').style.display = 'block';
            socket.emit('player_taunt', { matchId, message: "REMATCH_REQ" });
            checkRematchStart();
        }
    };
    
    function checkRematchStart() {
        if (iWantsRematch && oppWantsRematch) {
            document.getElementById('rematch-overlay').classList.remove('show');
            document.getElementById('matching-ui').style.display = 'flex';
            document.getElementById('matching-status-text').innerText = t.searching;
            
            iWantsRematch = false; 
            oppWantsRematch = false;
            isStarting = true;
            wasTie = false; 
            
            if (isHost) {
                setTimeout(() => {
                    socket.emit('request_custom_round_start', { matchId, lang: userLangCode, isTie: false });
                }, 1500);
            }
        }
    }

    async function sendRaise(amount) {
        document.querySelectorAll('.raise-btn').forEach(b => b.classList.add('closing'));
        setTimeout(() => { document.getElementById('raise-container').classList.remove('active'); }, 400);
        socket.emit('raise_pot', { matchId, uid: currentUser.id, amount });
    }

    function applyRaise(amount) {
        currentPot += (amount * 2);
        document.getElementById('pot-amount').innerText = currentPot;
        
        const floatText = document.getElementById('floating-raise-text');
        const potDisplay = document.getElementById('pot-display');
        floatText.innerText = `+ ${amount} ${t.added_coin}`;
        floatText.classList.remove('show');
        void floatText.offsetWidth; 
        floatText.classList.add('show');
        potDisplay.classList.add('pot-updated');
        setTimeout(() => { potDisplay.classList.remove('pot-updated'); }, 400);
    }

    function handleOpponentItem(type) {
        if (type === 'bomb' && !hasAnswered) {
            document.getElementById('main-game-wrapper').classList.add('smoke-blurred');
            clearTimeout(smokeTimeout);
            smokeTimeout = setTimeout(() => {
                document.getElementById('main-game-wrapper').classList.remove('smoke-blurred');
            }, 5000);
        } else if (type === 'time' && !hasAnswered) {
            timeLeft += 10;
            const timerEl = document.getElementById('timer-digital');
            timerEl.innerText = timeLeft;
            timerEl.classList.add('timer-add-pulse');
            setTimeout(() => { timerEl.classList.remove('timer-add-pulse'); }, 500);
        }
    }

    function ensureInventoryDOM() {
        const container = document.getElementById('inventory-container');
        if (container.children.length === 0) {
            ['bomb', 'mask', 'time', 'joker'].forEach(type => {
                let wrap = document.createElement('div'); wrap.id = `inv-wrap-${type}`; wrap.className = 'inv-wrapper';
                let btn = document.createElement('div'); btn.id = `inv-btn-${type}`; btn.className = 'inv-btn';
                btn.innerHTML = `${invIcons[type]}<div class="inv-badge" id="inv-badge-${type}">0</div>`;
                btn.onclick = () => useInventoryItem(type);
                wrap.appendChild(btn); container.appendChild(wrap);
            });
        }
    }

    function renderInventory() {
        ensureInventoryDOM(); 
        ['bomb', 'mask', 'time', 'joker'].forEach((type) => {
            let wrap = document.getElementById(`inv-wrap-${type}`);
            let badge = document.getElementById(`inv-badge-${type}`);
            let count = myInventory[type] || 0;

            if (count > 0 && isMatchPlaying && !hasAnswered) {
                badge.innerText = count; wrap.classList.add('active');
            } else {
                wrap.classList.remove('active');
            }
        });
    }

    async function useInventoryItem(type) {
        if (myInventory[type] <= 0 || hasAnswered) return;
        myInventory[type] -= 1;
        renderInventory();

        const btn = document.getElementById(`inv-btn-${type}`);
        if(btn) { btn.classList.remove('use-pulse'); void btn.offsetWidth; btn.classList.add('use-pulse'); }

        socket.emit('use_item', { matchId, uid: currentUser.id, item: type });

        if (type === 'bomb') {
        } else if (type === 'mask') {
            clearTimeout(smokeTimeout);
            document.getElementById('main-game-wrapper').classList.remove('smoke-blurred');
        } else if (type === 'time') {
            timeLeft += 10;
        } else if (type === 'joker') {
            const correctC = activeQuestion.c !== undefined ? activeQuestion.c : activeQuestion.correct_option;
            if(correctC !== undefined) handleAnswer(correctC);
        }
    }

    window.toggleChatMenu = function() {
        const menu = document.getElementById('chat-menu-overlay');
        const bg = document.getElementById('chat-bg-catcher');
        if (menu.classList.contains('active')) {
            menu.classList.remove('active'); bg.style.display = 'none';
        } else {
            menu.classList.add('active'); bg.style.display = 'block';
        }
    };

    window.sendChat = function(msgKey) {
        socket.emit('player_taunt', { matchId, message: msgKey });
        displayChatBubble(msgKey, true);
    };

    function displayChatBubble(msgKey, isMe) {
        const container = document.getElementById('chat-bubbles-container');
        const text = typeof t[msgKey] !== 'undefined' ? t[msgKey] : msgKey; 
        if(!text) return;
        
        const existingBubbles = container.querySelectorAll('.chat-bubble');
        existingBubbles.forEach(b => {
            if(existingBubbles.length > 1 && !b.classList.contains('fading')) {
                b.classList.add('fading'); setTimeout(() => { if (b.parentNode) b.remove(); }, 500);
            }
        });
        
        const bubble = document.createElement('div');
        bubble.className = isMe ? 'chat-bubble bubble-me' : 'chat-bubble bubble-opp';
        bubble.innerText = text;
        container.insertBefore(bubble, container.firstChild);
        
        setTimeout(() => {
            if (bubble && bubble.parentNode) {
                bubble.classList.add('fading'); setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 500);
            }
        }, 3000);
    }

    window.onload = initGame;
</script>
</body>
</html>
