<script>
    const userLangCode = (navigator.language || navigator.userLanguage || "en").split('-')[0].toLowerCase();
    const rtlLanguages = ['ar', 'he', 'fa', 'ur'];
    if (rtlLanguages.includes(userLangCode)) document.body.setAttribute('dir', 'rtl'); 
    
    const i18n = {
        tr: { title: "LOVEME - Düello", searching: "ARENA HAZIRLANIYOR", waiting: "BEKLENİYOR", waiting_answer: "RAKİBİN CEVABI BEKLENİYOR", pot: "POT", you: "SİZ", opp: "RAKİP", correct: "DOĞRU", insufficient: "YETERSİZ BAKİYE", taunt_btn: "RAKİBİNİ KIZDIR", msg1: "Fazla yavaşsın!", msg2: "Sadece şanstı!", msg3: "Ağlamak yok!", msg4: "Korktun mu?", msg5: "Başarılar dilerim!", btn_leave: "AYRIL", btn_rematch: "TEKRAR", rematch_waiting: "Rakibin kararı bekleniyor...", raise_title: "BAHSİ ARTTIR", added_coin: "KOIN EKLENDİ", opp_won: "Rakibin Kazandı", opp_rematch: "Rakip oyuna devam etmek istiyor!", tie_pot: "İKİNİZ DE BİLDİNİZ! POT DEVREDİYOR..." },
        en: { title: "LOVEME - Duel", searching: "PREPARING ARENA", waiting: "WAITING", waiting_answer: "WAITING FOR OPPONENT'S ANSWER", pot: "POT", you: "YOU", opp: "OPPONENT", correct: "CORRECT", insufficient: "INSUFFICIENT BALANCE", taunt_btn: "TAUNT OPPONENT", msg1: "Too slow!", msg2: "Just lucky!", msg3: "No crying!", msg4: "Are you scared?", msg5: "Good luck!", btn_leave: "LEAVE", btn_rematch: "REMATCH", rematch_waiting: "Waiting for opponent...", raise_title: "RAISE BET", added_coin: "COINS ADDED", opp_won: "Opponent Won", opp_rematch: "Opponent wants to continue!", tie_pot: "BOTH CORRECT! POT ROLLS OVER..." }
    };
    
    const t = i18n[userLangCode] || i18n['en'];
    document.title = t.title;
    document.querySelectorAll('.ui-trans').forEach(el => {
        const key = el.getAttribute('data-key');
        if (t[key]) el.innerHTML = t[key];
    });

    const winTextsByLang = { tr: ["TEBRİKLER<br>SEN KAZANDIN!", "MÜKEMMEL<br>CEVAP!"], en: ["CONGRATULATIONS<br>YOU WON!", "EXCELLENT<br>ANSWER!"] };
    const loseTextsByLang = { tr: ["BİR SONRAKİ SEFERE<br>SEN KAZANACAKSIN", "HAYDİ TEKRAR DENE"], en: ["YOU WILL WIN<br>NEXT TIME", "TRY AGAIN"] };
    const activeWinTexts = winTextsByLang[userLangCode] || winTextsByLang['en'];
    const activeLoseTexts = loseTextsByLang[userLangCode] || loseTextsByLang['en'];

    const BACKEND_URL = "https://loveme-backend-6421.onrender.com";
    let token = localStorage.getItem('loveme_token');
    if (!token) window.location.replace("/");
    
    let currentUser = null;
    let socket = null;
    let matchId = null;
    let isHost = false;
    let myRole = null;
    let opponentRole = null;
    
    let myNick = "";
    let oppNick = "";
    
    let baseBet = 20;
    let baseTime = 20;
    let currentPot = 0;
    
    let myScore = 0;
    let oppScore = 0;
    
    let isMatchPlaying = false;
    let isStarting = false;
    let activeQuestion = null;
    let timeLeft = 20;
    let timerInterval = null;
    let hasAnswered = false;
    let myChoice = null;
    let oppChoice = null;
    let wasTie = false; 
    
    let myInventory = { bomb: 0, mask: 0, time: 0, joker: 0 };
    let raiseTimeout = null;
    let smokeTimeout = null;
    
    let iWantsRematch = false;
    let oppWantsRematch = false;

    const invIcons = {
        bomb: '<i class="fa-solid fa-bomb"></i>', mask: '<i class="fa-solid fa-mask-ventilator"></i>',
        time: '<i class="fa-solid fa-stopwatch"></i>', joker: '<i class="fa-solid fa-masks-theater"></i>'
    };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playAlarmSound(freq, duration) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    
    document.body.addEventListener('touchstart', () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
    document.body.addEventListener('click', () => { if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });

    function stopEffects() { document.body.classList.remove('alarm-active'); }
    function triggerFireworks() { if (typeof confetti !== 'undefined') confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, zIndex: 10000 }); }
    
    window.showInsufficientToast = function(msg) {
        const toast = document.getElementById('insufficient-toast');
        if(msg) toast.innerHTML = msg;
        toast.classList.remove('toast-animate-out'); toast.classList.add('toast-animate-in');
        setTimeout(() => { toast.classList.remove('toast-animate-in'); toast.classList.add('toast-animate-out'); }, 2500);
    };

    async function fetchAPI(endpoint, options = {}) {
        const headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
        const res = await fetch(`${BACKEND_URL}/api${endpoint}`, { ...options, headers });
        return res.json();
    }

    // 📌 HATA 2 ÇÖZÜMÜ: İsimler baş harf yerine eksiksiz çekilip yazdırıldı. (SİZ/RAKİP tamamen kaldırıldı)
    function updateScoreboardUI() {
        let myClean = myNick ? myNick.trim() : "SİZ";
        let oppClean = oppNick ? oppNick.trim() : "RAKİP";

        document.getElementById('ig-my-name').innerText = myClean;
        document.getElementById('ig-my-score').innerText = myScore;
        document.getElementById('ig-opp-name').innerText = oppClean;
        document.getElementById('ig-opp-score').innerText = oppScore;

        document.getElementById('rm-my-name').innerText = myClean;
        document.getElementById('rm-my-score').innerText = myScore;
        document.getElementById('rm-opp-name').innerText = oppClean;
        document.getElementById('rm-opp-score').innerText = oppScore;

        const boxes = ['ig-my-score-box', 'ig-opp-score-box', 'rm-my-score-box', 'rm-opp-score-box'];
        boxes.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.classList.remove('score-leading');
        });

        if (myScore > oppScore) {
            document.getElementById('ig-my-score-box').classList.add('score-leading');
            document.getElementById('rm-my-score-box').classList.add('score-leading');
        } else if (oppScore > myScore) {
            document.getElementById('ig-opp-score-box').classList.add('score-leading');
            document.getElementById('rm-opp-score-box').classList.add('score-leading');
        }
    }

    function triggerScoreboardAnimation(containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.style.display = 'flex'; 
        const children = container.querySelectorAll('.score-box, .score-divider');
        children.forEach(child => {
            child.classList.remove('anim-in');
            void child.offsetWidth; 
            child.classList.add('anim-in');
        });
    }

    async function initGame() {
        const urlParams = new URLSearchParams(window.location.search);
        matchId = urlParams.get('matchId');
        if (!matchId) { window.location.replace("oyun.html"); return; }

        const authData = await fetchAPI('/auth/me');
        if (!authData || authData.error) { window.location.replace("/"); return; }
        currentUser = authData.user;
        
        const matchData = await fetchAPI(`/invites/status/${matchId}?t=${Date.now()}`);
        
        if (!matchData || matchData.error || !matchData.hostUid) { 
            console.error("Match Data Çekilemedi veya hostUid eksik!", matchData);
            alert("Sistem seni tanımadı! Lütfen oyun.html'deki daveti iptal edip tekrar at.");
            window.location.replace("oyun.html"); 
            return; 
        }

        // 📌 HATA 4 ÇÖZÜMÜ: Davet esnasındaki pot miktarı zorunlu olarak algılanıp taban değer yapıldı.
        baseBet = parseInt(matchData.bet || matchData.fee || matchData.amount || matchData.entry_fee || 20, 10);
        if (isNaN(baseBet) || baseBet <= 0) baseBet = 20; // Güvenlik katmanı

        isHost = (currentUser.id === matchData.hostUid);
        myRole = isHost ? 'host' : 'guest';
        opponentRole = isHost ? 'guest' : 'host';
        
        myNick = currentUser.nickname;
        oppNick = isHost ? matchData.guestName : matchData.hostName;
        
        document.getElementById('match-timer').innerText = oppNick ? oppNick.toUpperCase() : "BEKLENİYOR";
        
        const profile = await fetchAPI(`/user/${currentUser.id}`);
        if(profile) {
            document.getElementById('my-coins').innerText = (Number(profile.free_coins) || 0) + (Number(profile.coins) || 0);
            myInventory = profile.inventory || { bomb: 0, mask: 0, time: 0, joker: 0 };
        }

        socket = io(BACKEND_URL); 
        setupSocketListeners();

        socket.emit('join_custom_match', { 
            matchId: matchId, 
            uid: currentUser.id, 
            nickname: currentUser.nickname, 
            role: myRole, 
            country: 'TR', 
            lang: userLangCode 
        });
    }

    function setupSocketListeners() {
        
        socket.on('sync_nickname', (data) => {
            if (data.nickname && data.nickname.trim() !== '') {
                oppNick = data.nickname;
                const matchTimerEl = document.getElementById('match-timer');
                if (matchTimerEl) matchTimerEl.innerText = oppNick.toUpperCase();
                updateScoreboardUI();
            }
        });

        socket.on('player_joined_custom', async (data) => {
            if (data.nickname && data.nickname.trim() !== '') {
                oppNick = data.nickname;
                const matchTimerEl = document.getElementById('match-timer');
                if (matchTimerEl) matchTimerEl.innerText = oppNick.toUpperCase();
                updateScoreboardUI();
            }

            if (isHost && data.role === 'guest') {
                if (!isMatchPlaying) await deductAndStart();
            } else if (!isHost && data.role === 'host') {
                socket.emit('player_taunt', { matchId, message: "SYS_GUEST_READY" });
            }
        });

        socket.on('receive_question', async (data) => {
            if (!isHost && data.question && data.question.id) {
                if (isStarting) return;
                isStarting = true;
                try {
                    if (!wasTie) {
                        // 📌 YETERSİZ BAKİYE ÇÖZÜMÜ: Davetli tarafında bakiye eksikse kontrol et ve sunucuyu bilgilendir
                        const feeRes = await fetchAPI('/match/next-round-fee', { 
                            method: 'POST', 
                            body: JSON.stringify({ uid: currentUser.id, matchId, amount: baseBet }) 
                        });
                        if (feeRes.error) {
                            window.showInsufficientToast(feeRes.error);
                            socket.emit('player_taunt', { matchId, message: "INSUFFICIENT_FUNDS" });
                            setTimeout(() => window.location.replace("oyun.html"), 2000);
                            return;
                        }
                        const cDisplay = document.getElementById('my-coins');
                        cDisplay.innerText = Math.max(0, parseInt(cDisplay.innerText) - baseBet);
                    }
                    startRoundUI(data.question);
                } catch(e) {}
            }
        });

        socket.on('opponent_answer', (data) => { 
            oppChoice = data.answer; 
            checkRoundEnd(); 
        });
        
        socket.on('pot_raised', (data) => { applyRaise(data.amount); });
        socket.on('raise_error', (data) => { window.showInsufficientToast(data.error); });
        socket.on('opponent_item', (data) => { handleOpponentItem(data.item); });

        socket.on('opponent_taunt', async (data) => { 
            // 📌 YETERSİZ BAKİYE ÇÖZÜMÜ (KARŞI TARAF): Rakip ödeyemediyse sen de bilgilendirilirsin.
            if (data.message === "INSUFFICIENT_FUNDS") {
                window.showInsufficientToast("RAKİBİN BAKİYESİ YETERSİZ!");
                setTimeout(() => window.location.replace("oyun.html"), 2500);
                return;
            }

            if (data.message === "REMATCH_REQ") {
                oppWantsRematch = true;
                const waiting = document.getElementById('rematch-waiting');
                waiting.innerText = t.opp_rematch;
                waiting.style.display = 'block';
                checkRematchStart();
            } else if (data.message === "SYS_GUEST_READY" && isHost) {
                if (!isMatchPlaying) await deductAndStart();
            } else {
                displayChatBubble(data.message, false); 
            }
        });

        // 📌 HATA 5 ÇÖZÜMÜ: Rakip Kaçtı Senaryosu Güçlendirildi
        socket.on('opponent_disconnected', () => { 
            if(!isMatchPlaying && !isStarting) return;
            hasAnswered = true;
            clearInterval(timerInterval);
            finishRound(true); 
        });
    }

    async function deductAndStart() {
        if (isStarting) return;
        isStarting = true;
        
        try {
            if (!wasTie) {
                // 📌 YETERSİZ BAKİYE ÇÖZÜMÜ: Kurucu tarafında bakiye eksikse kontrol et
                const feeRes = await fetchAPI('/match/next-round-fee', { 
                    method: 'POST', 
                    body: JSON.stringify({ uid: currentUser.id, matchId, amount: baseBet }) 
                });
                if (feeRes.error) {
                    window.showInsufficientToast(feeRes.error);
                    socket.emit('player_taunt', { matchId, message: "INSUFFICIENT_FUNDS" });
                    setTimeout(() => window.location.replace("oyun.html"), 2000);
                    return;
                }
                const cDisplay = document.getElementById('my-coins');
                cDisplay.innerText = Math.max(0, parseInt(cDisplay.innerText) - baseBet);
            }
            
            const qRes = await fetchAPI(`/get-question/duel/${currentUser.id}?lang=${userLangCode}&t=${Date.now()}`);
            
            if (qRes && !qRes.error && qRes.id) {
                socket.emit('share_question', { matchId: matchId, question: qRes });
                setTimeout(() => {
                    startRoundUI(qRes);
                }, 500);
            } else {
                alert("Soru çekilemedi! Veritabanında sorun olabilir.");
                window.location.replace("oyun.html");
            }
        } catch(e) {
            console.error(e);
            alert("Bağlantı hatası!");
            window.location.replace("oyun.html");
        }
    }

    function startRoundUI(qData) {
        activeQuestion = qData;
        isMatchPlaying = true;
        hasAnswered = false;
        myChoice = null; 
        oppChoice = null; 
        timeLeft = baseTime;
        
        if (!wasTie) { currentPot = baseBet * 2; }

        updateScoreboardUI();
        triggerScoreboardAnimation('in-game-scoreboard');
        
        document.getElementById('waiting-opponent-alert').style.display = 'none';

        document.getElementById('matching-ui').style.display = 'none';
        document.getElementById('question-ui').style.display = 'flex';
        document.getElementById('chat-trigger-bar').style.display = 'flex';
        document.getElementById('pot-amount').innerText = currentPot;

        document.getElementById('q-text').innerText = qData.question_text || qData.q;
        const container = document.getElementById('ans-container');
        container.innerHTML = "";
        
        const options = qData.options || qData.a;
        options.forEach((choice, i) => {
            const wrapper = document.createElement('div');
            wrapper.className = "ans-container";
            wrapper.innerHTML = `
                <button class="ans-btn" id="ans-btn-${i}">${choice}</button>
                <span class="choice-label label-you" id="label-you-${i}">${t.you}</span>
                <span class="choice-label label-opponent" id="label-opp-${i}">${t.opp}</span>`;
            wrapper.querySelector('button').onclick = () => handleAnswer(i);
            container.appendChild(wrapper);
        });

        const raiseContainer = document.getElementById('raise-container');
        if (Math.random() < 0.3) {
            raiseContainer.style.display = 'flex';
            document.querySelectorAll('.raise-btn').forEach(btn => {
                btn.classList.remove('closing');
                btn.onclick = () => sendRaise(parseInt(btn.getAttribute('data-val')));
            });
            raiseTimeout = setTimeout(() => {
                document.querySelectorAll('.raise-btn').forEach(b => b.classList.add('closing'));
                setTimeout(() => { raiseContainer.style.display = 'none'; }, 400);
            }, 5000);
        } else {
            raiseContainer.style.display = 'none';
        }

        renderInventory();
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        document.getElementById('timer-digital').innerText = timeLeft;
        document.getElementById('timer-digital').classList.remove('timer-warning');

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer-digital').innerText = timeLeft;
            
            if (timeLeft <= 10 && timeLeft > 5 && !hasAnswered) {
                if (navigator.vibrate) navigator.vibrate([300, 200]);
                playAlarmSound(440, 0.2);
                document.body.classList.toggle('alarm-active');
            } else if (timeLeft <= 5 && timeLeft > 0 && !hasAnswered) {
                document.getElementById('timer-digital').classList.add('timer-warning');
                if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50]);
                playAlarmSound(880, 0.1);
                document.body.classList.toggle('alarm-active');
            }

            if(timeLeft <= 0) { 
                clearInterval(timerInterval); stopEffects();
                if(!hasAnswered) handleAnswer(-1); 
            }
        }, 1000);
    }

    function handleAnswer(idx) {
        try {
            if (!isMatchPlaying || hasAnswered) return; 
            hasAnswered = true;
            myChoice = idx;
            clearInterval(timerInterval); 
            stopEffects();
            renderInventory(); 
            
            document.querySelectorAll('.ans-btn').forEach(b => b.classList.add('locked'));
            
            if (idx !== -1) {
                const myBtn = document.getElementById(`ans-btn-${idx}`);
                myBtn.classList.add('selected-black');
                document.getElementById(`label-you-${idx}`).style.display = 'block';
            }
            
            clearTimeout(raiseTimeout);
            document.querySelectorAll('.raise-btn').forEach(b => b.classList.add('closing'));
            setTimeout(() => { document.getElementById('raise-container').style.display = 'none'; }, 400);
            
            socket.emit('submit_answer', { matchId: matchId, answer: idx });
            
            if (oppChoice === null) {
                document.getElementById('waiting-opponent-alert').style.display = 'block';
            }
            
            checkRoundEnd();
        } catch (err) {
            console.log("❌ handleAnswer HATASI: " + err.message);
        }
    }

    function checkRoundEnd() {
        try {
            if (!isMatchPlaying) return; 

            if (myChoice !== null && oppChoice !== null) {
                document.getElementById('waiting-opponent-alert').style.display = 'none';
                clearInterval(timerInterval);
                document.getElementById('raise-container').style.display = 'none';
                
                if (oppChoice !== -1) {
                    const oppBtn = document.getElementById(`ans-btn-${oppChoice}`);
                    if (oppBtn && oppChoice !== myChoice) {
                        oppBtn.classList.add('selected-opponent');
                    }
                    const oppLabel = document.getElementById(`label-opp-${oppChoice}`);
                    if (oppLabel) oppLabel.style.display = 'block';
                }

                setTimeout(() => {
                    if (isMatchPlaying) finishRound(false); 
                }, 3000); 
                
            } else if (timeLeft <= 0 && myChoice !== null) {
                setTimeout(() => {
                    if (oppChoice === null && isMatchPlaying) {
                        oppChoice = -1;
                        document.getElementById('waiting-opponent-alert').style.display = 'none';
                        finishRound(false); 
                    }
                }, 2000);
            }
        } catch (err) {
            console.log("❌ checkRoundEnd HATASI: " + err.message);
        }
    }

    async function finishRound(isOpponentDisconnected) {
        isMatchPlaying = false;
        clearInterval(timerInterval);
        stopEffects();
        document.getElementById('chat-trigger-bar').style.display = 'none';
        document.getElementById('main-game-wrapper').classList.remove('smoke-blurred');

        let res = {};
        try {
            res = await fetchAPI('/evaluate-round', {
                method: 'POST',
                body: JSON.stringify({
                    matchId, mode: 'duel', questionId: activeQuestion.id,
                    myChoice, oppChoice, isOpponentDisconnected, lang: userLangCode
                })
            });
            if (res.error) throw new Error(res.error);
        } catch (err) {
            console.error("Evaluate Hatası:", err);
            res = { isWin: false, isTie: false, isBothWrong: true, wonCoins: 0, scoreChange: -1, correct_option: 0 };
        }

        if (res.isTie) {
            wasTie = true; 
        } else {
            wasTie = false;
            if(res.wonCoins > 0) {
                const cDisplay = document.getElementById('my-coins');
                cDisplay.innerText = parseInt(cDisplay.innerText) + res.wonCoins;
            }
        }

        revealSelections(myChoice, oppChoice, res, activeQuestion, res.correct_option);
    }

    function revealSelections(myC, oppC, resultData, qData, finalCorrectIdx) {
        try {
            const correctIdx = finalCorrectIdx !== undefined ? parseInt(finalCorrectIdx) : (qData.c !== undefined ? qData.c : qData.correct_option);
            
            document.querySelectorAll('.ans-btn').forEach((btn, idx) => {
                btn.classList.remove('selected-black', 'selected-opponent'); 
                if (idx === correctIdx) {
                    btn.classList.add('correct');
                } else if (idx === myC || idx === oppC) {
                    btn.classList.add('wrong');
                }
            });

            if (resultData.isWin) {
                myScore++;
            } else if (!resultData.isTie && !resultData.isBothWrong) { 
                oppScore++;
            }
            
            updateScoreboardUI();

            setTimeout(() => {
                const expOverlay = document.getElementById('explanation-overlay');
                const expOvalBox = expOverlay.querySelector('.exp-oval-box');
                const expTitle = document.getElementById('exp-oval-title');
                const expText = document.getElementById('exp-oval-text');
                const qUi = document.getElementById('question-ui'); 
                
                const qOptions = qData.a || qData.options;
                expTitle.innerText = t.correct + ": " + qOptions[correctIdx];
                expText.innerText = resultData.explanation || qData.expl || qData.explanation || "";
                
                expOverlay.style.display = 'flex';
                
                setTimeout(() => {
                    qUi.style.opacity = '0'; 
                    expOverlay.style.opacity = '1';
                    expOvalBox.classList.remove('exp-slide-out');
                    expOvalBox.classList.add('exp-slide-in');
                }, 50);

                setTimeout(() => {
                    expOvalBox.classList.remove('exp-slide-in');
                    expOvalBox.classList.add('exp-slide-out'); 
                    expOverlay.style.opacity = '0';
                    
                    setTimeout(() => {
                        expOverlay.style.display = 'none';
                        qUi.style.opacity = '1'; 
                        showRematchScreen(resultData.isWin, resultData.isTie, resultData.isOpponentDisconnected, resultData.isBothWrong); 
                    }, 600); 
                    
                }, 4500); 
                
            }, 2000); 

        } catch (err) {
            console.log("❌ revealSelections HATASI: " + err.message);
        }
    }

    function showRematchScreen(isWin, isTie, isOpponentDisconnected, isBothWrong) {
        
        if (isTie && !isOpponentDisconnected) {
            isStarting = false;
            document.getElementById('question-ui').style.display = 'none';
            document.getElementById('matching-ui').style.display = 'flex';
            
            document.getElementById('matching-status-text').innerText = t.tie_pot || "İKİNİZ DE BİLDİNİZ! POT DEVREDİYOR...";
            
            if (isHost) {
                setTimeout(() => deductAndStart(), 1500);
            }
            return;
        }
        
        document.getElementById('question-ui').style.display = 'none';
        const overlay = document.getElementById('rematch-overlay');
        const title = document.getElementById('rematch-title');
        const sadLogo = document.getElementById('rematch-sad-logo');
        const actionsBox = document.getElementById('rematch-actions-box');
        
        const btnRematch = document.querySelector('.btn-rematch');
        const btnLeave = document.querySelector('.btn-leave');
        if (btnRematch) btnRematch.classList.remove('locked-green', 'locked-red');
        if (btnLeave) btnLeave.classList.remove('locked-green', 'locked-red');
        document.getElementById('rematch-waiting').style.display = 'none';

        overlay.classList.remove('fade-out-down');
        sadLogo.style.display = 'none';
        
        updateScoreboardUI();
        triggerScoreboardAnimation('rematch-scoreboard');

        // 📌 HATA 5 ÇÖZÜMÜ: Eğer Rakip Çıktıysa Her Zaman Hükmen Kazanır
        if (isOpponentDisconnected) {
            title.innerHTML = "RAKİP KAÇTI!<br><span style='font-size:18px; color:#28a745;'>HÜKMEN KAZANDIN</span>";
            title.style.color = "#000";
            actionsBox.innerHTML = `<button class="btn-leave" onclick="window.location.replace('oyun.html')">ANA MENÜ</button>`;
            triggerFireworks(); // Kazanana ödül şöleni
        } else {
            if (isWin) {
                title.innerHTML = activeWinTexts[Math.floor(Math.random() * activeWinTexts.length)];
                title.style.color = "#28a745";
                triggerFireworks();
            } else if (isBothWrong) {
                title.innerHTML = "İKİNİZ DE BİLEMEDİNİZ!<br><span style='font-size:16px; color:#dc3545;'>POT SIFIRLANDI</span>";
                title.style.color = "#dc3545";
                sadLogo.style.display = 'block';
            } else {
                title.innerHTML = activeLoseTexts[Math.floor(Math.random() * activeLoseTexts.length)] + `<br><span style='font-size:16px; color:#dc3545;'>${t.opp_won || "Rakibin Kazandı"}</span>`;
                title.style.color = "#dc3545";
                sadLogo.style.display = 'block';
            }
        }

        overlay.style.display = 'flex';
    }

    window.handleRematchDecision = function(wantsRematch, btnElement) {
        if (!wantsRematch) {
            btnElement.classList.add('locked-red');
            window.location.replace("oyun.html");
            socket.disconnect();
        } else {
            iWantsRematch = true;
            btnElement.classList.add('locked-green');
            document.getElementById('rematch-waiting').style.display = 'block';
            socket.emit('player_taunt', { matchId, message: "REMATCH_REQ" });
            checkRematchStart();
        }
    };
    
    function checkRematchStart() {
        if (iWantsRematch && oppWantsRematch) {
            document.getElementById('rematch-overlay').style.display = 'none';
            document.getElementById('matching-ui').style.display = 'flex';
            document.getElementById('matching-status-text').innerText = t.searching;
            
            iWantsRematch = false; 
            oppWantsRematch = false;
            isStarting = false;
            wasTie = false; 
            
            if (isHost) {
                setTimeout(() => deductAndStart(), 1500);
            }
        }
    }

    async function sendRaise(amount) {
        document.querySelectorAll('.raise-btn').forEach(b => b.classList.add('closing'));
        setTimeout(() => { document.getElementById('raise-container').style.display = 'none'; }, 400);
        socket.emit('raise_pot', { matchId, amount });
    }

    function applyRaise(amount) {
        currentPot += (amount * 2);
        document.getElementById('pot-amount').innerText = currentPot;
        
        const floatText = document.getElementById('floating-raise-text');
        const potDisplay = document.getElementById('pot-display');
        floatText.innerText = `+ ${amount} ${t.added_coin}`;
        floatText.classList.remove('show');
        void floatText.offsetWidth; 
        floatText.classList.add('show');
        potDisplay.classList.add('pot-updated');
        setTimeout(() => { potDisplay.classList.remove('pot-updated'); }, 400);
    }

    function handleOpponentItem(type) {
        if (type === 'bomb' && !hasAnswered) {
            document.getElementById('main-game-wrapper').classList.add('smoke-blurred');
            clearTimeout(smokeTimeout);
            smokeTimeout = setTimeout(() => {
                document.getElementById('main-game-wrapper').classList.remove('smoke-blurred');
            }, 5000);
        } else if (type === 'time' && !hasAnswered) {
            timeLeft += 10;
            const timerEl = document.getElementById('timer-digital');
            timerEl.innerText = timeLeft;
            timerEl.classList.add('timer-add-pulse');
            setTimeout(() => { timerEl.classList.remove('timer-add-pulse'); }, 500);
        }
    }

    function ensureInventoryDOM() {
        const container = document.getElementById('inventory-container');
        if (container.children.length === 0) {
            ['bomb', 'mask', 'time', 'joker'].forEach(type => {
                let wrap = document.createElement('div'); wrap.id = `inv-wrap-${type}`; wrap.className = 'inv-wrapper';
                let btn = document.createElement('div'); btn.id = `inv-btn-${type}`; btn.className = 'inv-btn';
                btn.innerHTML = `${invIcons[type]}<div class="inv-badge" id="inv-badge-${type}">0</div>`;
                btn.onclick = () => useInventoryItem(type);
                wrap.appendChild(btn); container.appendChild(wrap);
            });
        }
    }

    function renderInventory() {
        ensureInventoryDOM(); 
        ['bomb', 'mask', 'time', 'joker'].forEach((type) => {
            let wrap = document.getElementById(`inv-wrap-${type}`);
            let badge = document.getElementById(`inv-badge-${type}`);
            let count = myInventory[type] || 0;

            if (count > 0 && isMatchPlaying && !hasAnswered) {
                badge.innerText = count; wrap.classList.add('active');
            } else {
                wrap.classList.remove('active');
            }
        });
    }

    async function useInventoryItem(type) {
        if (myInventory[type] <= 0 || hasAnswered) return;
        myInventory[type] -= 1;
        renderInventory();

        const btn = document.getElementById(`inv-btn-${type}`);
        if(btn) { btn.classList.remove('use-pulse'); void btn.offsetWidth; btn.classList.add('use-pulse'); }

        socket.emit('use_item', { matchId, uid: currentUser.id, item: type });

        if (type === 'bomb') {
        } else if (type === 'mask') {
            clearTimeout(smokeTimeout);
            document.getElementById('main-game-wrapper').classList.remove('smoke-blurred');
        } else if (type === 'time') {
            timeLeft += 10;
        } else if (type === 'joker') {
            const correctC = activeQuestion.c !== undefined ? activeQuestion.c : activeQuestion.correct_option;
            if(correctC !== undefined) handleAnswer(correctC);
        }
    }

    window.toggleChatMenu = function() {
        const menu = document.getElementById('chat-menu-overlay');
        const bg = document.getElementById('chat-bg-catcher');
        if (menu.classList.contains('active')) {
            menu.classList.remove('active'); bg.style.display = 'none';
        } else {
            menu.classList.add('active'); bg.style.display = 'block';
        }
    };

    window.sendChat = function(msgKey) {
        socket.emit('player_taunt', { matchId, message: msgKey });
        displayChatBubble(msgKey, true);
    };

    function displayChatBubble(msgKey, isMe) {
        const container = document.getElementById('chat-bubbles-container');
        const text = typeof t[msgKey] !== 'undefined' ? t[msgKey] : msgKey; 
        if(!text) return;
        
        const existingBubbles = container.querySelectorAll('.chat-bubble');
        existingBubbles.forEach(b => {
            b.classList.add('pushed');
            if(existingBubbles.length > 1 && !b.classList.contains('fading')) {
                b.classList.add('fading'); setTimeout(() => { if (b.parentNode) b.remove(); }, 500);
            }
        });
        
        const bubble = document.createElement('div');
        bubble.className = isMe ? 'chat-bubble bubble-me' : 'chat-bubble bubble-opp';
        bubble.innerText = text;
        container.insertBefore(bubble, container.firstChild);
        setTimeout(() => {
            if (bubble && bubble.parentNode) {
                bubble.classList.add('fading'); setTimeout(() => { if (bubble.parentNode) bubble.remove(); }, 500);
            }
        }, 4000);
    }

    window.onload = initGame;
</script>
