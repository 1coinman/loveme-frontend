<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Login Form</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Neumorphism Ana Renk Paleti */
            --bg-color: #ecf0f3; /* Görseldeki tam zemin rengi (hafif gri/mavi tonlu beyaz) */
            --shadow-dark: #cbced1; /* Alt/Sağ koyu gölge */
            --shadow-light: #ffffff; /* Üst/Sol açık gölge (ışık) */
            --text-dark: #595959; /* Başlık ve Buton rengi */
            --text-label: #7a7a7a; /* Label rengi */
            --text-placeholder: #a0a5a8; /* Placeholder rengi */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Rubik', sans-serif;
            
            /* İSTEDİĞİN ANTİ-ALİASİNG (Font Pürüzsüzleştirme) AYARLARI */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        /* Dış Çerçeve (Popup Alanı) */
        .login-container {
            background-color: var(--bg-color);
            width: 380px;
            padding: 50px 40px;
            border-radius: 40px; /* Görseldeki gibi büyük kavisli köşeler */
            
            /* Dışa dönük yumuşak gölge */
            box-shadow: 14px 14px 28px var(--shadow-dark), 
                       -14px -14px 28px var(--shadow-light);
            
            display: flex;
            flex-direction: column;
        }

        /* Başlık */
        .login-title {
            color: var(--text-dark);
            font-size: 34px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
            margin-bottom: 40px;
        }

        /* Input Grupları */
        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 25px;
        }

        .input-group label {
            color: var(--text-dark);
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        /* İçe Göçük (Inset) Input Alanları */
        .input-group input {
            background-color: var(--bg-color);
            border: none;
            outline: none;
            padding: 18px 20px;
            border-radius: 50px; /* Tam yuvarlak köşeler (Pill shape) */
            font-family: 'Rubik', sans-serif;
            font-size: 16px;
            color: var(--text-dark);
            
            /* İçe dönük (inset) yumuşak gölge */
            box-shadow: inset 6px 6px 10px var(--shadow-dark), 
                        inset -6px -6px 10px var(--shadow-light);
            transition: all 0.2s ease-in-out;
        }

        .input-group input::placeholder {
            color: var(--text-placeholder);
            font-weight: 400;
            letter-spacing: 1px;
        }

        .input-group input:focus {
            /* Tıklandığında gölge biraz daha derinleşir */
            box-shadow: inset 8px 8px 12px var(--shadow-dark), 
                        inset -8px -8px 12px var(--shadow-light);
        }

        /* Buton Alanı Hizalaması */
        .action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
        }

        /* Dışa Çıkık Login Butonu */
        .login-btn {
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: 'Rubik', sans-serif;
            font-size: 20px;
            font-weight: 500;
            border: none;
            outline: none;
            padding: 16px 50px;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 0.5px;
            
            /* Buton için dışa dönük gölge */
            box-shadow: 6px 6px 12px var(--shadow-dark), 
                       -6px -6px 12px var(--shadow-light);
            transition: all 0.2s ease-in-out;
        }

        .login-btn:active {
            /* Butona basıldığında içeri göçme efekti (gerçekçi his) */
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
            color: var(--text-label);
        }

        /* Şifremi Unuttum Linki */
        .forgot-password {
            color: var(--text-dark);
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
            margin-top: 30px;
            align-self: flex-end; /* Görseldeki gibi sağ alt köşeye yaslar */
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: #000;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-title">Login</div>

        <div class="input-group">
            <label>Username</label>
            <input type="text" placeholder="Username" spellcheck="false" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="**********">
        </div>

        <div class="action-area">
            <button class="login-btn">Login</button>
        </div>

        <a href="#" class="forgot-password">Forgot password?</a>
    </div>

</body>
</html>
