        saveBtn.classList.remove('btn-default', 'btn-male', 'btn-female');
        saveBtn.classList.add(gender === 'MALE' ? 'btn-male' : 'btn-female');
        saveBtn.classList.add('btn-pulse'); setTimeout(() => saveBtn.classList.remove('btn-pulse'), 400);
    };
    function triggerHapticFeedback(val) { if (navigator.vibrate) { try { let duration = Math.floor(5 + ((val - 18) / (99 - 18)) * 35); navigator.vibrate([duration]); } catch(e) {} } }
    const sliderWrapper = document.getElementById('ageSliderWrapper');
    const thumb = document.getElementById('ageThumb');
    const tooltip = document.getElementById('ageTooltip');
    const track = document.getElementById('ageTrack');
    let isDragging = false, lastVibratedValue = 18;
    function updateSlider(clientX) {
        const rect = track.getBoundingClientRect();
        let x = clientX - rect.left;
        let percent = x / rect.width;
        if (percent < 0) percent = 0; if (percent > 1) percent = 1;
        thumb.style.left = (percent * 100) + '%';
        const val = Math.round(18 + percent * (99 - 18));
        if (val !== currentAgeValue) { currentAgeValue = val; tooltip.innerText = val; if (val !== lastVibratedValue) { triggerHapticFeedback(val); lastVibratedValue = val; } }
    }
    function startDrag(e) { isDragging = true; thumb.classList.add('active'); thumb.classList.remove('teach-anim'); updateSlider(e.type.includes('touch') ? e.touches[0].clientX : e.clientX); }
    function endDrag() { if(!isDragging) return; isDragging = false; thumb.classList.remove('active'); }
    function moveDrag(e) { if (!isDragging) return; e.preventDefault(); updateSlider(e.type.includes('touch') ? e.touches[0].clientX : e.clientX); }
    sliderWrapper.addEventListener('mousedown', startDrag);
    sliderWrapper.addEventListener('touchstart', startDrag, {passive: false});
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('touchmove', moveDrag, {passive: false});

    async function checkUserAndRoute(user) {
        if (!user) {
            console.warn("Kullanıcı yok, login alanı gösterilecek");
            window.hideLoading();
            document.getElementById('login-area').style.display = 'block';
            return;
        }
        try {
            const token = localStorage.getItem('loveme_token');
            const userId = user.id || user.uid;
            if (!userId) throw new Error("ID yok");
            const res = await fetch(`${BACKEND_URL}/api/user/${userId}`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) {
                localStorage.removeItem('loveme_user');
                localStorage.removeItem('loveme_token');
                window.hideLoading();
                window.location.replace("/");
                return;
            }
            const data = await res.json();
            const userObj = data.user || data;
            if (res.ok && !data.error && (userObj.id || userObj.nickname)) {
                window.location.replace("oyun.html");
            } else {
                window.hideLoading();
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('registration-form').style.display = 'flex';
            }
        } catch (err) {
            console.error("Kullanıcı kontrol hatası", err);
            window.hideLoading();
            document.getElementById('login-area').style.display = 'block';
        }
    }
    window.onload = () => {
        const savedUser = localStorage.getItem('loveme_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            checkUserAndRoute(currentUser);
        } else {
            document.getElementById('login-area').style.display = 'block';
        }
    };
    window.toggleLoginModal = function() {
        const modal = document.getElementById('loginModal');
        if (modal.style.display === 'flex') {
            modal.style.opacity = '0';
            modal.classList.remove('show-anim');
            setTimeout(() => { modal.style.display = 'none'; document.getElementById('emailFormWrap').style.display = 'none'; document.getElementById('loginOptionsWrap').style.display = 'block'; document.getElementById('emailInput').value = ''; document.getElementById('passInput').value = ''; document.getElementById('emailErrLabel').style.display = 'none'; document.getElementById('passErrLabel').style.display = 'none'; document.getElementById('authFeedback').style.display = 'none'; document.getElementById('passInput').type = 'password'; document.getElementById('togglePassword').className = 'fa-solid fa-eye-slash'; }, 400);
        } else {
            modal.style.display = 'flex';
            setTimeout(() => { modal.style.opacity = '1'; modal.classList.add('show-anim'); }, 10);
        }
    };
    document.getElementById('loginModal').addEventListener('click', function(e) { if (e.target === this) window.toggleLoginModal(); });
    document.getElementById('emailOptBtn').addEventListener('click', () => { document.getElementById('loginOptionsWrap').style.display = 'none'; document.getElementById('emailFormWrap').style.display = 'block'; setTimeout(() => document.getElementById('emailInput').focus(), 100); });
    document.getElementById('emailInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('passInput').focus(); } });
    document.getElementById('passInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); document.getElementById('emailActionBtn').click(); } });
    document.getElementById('togglePassword').addEventListener('click', function() { const pi = document.getElementById('passInput'); if (pi.type === 'password') { pi.type = 'text'; this.classList.remove('fa-eye-slash'); this.classList.add('fa-eye'); this.style.opacity = '1'; } else { pi.type = 'password'; this.classList.remove('fa-eye'); this.classList.add('fa-eye-slash'); this.style.opacity = '0.5'; } });
    const emailInput = document.getElementById('emailInput');
    const emailErrLabel = document.getElementById('emailErrLabel');
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    emailInput.addEventListener('input', () => { const val = emailInput.value.trim(); if(val === '') { emailInput.className = 'custom-input ui-trans-ph'; emailErrLabel.style.display = 'none'; } else if(emailRegex.test(val)) { emailInput.className = 'custom-input ui-trans-ph input-success'; emailErrLabel.style.display = 'none'; } else { emailInput.className = 'custom-input ui-trans-ph input-error'; emailErrLabel.innerText = trans.err_invalid_email; emailErrLabel.style.display = 'block'; } });
    const passInput = document.getElementById('passInput');
    const passErrLabel = document.getElementById('passErrLabel');
    passInput.addEventListener('input', () => { const val = passInput.value; if(val === '') { passInput.className = 'custom-input ui-trans-ph'; passErrLabel.style.display = 'none'; } else if(val.length >= 6) { passInput.className = 'custom-input ui-trans-ph input-success'; passErrLabel.style.display = 'none'; } else { passInput.className = 'custom-input ui-trans-ph input-error'; passErrLabel.innerText = trans.err_pass_len; passErrLabel.style.display = 'block'; } });
    let nickTimeout;
    const nickInput = document.getElementById('nickname');
    const nickErrLabel = document.getElementById('nickErrLabel');
    nickInput.addEventListener('input', () => {
        clearTimeout(nickTimeout);
        isNickValid = false;
        const val = nickInput.value.trim().toLowerCase();
        if(val.length === 0) { nickInput.className = 'custom-input ui-trans-ph'; nickErrLabel.style.display = 'none'; return; }
        if(val.length < 3) { nickInput.className = 'custom-input ui-trans-ph input-error'; nickErrLabel.innerText = trans.err_nick_len; nickErrLabel.style.display = 'block'; return; }
        nickInput.className = 'custom-input ui-trans-ph';
        nickErrLabel.style.display = 'none';
        nickTimeout = setTimeout(async () => {
            try {
                const res = await fetch(`${BACKEND_URL}/api/check-nick`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nickname: val }) });
                const data = await res.json();
                if(!data.available) { nickInput.className = 'custom-input ui-trans-ph input-error'; nickErrLabel.innerText = trans.err_nick_taken; nickErrLabel.style.display = 'block'; isNickValid = false; }
                else { nickInput.className = 'custom-input ui-trans-ph input-success'; nickErrLabel.style.display = 'none'; isNickValid = true; }
            } catch (err) { console.error("Nick kontrol hatası", err); }
        }, 600);
    });
    document.getElementById('googleLoginBtn').addEventListener('click', () => { window.location.href = `${BACKEND_URL}/api/auth/google`; });
    document.getElementById('emailActionBtn').addEventListener('click', async () => {
        const email = emailInput.value.trim();
        const pass = passInput.value;
        const feedback = document.getElementById('authFeedback');
        if(!emailRegex.test(email) || pass.length < 6) { feedback.innerText = trans.err_empty_fields; feedback.style.display = "block"; if(!emailRegex.test(email)) emailInput.classList.add('input-error'); if(pass.length < 6) passInput.classList.add('input-error'); return; }
        feedback.style.display = "none";
        window.showLoading();
        try {
            const response = await fetch(`${BACKEND_URL}/api/auth/email`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password: pass }) });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            currentUser = data.user;
            localStorage.setItem('loveme_user', JSON.stringify(currentUser));
            if (data.access_token) localStorage.setItem('loveme_token', data.access_token);
            await checkUserAndRoute(currentUser);
        } catch (error) { console.error("Giriş Hatası:", error); window.hideLoading(); feedback.innerText = error.message; feedback.style.display = "block"; }
    });
    document.getElementById('save-btn').addEventListener('click', async () => {
        const nick = nickInput.value.trim().toLowerCase();
        if (!selectedGender) { const toast = document.getElementById('genderToast'); toast.classList.remove('fade-up'); toast.classList.add('show'); setTimeout(() => { toast.classList.remove('show'); toast.classList.add('fade-up'); }, 2000); return; }
        if (!isNickValid || nick.length < 3) return alert(trans.err_nick_len + " veya " + trans.err_nick_taken);
        window.showLoading();
        try {
            const token = localStorage.getItem('loveme_token');
            const response = await fetch(`${BACKEND_URL}/api/save-profile`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ uid: currentUser.id, email: currentUser.email, nickname: nick, gender: selectedGender, age: currentAgeValue }) });
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            window.location.replace("oyun.html");
        } catch (error) { console.error("Kaydetme Hatası:", error); window.hideLoading(); alert(trans.err_save + error.message); }
    });
    </script>
</body>
</html>
