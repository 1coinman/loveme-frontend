<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoveMe</title>
    <link rel="icon" type="image/png" href="logo/LoveMe.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        // URL'de token varsa al ve kaydet (Sayfayı YENİLEMEDEN URL'i temizle)
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const access_token = params.get('access_token');
        if (access_token) {
            localStorage.setItem('loveme_token', access_token);
        }

        if (window.history.replaceState) {
            window.history.replaceState(null, null, "/");
        }

        // Sağ Tık ve F12 / Inspect Engelleme
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || 
               (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 80))) { 
                e.preventDefault(); return false; 
            }
        });
    </script>

    <style>
        :root {
            /* Neumorphic Renk Paleti */
            --bg-color: #e0e5ec;
            --text-color: #55595c;
            --pink-color: #e64a61;
            /* Hata Mesajı Zemin Rengi */
            --error-bg: #d34863; 
            --soft-blue: #74b9ff;
            --soft-pink: #ff7675;
            
            /* Gölgeler */
            --shadow-out: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5);
            --shadow-in: inset 6px 6px 10px rgba(163, 177, 198, 0.6), inset -6px -6px 10px rgba(255, 255, 255, 0.8);
            
            /* Elastik Animasyon Eğrisi (iOS Hissiyatı) */
            --elastic-curve: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth-curve: ease-in-out;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
        }

        .modern-box {
            position: relative;
            background: var(--bg-color);
            border-radius: 40px;
            box-shadow: var(--shadow-out);
            width: 320px;
            height: 200px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.8s var(--elastic-curve), height 0.6s var(--elastic-curve);
            z-index: 2;
        }

        .modern-box.show {
            transform: scale(1);
            opacity: 1;
        }

        .modern-box.hide {
            transform: scale(0);
            opacity: 0;
            transition: all 0.6s var(--smooth-curve);
        }

        .logo-container {
            position: absolute;
            top: 40px; /* 50px'den 40px'e çekildi */
            width: 100%;
            display: flex;
            justify-content: center;
            transition: all 0.6s var(--elastic-curve);
            z-index: 10;
        }

        /* SVG Logo İçin */
        .logo-img {
            width: 100px; /* 140px'den 100px'e küçültüldü */
            height: auto;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s var(--elastic-curve);
            filter: invert(34%) sepia(8%) saturate(541%) hue-rotate(167deg) brightness(93%) contrast(89%);
        }

        .modern-box.show .logo-img {
            opacity: 1;
            transform: translateY(0);
        }

        .modern-box.slide-up-logo .logo-container {
            top: 20px; /* Üstteki alan daraldığı için yukarı kayma payı da güncellendi */
        }

        .step-container {
            position: absolute;
            top: 100px;
            width: 100%;
            padding: 0 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
            transition: all 0.5s var(--elastic-curve);
        }

        .step-container.active {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
            transition-delay: 0.2s;
        }

        #step1 { top: 140px; } /* 130px'den 140px'e indirildi, logo ile arası açıldı */

        .neu-btn {
            background: var(--bg-color);
            border: none;
            border-radius: 20px;
            box-shadow: var(--shadow-out);
            color: var(--text-color);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
        }

        .neu-btn:active {
            box-shadow: var(--shadow-in);
            transform: scale(0.95);
        }

        .text-btn {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.3s ease;
            margin-top: 20px;
        }

        .text-btn:hover { color: var(--pink-color); }

        .icon-btn-row {
            display: flex;
            justify-content: center;
            gap: 30px; 
            width: 100%;
            margin-top: 10px;
        }

        .icon-btn {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            font-size: 34px;
        }

        .icon-btn.clicked {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: var(--shadow-in);
        }

        .input-group {
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .input-label {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
            margin-left: 5px;
            color: var(--text-color);
        }

        .neu-input {
            width: 100%;
            height: 50px;
            border: none;
            background: var(--bg-color);
            border-radius: 25px;
            box-shadow: var(--shadow-in);
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .neu-input::placeholder { color: #a0a5ab; }
        .neu-input:focus::placeholder { color: transparent; }
        
        .neu-input.success { box-shadow: inset 6px 6px 10px rgba(40, 167, 69, 0.2), inset -6px -6px 10px rgba(255, 255, 255, 0.8); }
        .neu-input.error { box-shadow: inset 6px 6px 10px rgba(211, 72, 99, 0.3), inset -6px -6px 10px rgba(255, 255, 255, 0.8); }

        .gender-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 0px;
            margin-bottom: 25px;
        }

        .gender-btn {
            width: 80px;
            height: 80px;
            border-radius: 25px;
            font-size: 34px;
        }

        .gender-btn.active.male { color: var(--soft-blue); box-shadow: var(--shadow-in); }
        .gender-btn.active.female { color: var(--soft-pink); box-shadow: var(--shadow-in); }

        .slider-container {
            width: 100%;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .age-display {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            box-shadow: var(--shadow-in);
            background: var(--bg-color);
            border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            box-shadow: var(--shadow-out);
            height: 30px;
            width: 30px;
            border-radius: 50%;
            background: var(--bg-color);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -9px;
            border: 3px solid #e0e5ec;
        }

        /* Hata Mesajı Kutusu */
        .error-box {
            background-color: var(--error-bg);
            color: #ffffff;
            font-weight: 600;
            font-size: 13px;
            padding: 12px 20px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(211, 72, 99, 0.4);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            max-width: 320px;
            text-align: center;
            pointer-events: none;
            z-index: 100;
        }
        .error-box.show { opacity: 1; transform: translateY(0); }

        /* Full Ekran Yükleme Alanı */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 20000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .loading-overlay.show { opacity: 1; }
        
        /* Eski Mask Logo Animasyonu Yükleme Ekranı İçin */
        .mask-logo-box {
            width: 100px; height: 90px; margin: 0 auto 20px;
            background-color: var(--text-color);
            -webkit-mask: url('logo/loveme.svg') no-repeat center;
            mask: url('logo/loveme.svg') no-repeat center;
            -webkit-mask-size: contain; mask-size: contain;
            animation: pulse-color 2s infinite ease-in-out;
        }
        @keyframes pulse-color { 
            0%, 100% { background-color: var(--text-color); } 
            50% { background-color: var(--pink-color); } 
        }

        .smoke-text {
            font-size: 15px; font-weight: 900; color: var(--text-color);
            text-transform: uppercase; letter-spacing: 2px; text-align: center;
            animation: smoke-elastic 2.5s infinite ease-in-out;
        }
        @keyframes smoke-elastic { 
            0%, 100% { transform: scale(0.95); opacity: 0.4; filter: blur(2px); } 
            50% { transform: scale(1.05); opacity: 1; filter: blur(0px); } 
        }
    </style>
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="mask-logo-box"></div>
        <div class="smoke-text ui-trans" data-key="loading_profile">PROFİLİNİZ HAZIRLANIYOR...</div>
    </div>

    <div class="modern-box" id="mainBox">
        
        <div class="logo-container">
            <img class="logo-img" src="logo/loveme.svg" alt="LoveMe Logo">
        </div>

        <div class="step-container" id="step1">
            <button class="text-btn ui-trans" data-key="btn_login_world" onclick="goToStep2()">DÜNYAYA GİRİŞ YAP</button>
        </div>

        <div class="step-container" id="step2">
            <div class="icon-btn-row">
                <button class="neu-btn icon-btn" onclick="handleIconClick(this, 'google')">
                    <i class="fa-brands fa-google"></i>
                </button>
                <button class="neu-btn icon-btn" onclick="handleIconClick(this, 'mail')">
                    <i class="fa-solid fa-envelope"></i>
                </button>
            </div>
        </div>

        <div class="step-container" id="step3" style="top: 80px;">
            <div class="input-group">
                <label class="input-label ui-trans" data-key="ph_email">E-Mail Adresi</label>
                <input type="email" id="emailInput" class="neu-input ui-trans-ph" data-key="ph_email" placeholder="E-Mail Adresi" 
                       onfocus="this.placeholder=''" onblur="this.placeholder=trans.ph_email">
            </div>
            <div class="input-group">
                <label class="input-label ui-trans" data-key="ph_pass">Şifre</label>
                <input type="password" id="passInput" class="neu-input ui-trans-ph" data-key="ph_pass" placeholder="Şifre"
                       onfocus="this.placeholder=''" onblur="this.placeholder=trans.ph_pass">
            </div>
            <button class="neu-btn ui-trans" data-key="btn_email_login" onclick="doEmailLogin(this)">GİRİŞ YAP / KAYIT OL</button>
        </div>

        <div class="step-container" id="step4" style="top: 80px;">
            <div class="input-group" style="margin-bottom: 10px;">
                <input type="text" id="gameUsername" class="neu-input ui-trans-ph" data-key="placeholder_nick" placeholder="KULLANICI ADI" style="text-align:center;"
                       oninput="this.value = this.value.toUpperCase(); checkNickname();"
                       onfocus="this.placeholder=''" onblur="this.placeholder=trans.placeholder_nick">
            </div>

            <div class="gender-row">
                <button class="neu-btn gender-btn" id="btnMale" onclick="selectGender('MALE')"><i class="fa-solid fa-mars"></i></button>
                <button class="neu-btn gender-btn" id="btnFemale" onclick="selectGender('FEMALE')"><i class="fa-solid fa-venus"></i></button>
            </div>

            <div class="slider-container">
                <div class="age-display" id="ageDisplay">18</div>
                <input type="range" id="ageSlider" min="18" max="99" value="18" oninput="updateAge(this.value)">
            </div>

            <button class="neu-btn ui-trans" data-key="btn_save" onclick="startGame()">OYUNA BAŞLA</button>
        </div>

    </div>

    <div id="errorBox" class="error-box">Hata Mesajı</div>

    <script>
        // --- API ve DİL AYARLARI ---
        const BACKEND_URL = "https://loveme-backend-6421.onrender.com";

        const userLangCode = (navigator.language || navigator.userLanguage || "en").split('-')[0].toLowerCase();
        if (['ar', 'he', 'fa', 'ur'].includes(userLangCode)) document.body.setAttribute('dir', 'rtl');
        
        const i18n = {
            tr: { btn_login_world: "DÜNYAYA GİRİŞ YAP", title_profile: "PROFİLİNİ OLUŞTUR", btn_save: "OYUNA BAŞLA", placeholder_nick: "KULLANICI ADI", err_login: "Giriş yapılırken bir sorun oluştu.", err_nick_len: "En az 4 karakter giriniz.", err_gender_toast: "Lütfen cinsiyetinizi seçin.", err_save: "Profil kaydedilemedi: ", title_login_options: "GİRİŞ YAP", btn_google: "GOOGLE İLE GİRİŞ YAP", btn_email_opt: "E-MAIL İLE GİRİŞ YAP", ph_email: "E-Mail Adresi", ph_pass: "Şifre", btn_email_login: "GİRİŞ YAP", err_empty_fields: "Email ve Şifre zorunludur.", err_invalid_email: "Geçerli bir e-mail giriniz.", err_nick_taken: "Bu kullanıcı adı alınmış.", err_pass_len: "Şifre en az 6 karakter, 1 büyük harf ve 1 sayı içermeli.", loading_profile: "PROFİLİNİZ HAZIRLANIYOR..." },
            en: { btn_login_world: "ENTER THE WORLD", title_profile: "CREATE YOUR PROFILE", btn_save: "START GAME", placeholder_nick: "USERNAME", err_login: "A problem occurred during login.", err_nick_len: "Min 4 characters required.", err_gender_toast: "Please select your gender.", err_save: "Profile could not be saved: ", title_login_options: "LOGIN", btn_google: "LOGIN WITH GOOGLE", btn_email_opt: "LOGIN WITH E-MAIL", ph_email: "E-Mail Address", ph_pass: "Password", btn_email_login: "LOGIN", err_empty_fields: "Email and Password are required.", err_invalid_email: "Enter a valid e-mail.", err_nick_taken: "Username already taken.", err_pass_len: "Password min 6 chars, 1 uppercase, 1 number.", loading_profile: "PREPARING YOUR PROFILE..." }
        };
        const trans = i18n[userLangCode] || i18n['en'];
        
        document.querySelectorAll('.ui-trans').forEach(el => { const key = el.getAttribute('data-key'); if (trans[key]) el.innerHTML = trans[key]; });
        document.querySelectorAll('.ui-trans-ph').forEach(el => { const key = el.getAttribute('data-key'); if (trans[key]) el.placeholder = trans[key]; });

        // --- GLOBAL DEĞİŞKENLER ---
        const box = document.getElementById('mainBox');
        let currentUser = null;
        let selectedGender = null;
        let isNickValid = false;
        let currentAgeValue = 18;
        let nickTimeout;

        // --- YÜKLEME EKRANI KONTROLLERİ ---
        window.showLoading = function() { 
            const overlay = document.getElementById('loadingOverlay'); 
            overlay.style.display = 'flex'; 
            setTimeout(() => overlay.classList.add('show'), 10); 
        };
        window.hideLoading = function() { 
            const overlay = document.getElementById('loadingOverlay'); 
            overlay.classList.remove('show'); 
            setTimeout(() => overlay.style.display = 'none', 500); 
        };

        // --- HATA MESAJI KUTUSU ---
        function showError(message) {
            const errBox = document.getElementById('errorBox');
            errBox.innerText = message;
            errBox.classList.add('show');
            setTimeout(() => errBox.classList.remove('show'), 3500);
        }

        // --- KUTU VE ADIM YÖNETİMİ ---
        function setBoxHeight(height) { box.style.height = height + 'px'; }

        function showStep(showId, height, slideLogo = false) {
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            if(slideLogo) box.classList.add('slide-up-logo');
            if(height) setBoxHeight(height);
            setTimeout(() => {
                const step = document.getElementById(showId);
                if(step) step.classList.add('active');
            }, 300);
        }

        function goToStep2() {
            showStep('step2', 200, true);
        }

        function handleIconClick(btn, type) {
            btn.classList.add('clicked');
            setTimeout(() => {
                btn.classList.remove('clicked');
                if(type === 'mail') {
                    showStep('step3', 380, true);
                } else if(type === 'google') {
                    window.location.href = `${BACKEND_URL}/api/auth/google`;
                }
            }, 400); 
        }

        // --- AUTH & KONTROL İŞLEMLERİ ---
        async function checkUserAndRoute(user) {
            if (!user) {
                window.hideLoading();
                box.classList.add('show');
                showStep('step1', 200, false);
                return;
            }
            try {
                const token = localStorage.getItem('loveme_token');
                if (!token) throw new Error('Token yok');
                
                const res = await fetch(`${BACKEND_URL}/api/user/${user.id}`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.status === 401) {
                    localStorage.removeItem('loveme_user');
                    localStorage.removeItem('loveme_token');
                    window.location.reload();
                    return;
                }

                const data = await res.json();
                if (res.ok && data.id) {
                    // Profil tamamlanmışsa direkt oyuna at
                    window.location.replace("oyun.html");
                } else {
                    // Profil yoksa profil adımını aç
                    window.hideLoading();
                    box.classList.add('show');
                    document.querySelector('.logo-img').style.opacity = '0'; // Logoyu gizle
                    showStep('step4', 450, true);
                }
            } catch (err) {
                console.error(err);
                window.hideLoading();
                box.classList.add('show');
                showStep('step1', 200, false);
            }
        }

        // --- İLK YÜKLEME ---
        window.onload = async () => {
            const savedUser = localStorage.getItem('loveme_user');
            const savedToken = localStorage.getItem('loveme_token');

            if (savedUser) {
                window.showLoading();
                currentUser = JSON.parse(savedUser);
                await checkUserAndRoute(currentUser);
            } 
            else if (savedToken) {
                window.showLoading();
                try {
                    const res = await fetch(`${BACKEND_URL}/api/auth/me`, {
                        method: 'GET',
                        headers: { 'Authorization': `Bearer ${savedToken}` }
                    });
                    const data = await res.json();
                    
                    if (data.user) {
                        currentUser = data.user;
                        localStorage.setItem('loveme_user', JSON.stringify(currentUser));
                        await checkUserAndRoute(currentUser);
                    } else {
                        throw new Error('Kullanıcı bilgisi alınamadı');
                    }
                } catch (err) {
                    console.error(err);
                    localStorage.removeItem('loveme_token');
                    window.hideLoading();
                    box.classList.add('show');
                    showStep('step1', 200, false);
                }
            } 
            else {
                // Sadece kutuyu göster
                setTimeout(() => box.classList.add('show'), 100);
                showStep('step1', 200, false);
            }
        };

        // --- MAİL İLE GİRİŞ / KAYIT ---
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        function validatePassword(password) {
            const re = /^(?=.*[A-Z])(?=.*\d).{6,}$/;
            return re.test(password);
        }

        async function doEmailLogin(btn) {
            const emailInput = document.getElementById('emailInput');
            const passInput = document.getElementById('passInput');
            const email = emailInput.value.trim();
            const pass = passInput.value;

            if(!emailRegex.test(email)) {
                showError(trans.err_invalid_email);
                emailInput.classList.add('error');
                return;
            }
            if(!validatePassword(pass)) {
                showError(trans.err_pass_len);
                passInput.classList.add('error');
                return;
            }

            emailInput.classList.remove('error');
            passInput.classList.remove('error');
            
            btn.classList.add('clicked');
            
            setTimeout(async () => {
                window.showLoading();
                try {
                    const response = await fetch(`${BACKEND_URL}/api/auth/email`, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ email, password: pass }) 
                    });
                    const data = await response.json();
                    
                    if (data.error) throw new Error(data.error);
                    
                    localStorage.setItem('loveme_user', JSON.stringify(data.user));
                    localStorage.setItem('loveme_token', data.access_token);
                    
                    currentUser = data.user; 
                    await checkUserAndRoute(data.user);
                } catch (error) { 
                    console.error(error); 
                    window.hideLoading(); 
                    showError(error.message); 
                    btn.classList.remove('clicked');
                }
            }, 300);
        }

        // --- PROFİL OLUŞTURMA İŞLEMLERİ ---
        async function checkNickname() {
            clearTimeout(nickTimeout);
            isNickValid = false;
            const nickInput = document.getElementById('gameUsername');
            const val = nickInput.value.trim().toLowerCase();
            
            if(val.length === 0) { 
                nickInput.classList.remove('success', 'error'); 
                return; 
            }
            if(val.length < 4) { 
                nickInput.classList.remove('success');
                nickInput.classList.add('error'); 
                return; 
            }
            
            nickTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`${BACKEND_URL}/api/check-nick`, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ nickname: val }) 
                    });
                    const data = await res.json();
                    if(!data.available) { 
                        nickInput.classList.remove('success');
                        nickInput.classList.add('error'); 
                        showError(trans.err_nick_taken);
                        isNickValid = false; 
                    } else { 
                        nickInput.classList.remove('error');
                        nickInput.classList.add('success'); 
                        isNickValid = true; 
                    }
                } catch (err) { console.error(err); }
            }, 600);
        }

        function selectGender(gender) {
            selectedGender = gender;
            const btnMale = document.getElementById('btnMale');
            const btnFemale = document.getElementById('btnFemale');
            
            btnMale.classList.remove('active', 'male');
            btnFemale.classList.remove('active', 'female');

            if(gender === 'MALE') {
                btnMale.classList.add('active', 'male');
            } else if (gender === 'FEMALE') {
                btnFemale.classList.add('active', 'female');
            }
        }

        // Haptic Feedback Slider
        function triggerHapticFeedback(val) { 
            if (navigator.vibrate) { 
                try { 
                    let duration = Math.floor(5 + ((val - 18) / (99 - 18)) * 35); 
                    navigator.vibrate([duration]); 
                } catch(e) {} 
            } 
        }

        let lastVibratedValue = 18;
        function updateAge(val) {
            document.getElementById('ageDisplay').innerText = val;
            currentAgeValue = parseInt(val);
            if (currentAgeValue !== lastVibratedValue) { 
                triggerHapticFeedback(currentAgeValue); 
                lastVibratedValue = currentAgeValue; 
            }
        }

        async function startGame() {
            const nickInput = document.getElementById('gameUsername');
            const nick = nickInput.value.trim().toLowerCase();
            
            if (!isNickValid || nick.length < 4) {
                showError(trans.err_nick_len + " veya " + trans.err_nick_taken);
                return;
            }
            
            if (!selectedGender) {
                showError(trans.err_gender_toast);
                return;
            }

            window.showLoading();
            try {
                const token = localStorage.getItem('loveme_token');
                const response = await fetch(`${BACKEND_URL}/api/save-profile`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, 
                    body: JSON.stringify({ 
                        uid: currentUser.id, 
                        email: currentUser.email, 
                        nickname: nick, 
                        gender: selectedGender, 
                        age: currentAgeValue 
                    }) 
                });
                
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                window.location.replace("oyun.html");
            } catch (error) { 
                console.error(error); 
                window.hideLoading(); 
                showError(trans.err_save + error.message); 
            }
        }
    </script>
</body>
</html>
