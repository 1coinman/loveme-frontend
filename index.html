<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="icon" type="image/png" href="logo/LoveMe.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.cdnfonts.com/css/digital-numbers" rel="stylesheet">
    <script>
        if (window.history.replaceState) window.history.replaceState(null, null, "/");
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || 
               (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 80))) { 
                e.preventDefault(); return false; 
            }
        });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVEME</title>
    <style>
        * { -webkit-tap-highlight-color: transparent !important; outline: none !important; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; background: #fff; display: flex; align-items: center; justify-content: center;
            min-height: 100dvh; overflow-x: hidden; color: #000;
            -webkit-user-select: none; user-select: none;
        }
        .container { width: 90%; max-width: 400px; padding: 20px; margin: auto; text-align: center; }
        .logo-box {
            width: 100px; height: 90px; margin: 0 auto 40px; background-color: #000;
            -webkit-mask: url('logo/loveme.svg') no-repeat center; mask: url('logo/loveme.svg') no-repeat center;
            -webkit-mask-size: contain; mask-size: contain;
            animation: pulse-color 3s infinite ease-in-out;
        }
        @keyframes pulse-color { 0%, 100% { background-color: #000; } 50% { background-color: #ff0000; } }
        .w-600 { font-weight: 600; } .w-800 { font-weight: 800; }
        .premium-text { text-transform: uppercase; letter-spacing: 2.5px; }
        .input-group { width: 100%; margin-bottom: 15px; text-align: left; }
        .input-err-text { display: none; color: #ff0000; font-size: 11px; font-weight: 900; margin-left: 5px; }
        .custom-input {
            width: 100%; padding: 15px; border: 2.5px solid #ccc; border-radius: 12px;
            background: #fff; font-size: 15px; font-weight: 900; text-align: center;
            box-sizing: border-box; transition: 0.3s;
        }
        .custom-input.input-success { border-color: #28a745 !important; }
        .custom-input.input-error { border-color: #ff0000 !important; }
        .invite-btn-submit {
            width: 100%; padding: 15px; background: #fff; border: 2.5px solid #000;
            font-size: 14px; font-weight: 900; border-radius: 12px; cursor: pointer;
            text-transform: uppercase; transition: 0.2s;
        }
        .invite-btn-submit:active { transform: scale(0.95); }
        .btn-default { background: #000; color: #fff; }
        .btn-male { background: #000 !important; color: #fff !important; }
        .btn-female { background: #FF69B4 !important; color: #fff !important; }
        .gender-wrapper { position: relative; width: 100%; }
        .gender-selection { display: flex; justify-content: center; gap: 20px; margin-bottom: 35px; }
        .gender-btn {
            width: 70px; height: 70px; border-radius: 16px; font-size: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; opacity: 0.4;
        }
        .gender-male { background: #000; color: #fff; }
        .gender-female { background: #FF69B4; color: #fff; }
        .gender-btn.active { opacity: 1; transform: scale(1.1); }
        .gender-toast {
            position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%) scale(0.8);
            background: #fff; color: #000; padding: 8px 16px; border-radius: 20px;
            font-size: 11px; font-weight: 900; white-space: nowrap;
            opacity: 0; transition: 0.3s; pointer-events: none; border: 1px solid #ccc;
        }
        .gender-toast.show { opacity: 1; transform: translateX(-50%) scale(1); }
        .age-slider-container { width: 100%; margin: 20px 0; }
        .custom-slider-wrapper {
            position: relative; width: 90%; height: 30px; margin: 0 auto;
            cursor: pointer; touch-action: none;
        }
        .custom-slider-track {
            width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px;
            position: absolute; top: 50%; transform: translateY(-50%);
        }
        .custom-slider-thumb {
            width: 28px; height: 28px; background: #fff; border-radius: 50%;
            position: absolute; top: 50%; left: 0%; transform: translate(-50%, -50%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); transition: 0.1s;
        }
        .custom-slider-tooltip {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            font-size: 14px; font-weight: bold; background: #000; color: #fff;
            padding: 2px 6px; border-radius: 12px; white-space: nowrap;
        }
        .slider-male .custom-slider-thumb { background: #000; }
        .slider-female .custom-slider-thumb { background: #FF69B4; }
        .text-btn { background: none; border: none; padding: 15px; font-size: 15px; cursor: pointer; }
        #login-area { display: none; }
        #registration-form { display: none; width: 100%; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 10000;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.4s;
        }
        .modal-overlay.show-anim { display: flex; opacity: 1; }
        .modal-box {
            background: #fff; border-radius: 20px; padding: 30px 25px;
            width: 85%; max-width: 340px; border: 2px solid #000;
            transform: translateY(30px); opacity: 0;
            transition: transform 0.4s, opacity 0.4s;
        }
        .modal-overlay.show-anim .modal-box { transform: translateY(0); opacity: 1; }
        .modal-close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; }
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 20000;
            display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s;
        }
        .loading-overlay.show { display: flex; opacity: 1; }
        .smoke-text { font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-top: 20px; }
    </style>
</head>
<body dir="ltr">
    <div id="loadingOverlay" class="loading-overlay">
        <div class="logo-box" style="margin-bottom: 0; width: 80px; height: 72px;"></div>
        <div class="smoke-text ui-trans" data-key="loading_profile">PROFİLİNİZ HAZIRLANIYOR...</div>
    </div>
    <div class="container">
        <div class="logo-box"></div>
        <div id="login-area">
            <button class="text-btn premium-text w-800 ui-trans" onclick="window.toggleLoginModal()" data-key="btn_login_world">DÜNYAYA GİRİŞ YAP</button>
        </div>
        <div id="registration-form">
            <h3 class="premium-text w-600 ui-trans" data-key="title_profile">PROFİLİNİ OLUŞTUR</h3>
            <div class="input-group">
                <div class="input-err-text" id="nickErrLabel"></div>
                <input type="text" id="nickname" class="custom-input ui-trans-ph" data-key="placeholder_nick" placeholder="KULLANICI ADI" maxlength="15" autocomplete="off">
            </div>
            <div class="gender-wrapper">
                <div id="genderToast" class="gender-toast ui-trans" data-key="err_gender_toast">CİNSİYETİNİZİ SEÇİN</div>
                <div class="gender-selection">
                    <button class="gender-btn gender-male" id="male" onclick="selectGender('MALE')"><i class="fa-solid fa-mars"></i></button>
                    <button class="gender-btn gender-female" id="female" onclick="selectGender('FEMALE')"><i class="fa-solid fa-venus"></i></button>
                </div>
            </div>
            <div class="age-slider-container">
                <div class="custom-slider-wrapper" id="ageSliderWrapper">
                    <div class="custom-slider-track" id="ageTrack"></div>
                    <div class="custom-slider-thumb" id="ageThumb">
                        <div class="custom-slider-tooltip" id="ageTooltip">18</div>
                    </div>
                </div>
                <div class="selection-title ui-trans" data-key="title_age">YAŞINIZ</div>
            </div>
            <button class="invite-btn-submit btn-default ui-trans" id="save-btn" data-key="btn_save">OYUNA BAŞLA</button>
        </div>
    </div>
    <div id="loginModal" class="modal-overlay">
        <div class="modal-box">
            <i class="fa-solid fa-xmark modal-close-x" onclick="window.toggleLoginModal()"></i>
            <div class="page-title ui-trans" data-key="title_login_options">GİRİŞ YAP</div>
            <div id="loginOptionsWrap">
                <button class="invite-btn-submit ui-trans" id="googleLoginBtn" style="margin-bottom: 15px;"><i class="fa-brands fa-google"></i> GOOGLE İLE GİRİŞ YAP</button>
                <button class="invite-btn-submit ui-trans" id="emailOptBtn">E-MAIL İLE GİRİŞ YAP</button>
            </div>
            <div id="emailFormWrap" style="display:none;">
                <input type="email" id="emailInput" class="custom-input" placeholder="E-Mail">
                <input type="password" id="passInput" class="custom-input" placeholder="Şifre" style="margin-top:10px;">
                <button class="invite-btn-submit btn-default" id="emailActionBtn">GİRİŞ YAP / KAYIT OL</button>
                <div id="authFeedback" class="invite-feedback"></div>
            </div>
        </div>
    </div>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    const BACKEND_URL = "https://loveme-backend-6421.onrender.com";
    const userLangCode = (navigator.language || "en").split('-')[0];
    const i18n = {
        tr: { btn_login_world:"DÜNYAYA GİRİŞ YAP", title_profile:"PROFİLİNİ OLUŞTUR", btn_save:"OYUNA BAŞLA", placeholder_nick:"KULLANICI ADI", title_age:"YAŞINIZ", err_gender_toast:"CİNSİYETİNİZİ SEÇİN", title_login_options:"GİRİŞ YAP", btn_google:"GOOGLE İLE GİRİŞ YAP", btn_email_opt:"E-MAIL İLE GİRİŞ YAP", ph_email:"E-Mail Adresi", ph_pass:"Şifre", btn_email_login:"GİRİŞ YAP / KAYIT OL", err_nick_len:"En az 3 karakter", err_nick_taken:"Bu kullanıcı adı alınmış", loading_profile:"PROFİLİNİZ HAZIRLANIYOR..." },
        en: { btn_login_world:"ENTER THE WORLD", title_profile:"CREATE YOUR PROFILE", btn_save:"START GAME", placeholder_nick:"USERNAME", title_age:"YOUR AGE", err_gender_toast:"SELECT YOUR GENDER", title_login_options:"LOGIN", btn_google:"LOGIN WITH GOOGLE", btn_email_opt:"LOGIN WITH E-MAIL", ph_email:"E-Mail Address", ph_pass:"Password", btn_email_login:"LOGIN / REGISTER", err_nick_len:"Min 3 characters", err_nick_taken:"Username taken", loading_profile:"PREPARING YOUR PROFILE..." }
    };
    const trans = i18n[userLangCode] || i18n['en'];
    document.querySelectorAll('.ui-trans').forEach(el => { let k=el.dataset.key; if(trans[k]) el.innerText=trans[k]; });
    document.querySelectorAll('.ui-trans-ph').forEach(el => { let k=el.dataset.key; if(trans[k]) el.placeholder=trans[k]; });
    window.showLoading=()=>{ let o=document.getElementById('loadingOverlay'); o.style.display='flex'; setTimeout(()=>o.classList.add('show'),10); };
    window.hideLoading=()=>{ let o=document.getElementById('loadingOverlay'); o.classList.remove('show'); setTimeout(()=>o.style.display='none',500); };
    const firebaseConfig = { apiKey:"AIzaSyC2eFkB1V0RzyixCM7cIYKanQHHBOee7ds", authDomain:"loveme-games.firebaseapp.com", projectId:"loveme-games", storageBucket:"loveme-games.firebasestorage.app", messagingSenderId:"256281138917", appId:"1:256281138917:web:a545514944ead1dd5e660c", measurementId:"G-6G9TR53EK0" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    let currentUser=null, selectedGender=null, isNickValid=false, currentAgeValue=18;
    window.selectGender=(g)=>{ selectedGender=g; document.querySelectorAll('.gender-btn').forEach(b=>b.classList.remove('active')); document.getElementById(g==='MALE'?'male':'female').classList.add('active'); let sw=document.getElementById('ageSliderWrapper'); sw.classList.remove('slider-male','slider-female'); sw.classList.add(g==='MALE'?'slider-male':'slider-female'); document.getElementById('save-btn').classList.remove('btn-default','btn-male','btn-female'); document.getElementById('save-btn').classList.add(g==='MALE'?'btn-male':'btn-female'); };
    function updateSliderPos(percent){ let thumb=document.getElementById('ageThumb'); thumb.style.left=(percent*100)+'%'; let val=Math.round(18+percent*81); document.getElementById('ageTooltip').innerText=val; currentAgeValue=val; }
    let sliderTrack=document.getElementById('ageTrack'); let dragging=false;
    function onMove(e){ if(!dragging) return; let rect=sliderTrack.getBoundingClientRect(); let x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left; let perc=Math.min(1,Math.max(0,x/rect.width)); updateSliderPos(perc); }
    sliderTrack.parentElement.addEventListener('mousedown',(e)=>{ dragging=true; onMove(e); });
    window.addEventListener('mousemove',onMove); window.addEventListener('mouseup',()=>dragging=false);
    sliderTrack.parentElement.addEventListener('touchstart',(e)=>{ dragging=true; onMove(e); });
    window.addEventListener('touchmove',onMove); window.addEventListener('touchend',()=>dragging=false);
    async function checkUserAndRoute(user){ try{ let resp=await fetch(`${BACKEND_URL}/api/user/${user.id}`); if(resp.status===404){ hideLoading(); document.getElementById('loginModal').style.display='none'; document.getElementById('login-area').style.display='none'; document.getElementById('registration-form').style.display='flex'; return; } let data=await resp.json(); if(data.id) window.location.replace("oyun.html"); }catch(e){ hideLoading(); document.getElementById('login-area').style.display='block'; } }
    window.onload=()=>{ let saved=localStorage.getItem('loveme_user'); if(saved){ currentUser=JSON.parse(saved); showLoading(); checkUserAndRoute(currentUser); } else document.getElementById('login-area').style.display='block'; };
    window.toggleLoginModal=()=>{ let modal=document.getElementById('loginModal'); if(modal.classList.contains('show-anim')){ modal.classList.remove('show-anim'); setTimeout(()=>modal.style.display='none',400); }else{ modal.style.display='flex'; setTimeout(()=>modal.classList.add('show-anim'),10); } };
    document.getElementById('emailOptBtn').onclick=()=>{ document.getElementById('loginOptionsWrap').style.display='none'; document.getElementById('emailFormWrap').style.display='block'; };
    document.getElementById('googleLoginBtn').onclick=async()=>{ try{ showLoading(); let res=await signInWithPopup(auth,provider); currentUser={id:res.user.uid, email:res.user.email}; localStorage.setItem('loveme_user',JSON.stringify(currentUser)); await checkUserAndRoute(currentUser); }catch(e){ hideLoading(); alert(trans.err_login||"Giriş hatası"); } };
    document.getElementById('emailActionBtn').onclick=async()=>{ let email=document.getElementById('emailInput').value.trim(); let pwd=document.getElementById('passInput').value; if(!email||pwd.length<6){ alert("Email ve şifre (min6) gerekli"); return; } showLoading(); try{ let resp=await fetch(`${BACKEND_URL}/api/auth/email`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pwd})}); let data=await resp.json(); if(data.error)throw new Error(data.error); currentUser=data.user; localStorage.setItem('loveme_user',JSON.stringify(currentUser)); await checkUserAndRoute(currentUser); }catch(e){ hideLoading(); alert(e.message); } };
    let nickInput=document.getElementById('nickname'), nickErr=document.getElementById('nickErrLabel'), nickTimeout;
    nickInput.addEventListener('input',()=>{ clearTimeout(nickTimeout); let val=nickInput.value.trim().toLowerCase(); if(val.length<3){ nickErr.innerText=trans.err_nick_len; nickErr.style.display='block'; isNickValid=false; return; } nickErr.style.display='none'; nickTimeout=setTimeout(async()=>{ try{ let res=await fetch(`${BACKEND_URL}/api/check-nick`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nickname:val})}); let data=await res.json(); if(!data.available){ nickErr.innerText=trans.err_nick_taken; nickErr.style.display='block'; isNickValid=false; }else isNickValid=true; }catch(e){} },500); });
    document.getElementById('save-btn').onclick=async()=>{ let nick=nickInput.value.trim().toLowerCase(); if(!selectedGender){ document.getElementById('genderToast').classList.add('show'); setTimeout(()=>document.getElementById('genderToast').classList.remove('show'),2000); return; } if(!isNickValid||nick.length<3){ alert(trans.err_nick_len); return; } showLoading(); try{ let res=await fetch(`${BACKEND_URL}/api/save-profile`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({uid:currentUser.id, email:currentUser.email, nickname:nick, gender:selectedGender, age:currentAgeValue})}); let data=await res.json(); if(data.error)throw new Error(data.error); window.location.replace("oyun.html"); }catch(e){ hideLoading(); alert(trans.err_save+e.message); } };
    </script>
</body>
</html>
