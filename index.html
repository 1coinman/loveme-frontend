    <script>
        // Sağ Tıklama ve Klavye Kısayollarını Engelleme
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || 
               (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 80))) { 
                e.preventDefault(); return false; 
            }
        });

    <title>LOVEME</title>
    <style>
        /* MAVİ TIKLAMA ALANLARINI TÜM SİSTEMDE YOK ET (UX ZIRHI) */
        * {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }

        html, body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; background-color: #ffffff; 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100dvh; 
            overflow-x: hidden; color: #000;
            overscroll-behavior-y: smooth; -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased; 
            -moz-osx-font-smoothing: grayscale;
            
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
            -webkit-touch-callout: none; 
        }
        
        .invite-timer, .option-box, .lb-time-item span, .inv-item-display span, .custom-slider-tooltip {
            font-family: 'Digital Numbers', sans-serif;
        }

        img { pointer-events: none; }

        .container { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 90%; max-width: 400px; padding: 20px; margin: auto;
        }
        
        .logo-box { 
            width: 100px; height: 90px; margin: 0 auto 40px; background-color: #000; 
            -webkit-mask: url('logo/loveme.svg') no-repeat center; 
            mask: url('logo/loveme.svg') no-repeat center; 
            -webkit-mask-size: contain; mask-size: contain; 
            animation: pulse-color 3s infinite ease-in-out; 
        }
        @keyframes pulse-color { 0%, 100% { background-color: #000; } 50% { background-color: #ff0000; } }
        
        .w-600 { font-weight: 600 !important; }
        .w-800 { font-weight: 800 !important; }

        .premium-text { text-transform: uppercase; letter-spacing: 2.5px; color: #000; }
        h3 { font-size: 15px; margin-bottom: 35px; text-align: center; }
        
        .input-group { width: 100%; display: flex; flex-direction: column; align-items: flex-start; gap: 5px; margin-bottom: 15px; }
        .input-err-text { display: none; color: #ff0000; font-size: 11px; font-weight: 900; text-align: left; width: 100%; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 5px; }
        
        .custom-input { 
            width: 100%; padding: 15px; border: 2.5px solid #ccc; 
            border-radius: 12px; background: #fff; font-size: 15px; font-weight: 900; 
            text-align: center; color: #000; outline: none; transition: 0.3s; box-sizing: border-box;
            letter-spacing: 1px;
        }
        .custom-input::placeholder { color: #999; font-weight: 800; letter-spacing: 1.5px; }
        .custom-input:focus { border-color: #888; }
        .custom-input.input-success { border-color: #28a745 !important; }
        .custom-input.input-error { border-color: #ff0000 !important; }

        .invite-btn-submit { 
            width: 100%; padding: 15px; background: #fff; color: #000; border: 2.5px solid #000; 
            font-size: 14px; font-weight: 900; border-radius: 12px; cursor: pointer; 
            transition: 0.2s; text-transform: uppercase; display: flex; justify-content: center; 
            align-items: center; box-sizing: border-box;
        }
        .invite-btn-submit:disabled { opacity: 0.5; cursor: not-allowed;}
        .invite-btn-submit:active:not(:disabled) { transform: scale(0.95); }

        /* ANA BUTON STİLLERİ */
        .btn-default { background: #000; color: #fff; border-color: #000; }
        .btn-male { background: #000 !important; color: #fff !important; border-color: #000 !important; }
        .btn-female { background: #FF69B4 !important; color: #fff !important; border-color: #FF69B4 !important; }
        
        @keyframes btn-pulse-anim {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .btn-pulse { animation: btn-pulse-anim 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* CİNSİYET SEÇİMİ VE ANİMASYONLARI */
        .gender-wrapper { position: relative; width: 100%; }
        .gender-selection { display: flex; justify-content: center; gap: 20px; margin-bottom: 35px; margin-top: 10px; width: 100%; }
        .gender-btn { 
            width: 70px; height: 70px; border-radius: 16px; border: 3px solid transparent; 
            font-size: 32px; display: flex; justify-content: center; align-items: center; 
            cursor: pointer; transition: opacity 0.3s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s; 
            opacity: 0.4; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .gender-male { background: #000; color: #fff; }
        .gender-female { background: #FF69B4; color: #fff; }
        .gender-btn.active { opacity: 1; transform: scale(1.1); box-shadow: 0 8px 20px rgba(0,0,0,0.25); border-color: #fff;}
        
        @keyframes btn-click-anim {
            0% { transform: scale(1); }
            40% { transform: scale(0.85); }
            100% { transform: scale(1.1); } 
        }
        .clicked-anim { animation: btn-click-anim 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* CİNSİYET SEÇİMİ UYARI TOAST (BALONCUK) ANİMASYONU */
        .gender-toast {
            position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%) scale(0.5) translateY(20px);
            background: #fff; color: #000; padding: 10px 20px; border-radius: 20px;
            font-size: 11px; font-weight: 900; letter-spacing: 1px;
            opacity: 0; pointer-events: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 10; border: 2px solid #f2f2f2;
        }
        .gender-toast.show { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
        .gender-toast.fade-up { opacity: 0; transform: translateX(-50%) scale(1.1) translateY(-40px); }

        /* --- DİNAMİK VE GÖLGELİ YAŞ BARI --- */
        .age-slider-container { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; padding-top: 15px; }
        .selection-title { font-size: 12px; font-weight: 900; color: #666; text-transform: uppercase; margin-top: 25px; margin-bottom: 0; transition: color 0.3s;}
        
        .custom-slider-wrapper { 
            position: relative; width: 90%; height: 30px; display: flex; align-items: center; 
            cursor: pointer; touch-action: none; 
        }
        
        .custom-slider-track { 
            width: 100%; height: 10px; border-radius: 6px; position: relative;
            background: #e0e0e0; 
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .custom-slider-thumb { 
            width: 32px; height: 32px; border-radius: 50%; background: #fff; border: none;
            position: absolute; top: 50%; left: 0%; transform: translate(-50%, -50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            transition: background-color 0.4s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s;
            display: flex; justify-content: center; align-items: center; z-index: 2;
        }
        
        .custom-slider-thumb.active { transform: translate(-50%, -50%) scale(1.35); }

        .slider-male .custom-slider-track { background: #f0f0f0; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
        .slider-male .custom-slider-thumb { background: #000; box-shadow: 0 5px 20px rgba(0,0,0,0.4); }
        .slider-male .custom-slider-tooltip { color: #000; }

        .slider-female .custom-slider-track { background: #FF69B4; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        .slider-female .custom-slider-thumb { background: #fff; box-shadow: 0 5px 20px rgba(255, 105, 180, 0.5); }
        .slider-female .custom-slider-tooltip { color: #FF69B4; }
        
        @keyframes track-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
        .track-pulsing { animation: track-pulse 0.4s ease; }
        
        .custom-slider-tooltip {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            font-size: 15px; font-weight: bold; color: #000; 
            opacity: 1; transition: color 0.4s; pointer-events: none;
        }
        
        @keyframes teach-slide {
            0% { left: 0%; }
            30% { left: 20%; }
            60% { left: 0%; }
            80% { left: 8%; }
            100% { left: 0%; }
        }
        .teach-anim { animation: teach-slide 2s cubic-bezier(0.34, 1.56, 0.64, 1) 1s; }

        .text-btn { background: none; border: none; padding: 15px; font-size: 15px; cursor: pointer; transition: 0.2s; font-family: inherit; color: #000; }
        .text-btn:hover { color: #ff0000; }

        #login-area { display: none; }
        #registration-form { display: none; width: 100%; }
        
        /* MODAL KODLARI */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.4s ease;
        }
        .modal-box {
            background: #fff; border-radius: 20px; padding: 30px 25px;
            width: 85%; max-width: 340px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border: 2.5px solid #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(120px) scale(0.85); opacity: 0; position: relative;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.15), opacity 0.4s ease;
        }
        .modal-overlay.show-anim .modal-box { transform: translateY(0) scale(1); opacity: 1; }
        .modal-close-x { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; color:#000; }
        .page-title { font-weight: 900; font-size: 18px; margin-bottom: 25px; color: #000; letter-spacing: 1px;}
        .invite-feedback { font-size: 13px; font-weight: 900; text-align: center; text-transform: uppercase; color: #ff0000; margin-top: 10px; }

        /* YENİ: YÜKLEME (SMOKE ELASTIC) ANİMASYONU EKRANI */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); z-index: 20000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .loading-overlay.show { opacity: 1; }
        .smoke-text {
            font-size: 15px; font-weight: 900; color: #000; text-transform: uppercase;
            letter-spacing: 2px; text-align: center; margin-top: 20px;
            animation: smoke-elastic 2.5s infinite ease-in-out;
        }
        @keyframes smoke-elastic {
            0% { transform: scale(0.95); opacity: 0.4; filter: blur(2px); }
            50% { transform: scale(1.05); opacity: 1; filter: blur(0px); }
            100% { transform: scale(0.95); opacity: 0.4; filter: blur(2px); }
        }
    </style>
</head>

    const trans = i18n[userLangCode] || i18n['en'];
    
    document.querySelectorAll('.ui-trans').forEach(el => {
        const key = el.getAttribute('data-key');
        if (trans[key]) el.innerHTML = trans[key];
    });
    
    document.querySelectorAll('.ui-trans-ph').forEach(el => {
        const key = el.getAttribute('data-key');
        if (trans[key]) el.placeholder = trans[key];
    });

    // YENİ: YÜKLEME (SMOKE ELASTIC) ANİMASYONU KONTROLLERİ
    window.showLoading = function() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex';
        setTimeout(() => overlay.classList.add('show'), 10);
    };

    window.hideLoading = function() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.remove('show');
        setTimeout(() => overlay.style.display = 'none', 500);
    };

    // --- SADECE GOOGLE AUTH İÇİN ÜCRETSİZ FİREBASE BAĞLANTISI ---
    const firebaseConfig = {
        apiKey: "AIzaSyC2eFkB1V0RzyixCM7cIYKanQHHBOee7ds",
        authDomain: "loveme-games.firebaseapp.com",
        projectId: "loveme-games",
        storageBucket: "loveme-games.firebasestorage.app",
        messagingSenderId: "256281138917",
        appId: "1:256281138917:web:a545514944ead1dd5e660c",
        measurementId: "G-6G9TR53EK0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let selectedGender = null;
    let isNickValid = false;
    let currentAgeValue = 18; 

    // CİNSİYET SEÇİMİ VE DİNAMİK ANA BUTON GEÇİŞİ
    window.selectGender = (gender) => {
        const targetBtn = gender === 'MALE' ? document.getElementById('male') : document.getElementById('female');
        
        targetBtn.classList.add('clicked-anim');
        setTimeout(() => targetBtn.classList.remove('clicked-anim'), 400);

        selectedGender = gender;
        document.querySelectorAll('.gender-btn').forEach(el => el.classList.remove('active'));
        targetBtn.classList.add('active');

        const sliderContainer = document.getElementById('ageSliderWrapper');
        sliderContainer.classList.remove('slider-male', 'slider-female');
        sliderContainer.classList.add(gender === 'MALE' ? 'slider-male' : 'slider-female');
        
        const ageTrack = document.getElementById('ageTrack');
        ageTrack.classList.add('track-pulsing');
        setTimeout(() => ageTrack.classList.remove('track-pulsing'), 400);

        const saveBtn = document.getElementById('save-btn');
        saveBtn.classList.remove('btn-default', 'btn-male', 'btn-female');
        saveBtn.classList.add(gender === 'MALE' ? 'btn-male' : 'btn-female');
        
        saveBtn.classList.add('btn-pulse');
        setTimeout(() => saveBtn.classList.remove('btn-pulse'), 400);
    };

    function triggerHapticFeedback(val) {
        if (navigator.vibrate) {
            try {
                let duration = Math.floor(5 + ((val - 18) / (99 - 18)) * 35); 
                navigator.vibrate([duration]); 
            } catch(e) { console.warn("Titreşim Hatası:", e); }
        }
    }

    const sliderWrapper = document.getElementById('ageSliderWrapper');
    const thumb = document.getElementById('ageThumb');
    const tooltip = document.getElementById('ageTooltip');
    const track = document.getElementById('ageTrack');
    let isDragging = false;
    let lastVibratedValue = 18;

    function updateSlider(clientX) {
        const rect = track.getBoundingClientRect();
        let x = clientX - rect.left;
        let percent = x / rect.width;
        if (percent < 0) percent = 0;
        if (percent > 1) percent = 1;
        
        thumb.style.left = (percent * 100) + '%';
        const val = Math.round(18 + percent * (99 - 18));
        
        if (val !== currentAgeValue) {
            currentAgeValue = val;
            tooltip.innerText = val;
            if (val !== lastVibratedValue) {
                triggerHapticFeedback(val);
                lastVibratedValue = val;
            }
        }
    }

    function startDrag(e) {
        isDragging = true;
        thumb.classList.add('active');
        thumb.classList.remove('teach-anim');
        updateSlider(e.type.includes('touch') ? e.touches[0].clientX : e.clientX);
    }
    function endDrag() {
        if(!isDragging) return;
        isDragging = false;
        thumb.classList.remove('active');
    }
    function moveDrag(e) {
        if (!isDragging) return;
        e.preventDefault(); 
        updateSlider(e.type.includes('touch') ? e.touches[0].clientX : e.clientX);
    }

    sliderWrapper.addEventListener('mousedown', startDrag);
    sliderWrapper.addEventListener('touchstart', startDrag, {passive: false});
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('touchmove', moveDrag, {passive: false});

    // YENİ VE DÜZELTİLMİŞ KULLANICI KONTROLÜ (API UYUMLU)
    async function checkUserAndRoute(user) {
        try {
            const token = localStorage.getItem('loveme_token');
            // DÜZELTME: Gelen objenin 'id' veya 'uid' taşıması ihtimaline karşı güvenli kontrol
            const userId = user.id || user.uid; 
            
            if (!userId) {
                throw new Error("Kullanıcı ID bulunamadı");
            }

            const res = await fetch(`${BACKEND_URL}/api/user/${userId}`, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                }
            });
            const data = await res.json();

            // Eğer error yoksa ve kullanıcı verisi döndüyse (kullanıcı kayıtlıysa)
            if (!data.error && (data.id || data.uid || data.nickname)) {
                window.location.replace("oyun.html");
            } else {
                // Kullanıcı veritabanında yoksa (yeni kayıt olacaksa Profil formunu aç)
                window.hideLoading(); 
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('loginModal').style.opacity = '0';
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('registration-form').style.display = 'flex';
                document.getElementById('registration-form').style.flexDirection = 'column';
                document.getElementById('registration-form').style.alignItems = 'center';
            }
        } catch (err) { 
            console.error("Kullanıcı kontrol hatası", err);
            window.hideLoading();
            // Hata olursa sonsuz beyaz ekranda kalmaması için giriş butonunu geri getir
            document.getElementById('login-area').style.display = 'block';
        }
    }

    // SAYFA YÜKLENDİĞİNDE OTURUM KONTROLÜ
    window.onload = () => {
        const savedUser = localStorage.getItem('loveme_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            checkUserAndRoute(currentUser);
        } else {
            document.getElementById('login-area').style.display = 'block';
        }
    };

    window.toggleLoginModal = function() {
        const modal = document.getElementById('loginModal');
        if (modal.style.display === 'flex') {
            modal.style.opacity = '0';
            modal.classList.remove('show-anim');
            setTimeout(() => { 
                modal.style.display = 'none'; 
                document.getElementById('emailFormWrap').style.display = 'none';
                document.getElementById('loginOptionsWrap').style.display = 'block';
                const inputs = [document.getElementById('emailInput'), document.getElementById('passInput')];
                inputs.forEach(input => { input.value = ''; input.className = 'custom-input ui-trans-ph'; });
                document.getElementById('emailErrLabel').style.display = 'none';
                document.getElementById('passErrLabel').style.display = 'none';
                document.getElementById('authFeedback').style.display = 'none';
                document.getElementById('passInput').type = 'password';
                document.getElementById('togglePassword').className = 'fa-solid fa-eye-slash';
            }, 400);
        } else {
            modal.style.display = 'flex';
            setTimeout(() => { modal.style.opacity = '1'; modal.classList.add('show-anim'); }, 10);
        }
    };

    // BOŞLUĞA (OVERLAY) TIKLAYARAK MODALI KAPATMA ÖZELLİĞİ
    document.getElementById('loginModal').addEventListener('click', function(e) {
        if (e.target === this) {
            window.toggleLoginModal();
        }
    });

    document.getElementById('emailOptBtn').addEventListener('click', () => {
        document.getElementById('loginOptionsWrap').style.display = 'none';
        document.getElementById('emailFormWrap').style.display = 'block';
        setTimeout(() => document.getElementById('emailInput').focus(), 100);
    });

    document.getElementById('emailInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.keyCode === 13) { e.preventDefault(); document.getElementById('passInput').focus(); }
    });

    document.getElementById('passInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.keyCode === 13) { e.preventDefault(); document.getElementById('emailActionBtn').click(); }
    });

    document.getElementById('togglePassword').addEventListener('click', function() {
        const passInput = document.getElementById('passInput');
        if (passInput.type === 'password') {
            passInput.type = 'text'; this.classList.remove('fa-eye-slash'); this.classList.add('fa-eye'); this.style.opacity = '1';
        } else {
            passInput.type = 'password'; this.classList.remove('fa-eye'); this.classList.add('fa-eye-slash'); this.style.opacity = '0.5';
        }
    });

    const emailInput = document.getElementById('emailInput');
    const emailErrLabel = document.getElementById('emailErrLabel');
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    emailInput.addEventListener('input', () => {
        const val = emailInput.value.trim();
        if(val === '') {
            emailInput.className = 'custom-input ui-trans-ph'; emailErrLabel.style.display = 'none';
        } else if(emailRegex.test(val)) {
            emailInput.className = 'custom-input ui-trans-ph input-success'; emailErrLabel.style.display = 'none';
        } else {
            emailInput.className = 'custom-input ui-trans-ph input-error'; emailErrLabel.innerText = trans.err_invalid_email; emailErrLabel.style.display = 'block';
        }
    });

    const passInput = document.getElementById('passInput');
    const passErrLabel = document.getElementById('passErrLabel');

    passInput.addEventListener('input', () => {
        const val = passInput.value;
        if(val === '') {
            passInput.className = 'custom-input ui-trans-ph'; passErrLabel.style.display = 'none';
        } else if(val.length >= 6) {
            passInput.className = 'custom-input ui-trans-ph input-success'; passErrLabel.style.display = 'none';
        } else {
            passInput.className = 'custom-input ui-trans-ph input-error'; passErrLabel.innerText = trans.err_pass_len; passErrLabel.style.display = 'block';
        }
    });

    let nickTimeout;
    const nickInput = document.getElementById('nickname');
    const nickErrLabel = document.getElementById('nickErrLabel');

    nickInput.addEventListener('input', () => {
        clearTimeout(nickTimeout);
        isNickValid = false;
        const val = nickInput.value.trim().toLowerCase(); 
        
        if(val.length === 0) { nickInput.className = 'custom-input ui-trans-ph'; nickErrLabel.style.display = 'none'; return; }
        if(val.length < 3) { nickInput.className = 'custom-input ui-trans-ph input-error'; nickErrLabel.innerText = trans.err_nick_len; nickErrLabel.style.display = 'block'; return; }

        nickInput.className = 'custom-input ui-trans-ph'; 
        nickErrLabel.style.display = 'none';

        nickTimeout = setTimeout(async () => {
            try {
                // DÜZELTME: Varsa token'i headers'a ekle
                const token = localStorage.getItem('loveme_token');
                const headers = { 'Content-Type': 'application/json' };
                if (token) headers['Authorization'] = `Bearer ${token}`;

                const res = await fetch(`${BACKEND_URL}/api/check-nick`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ nickname: val })
                });
                const data = await res.json();
                
                // DÜZELTME: Hata fırladığında veya false döndüğünde ayrım yap. Yalnızca true ise geçerli say.
                if(data.available === true) {
                    nickInput.className = 'custom-input ui-trans-ph input-success';
                    nickErrLabel.style.display = 'none';
                    isNickValid = true;
                } else {
                    nickInput.className = 'custom-input ui-trans-ph input-error';
                    nickErrLabel.innerText = trans.err_nick_taken;
                    nickErrLabel.style.display = 'block';
                    isNickValid = false;
                }
            } catch (err) { console.error("Nick kontrol hatası", err); }
        }, 600);
    });

    // GOOGLE İLE GİRİŞİ YENİDEN AKTİFLEŞTİRİLDİ (YÜKLEME ANİMASYONLU)
    document.getElementById('googleLoginBtn').addEventListener('click', async () => {
        try {
            window.showLoading(); // Animasyonu başlat
            const result = await signInWithPopup(auth, provider);
            const token = await result.user.getIdToken();
            currentUser = { id: result.user.uid, email: result.user.email };
            localStorage.setItem('loveme_user', JSON.stringify(currentUser));
            localStorage.setItem('loveme_token', token);
            await checkUserAndRoute(currentUser);
        } catch (error) {
            console.error("Giriş Hatası:", error);
            window.hideLoading(); // Hata varsa animasyonu kapat
            // Kullanıcı popup'ı kendisi kapatırsa hata verme
            if (error.code !== 'auth/popup-closed-by-user') {
                alert(trans.err_login);
            }
        }
    });

    // E-MAIL İLE GİRİŞ/KAYIT (YÜKLEME ANİMASYONLU)
    document.getElementById('emailActionBtn').addEventListener('click', async () => {
        const email = emailInput.value.trim();
        const pass = passInput.value;
        const feedback = document.getElementById('authFeedback');

        if(!emailRegex.test(email) || pass.length < 6) {
            feedback.innerText = trans.err_empty_fields; feedback.style.display = "block";
            if(!emailRegex.test(email)) emailInput.classList.add('input-error');
            if(pass.length < 6) passInput.classList.add('input-error');
            return;
        }

        feedback.style.display = "none";
        window.showLoading(); // Animasyonu başlat

        try {
            const response = await fetch(`${BACKEND_URL}/api/auth/email`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: pass })
            });
            const data = await response.json();

            if (data.error) throw new Error(data.error);
            
            currentUser = data.user;
            localStorage.setItem('loveme_user', JSON.stringify(currentUser));
            if (data.access_token) localStorage.setItem('loveme_token', data.access_token);
            await checkUserAndRoute(currentUser);
        } catch (error) {
            console.error("Giriş Hatası:", error);
            window.hideLoading(); // Hata varsa animasyonu kapat
            feedback.innerText = error.message; 
            feedback.style.display = "block";
        }
    });

    // PROFİL KAYDETME (YÜKLEME ANİMASYONLU)
    document.getElementById('save-btn').addEventListener('click', async () => {
        const nick = nickInput.value.trim().toLowerCase();
        
        if (!selectedGender) {
            const toast = document.getElementById('genderToast');
            toast.classList.remove('fade-up'); toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); toast.classList.add('fade-up'); }, 2000);
            return;
        }
        if (!isNickValid || nick.length < 3) return alert(trans.err_nick_len + " veya " + trans.err_nick_taken);

        window.showLoading(); // Animasyonu başlat

        try {
            const token = localStorage.getItem('loveme_token');
            // DÜZELTME: id veya uid'yi güvenli al
            const userId = currentUser.id || currentUser.uid;

            const response = await fetch(`${BACKEND_URL}/api/save-profile`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    uid: userId, email: currentUser.email,
                    nickname: nick, gender: selectedGender, age: currentAgeValue
                })
            });
            const data = await response.json();

            if (data.error) throw new Error(data.error);
            
            window.location.replace("oyun.html");
        } catch (error) {
            console.error("Kaydetme Hatası:", error);
            window.hideLoading(); // Hata varsa animasyonu kapat
            alert(trans.err_save + error.message);
        }
    });
    </script>
