<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVEME - Neumorphic UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* =========================================
           1. TEMEL AYARLAR VE RENK DEĞİŞKENLERİ
           ========================================= */
        :root {
            /* Tasarımdaki (Görsel 1) birebir arka plan rengi */
            --bg-color: #e0e5ec;
            
            /* Hadi Başla (Görsel 2) buton rengi */
            --brand-color: #de4e5f; 
            
            /* Gölgeler (Neumorphism) */
            --shadow-light: rgba(255, 255, 255, 0.9);
            --shadow-dark: rgba(163, 177, 198, 0.6);
            
            /* iOS tarzı Elastik (Spring) Animasyon Eğrileri */
            --elastic: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth: cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* KATİ SURETLE SCROLL YOK */
        }

        /* =========================================
           2. ANA KONTEYNER (GÖLGELİ MODERN BOX)
           ========================================= */
        #app-container {
            /* Ekran boyutuna göre kendini sınırlar, scroll olmaz, küçülür */
            max-width: 90vw;
            max-height: 90vh;
            width: 350px;
            
            background: var(--bg-color);
            border-radius: 40px; /* Görseldeki oval köşeler */
            
            /* Dışa doğru Neumorphic Gölge */
            box-shadow: 12px 12px 24px var(--shadow-dark), 
                       -12px -12px 24px var(--shadow-light);
            
            padding: 50px 30px; /* Logo etrafındaki 50px boşluk kuralı */
            
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            
            /* Açılış animasyonu için başlangıç durumu */
            transform: scale(0.5);
            opacity: 0;
            transition: transform 1.2s var(--elastic), 
                        height 0.8s var(--elastic), 
                        width 0.8s var(--elastic),
                        opacity 0.8s ease;
        }

        /* Sayfa yüklendiğinde kutunun belirmesi */
        #app-container.init {
            transform: scale(1);
            opacity: 1;
        }

        /* =========================================
           3. GÖRÜNÜM (VİEW) YÖNETİMİ
           ========================================= */
        .view-layer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            top: 50px; /* Logoyu yukarıdan sabitler */
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s var(--smooth), transform 0.8s var(--elastic);
        }

        /* Aktif görünüm */
        .view-layer.active {
            position: relative;
            top: auto;
            left: auto;
            transform: translateX(0) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        /* =========================================
           4. ORTAK UI ELEMANLARI (LOGO, BUTONLAR, INPUTLAR)
           ========================================= */
        
        /* Logo Alanı */
        .logo-box {
            width: 80px;
            height: 80px;
            background-color: #888;
            -webkit-mask: url('logo/loveme.svg') no-repeat center;
            mask: url('logo/loveme.svg') no-repeat center;
            -webkit-mask-size: contain;
            mask-size: contain;
            margin-bottom: 30px;
            transition: all 0.8s var(--elastic);
        }

        .logo-box.animating {
            transform: translateY(-20px);
        }

        /* Yazı Başlıkları */
        h2 {
            font-size: 24px;
            font-weight: 700;
            color: #666;
            margin-bottom: 30px;
        }

        /* Dışa Gölgeli Neumorphic Buton (Dünyaya Giriş Yap, Oyuna Başla) */
        .neu-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            background: var(--bg-color);
            color: #666;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 1px;
            box-shadow: 8px 8px 16px var(--shadow-dark), 
                       -8px -8px 16px var(--shadow-light);
            cursor: pointer;
            transition: all 0.4s var(--smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        /* Görsel 2 (Hadi Başla) Rengine Dönüşüm Hover/Active */
        .neu-btn:hover, .neu-btn.primary {
            color: var(--brand-color);
        }

        .neu-btn:active, .neu-btn.clicked {
            /* Tıklanınca içe göçme efekti */
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            color: var(--brand-color);
            transform: scale(0.97);
        }

        /* İkonlu Yan Yana Butonlar (Google, Mail, Erkek, Kadın) */
        .btn-row {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
            margin-bottom: 20px;
        }

        .neu-icon-btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 20px; /* Görseldeki hafif oval */
            background: var(--bg-color);
            color: #666;
            font-size: 24px;
            box-shadow: 8px 8px 16px var(--shadow-dark), 
                       -8px -8px 16px var(--shadow-light);
            cursor: pointer;
            transition: all 0.4s var(--smooth);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .neu-icon-btn:active, .neu-icon-btn.selected {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
            background: var(--brand-color);
            color: var(--bg-color); /* İkon zemin rengi olur */
            transform: scale(0.95);
        }

        /* İçe Gölgeli Neumorphic Inputlar (Kullanıcı Adı, Şifre) */
        .input-group {
            width: 100%;
            margin-bottom: 20px;
            position: relative;
        }

        .input-label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #666;
            margin-bottom: 10px;
            text-align: left;
            padding-left: 10px;
        }

        .neu-input {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 20px;
            background: var(--bg-color);
            color: #555;
            font-size: 16px;
            font-weight: 600;
            /* Görseldeki mükemmel iç gölge (Inner Shadow) */
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            transition: all 0.3s ease;
        }

        .neu-input::placeholder {
            color: #999;
            font-weight: 500;
        }

        .neu-input:focus {
            box-shadow: inset 8px 8px 16px var(--shadow-dark), 
                        inset -8px -8px 16px var(--shadow-light);
        }

        /* Profil Hazırlanıyor Efekti */
        .loading-text {
            font-size: 16px;
            font-weight: 800;
            color: var(--brand-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse-blur 2s infinite ease-in-out;
            margin: 20px 0;
            display: none;
        }

        @keyframes pulse-blur {
            0% { transform: scale(0.95); opacity: 0.5; filter: blur(2px); }
            50% { transform: scale(1.05); opacity: 1; filter: blur(0px); }
            100% { transform: scale(0.95); opacity: 0.5; filter: blur(2px); }
        }

        /* Yaş Barı (Slider) Neumorphic */
        .age-slider-container {
            width: 100%;
            margin-bottom: 30px;
        }
        
        .neu-slider-track {
            width: 100%;
            height: 12px;
            border-radius: 10px;
            background: var(--bg-color);
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
            position: relative;
        }

        .neu-slider-thumb {
            width: 30px;
            height: 30px;
            background: var(--bg-color);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 4px 4px 8px var(--shadow-dark), 
                       -4px -4px 8px var(--shadow-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            color: var(--brand-color);
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="logo-box" id="main-logo"></div>
        <div class="loading-text" id="loading-txt">PROFİLİNİZ HAZIRLANIYOR...</div>

        <div class="view-layer" id="view-welcome">
            <button class="neu-btn" onclick="goToLoginOptions()">DÜNYAYA GİRİŞ YAP</button>
        </div>

        <div class="view-layer" id="view-options">
            <h2>Login</h2>
            <div class="btn-row">
                <button class="neu-icon-btn" onclick="selectLoginOption(this, 'google')">
                    <i class="fa-brands fa-google"></i>
                </button>
                <button class="neu-icon-btn" onclick="selectLoginOption(this, 'mail')">
                    <i class="fa-solid fa-envelope"></i>
                </button>
            </div>
        </div>

        <div class="view-layer" id="view-login-form">
            <h2>Login</h2>
            <div class="input-group">
                <span class="input-label">Username</span>
                <input type="text" class="neu-input" placeholder="Username" id="loginUser">
            </div>
            <div class="input-group">
                <span class="input-label">Password</span>
                <input type="password" class="neu-input" placeholder="**********" id="loginPass">
            </div>
            <button class="neu-btn" onclick="submitLogin(this)" style="margin-top: 10px;">Login</button>
        </div>

        <div class="view-layer" id="view-profile">
            <h2>PROFİLİNİ OLUŞTUR</h2>
            <div class="input-group">
                <input type="text" class="neu-input" placeholder="KULLANICI ADI">
            </div>
            
            <div class="btn-row">
                <button class="neu-icon-btn" onclick="selectGender(this, 'male')">
                    <i class="fa-solid fa-mars"></i>
                </button>
                <button class="neu-icon-btn" onclick="selectGender(this, 'female')">
                    <i class="fa-solid fa-venus"></i>
                </button>
            </div>

            <div class="age-slider-container">
                <div class="neu-slider-track">
                    <div class="neu-slider-thumb">18</div>
                </div>
            </div>

            <button class="neu-btn primary" onclick="startGame(this)">OYUNA BAŞLA</button>
        </div>

    </div>

    <script>
        // =========================================
        // KONTROL VE ANİMASYON MOTORU
        // =========================================
        
        const container = document.getElementById('app-container');
        const logo = document.getElementById('main-logo');
        const loadingTxt = document.getElementById('loading-txt');

        // Sayfa Yüklenme Animasyonu
        window.addEventListener('load', () => {
            setTimeout(() => {
                container.classList.add('init'); // Kutu elastik şekilde büyür
                switchView('view-welcome', 400); // 400ms gecikmeyle ilk buton belirir
            }, 100);
        });

        // Görünüm (State) Değiştirici Fonksiyon
        function switchView(targetViewId, delay = 0) {
            // Aktif olan tüm görünümleri gizle
            document.querySelectorAll('.view-layer').forEach(layer => {
                layer.classList.remove('active');
            });
            
            // Gecikmeli olarak yeni görünümü aktif et
            setTimeout(() => {
                document.getElementById(targetViewId).classList.add('active');
            }, delay);
        }

        // ADIM 2: Dünyaya Giriş Yap -> İkonlu Seçenekler
        function goToLoginOptions() {
            // Kutu hafifçe boyut değiştirirken logo yukarı kayar
            logo.classList.add('animating');
            switchView('view-options', 300);
        }

        // ADIM 3: Mail/Google Seçimi -> İlgili formun açılması
        function selectLoginOption(btnElement, type) {
            // Tıklanan butonu içe göçük ve renkli yap
            btnElement.classList.add('selected');
            
            setTimeout(() => {
                if(type === 'mail') {
                    // Butonlar silinir, form elemanları gelir
                    switchView('view-login-form', 400);
                }
                // Tıklama efekti temizliği
                setTimeout(() => btnElement.classList.remove('selected'), 500);
            }, 600); // Smooth geçişi beklemek için süre
        }

        // ADIM 4: Giriş Yap -> Profil Hazırlanıyor -> Profil Oluştur
        function submitLogin(btnElement) {
            btnElement.classList.add('clicked');
            
            setTimeout(() => {
                // Mevcut formu sil
                document.querySelectorAll('.view-layer').forEach(l => l.classList.remove('active'));
                
                // Animasyonlu Yazıyı Göster
                loadingTxt.style.display = 'block';
                
                // 2.5 Saniye bekle (Simülasyon), sonra Profil formunu getir
                setTimeout(() => {
                    loadingTxt.style.display = 'none';
                    switchView('view-profile', 100);
                }, 2500);

            }, 400);
        }

        // Profil Cinsiyet Seçimi
        function selectGender(btnElement, gender) {
            document.querySelectorAll('#view-profile .neu-icon-btn').forEach(btn => btn.classList.remove('selected'));
            btnElement.classList.add('selected');
        }

        // ADIM 5: Oyuna Başla -> Kapanış Animasyonu ve Yönlendirme
        function startGame(btnElement) {
            btnElement.classList.add('clicked');
            
            setTimeout(() => {
                // Her şeyi gizle ve kutuyu sıfıra küçült
                document.querySelectorAll('.view-layer').forEach(l => l.classList.remove('active'));
                logo.style.opacity = '0';
                
                container.style.transform = 'scale(0)';
                container.style.opacity = '0';

                // Animasyon bittikten sonra yönlendir
                setTimeout(() => {
                    window.location.href = "oyun.html";
                }, 1000); // Kutu kapanma süresi
            }, 300);
        }
    </script>
</body>
</html>
