<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoveMe - Neumorphic Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            /* Neumorphic Renk Paleti */
            --bg-color: #e0e5ec;
            --text-color: #55595c;
            --pink-color: #e64a61;
            /* Hadi Başla Görselinden Alınan Hata Mesajı Zemin Rengi */
            --error-bg: #d34863; 
            --soft-blue: #74b9ff;
            --soft-pink: #ff7675;
            
            /* Gölgeler */
            --shadow-out: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5);
            --shadow-in: inset 6px 6px 10px rgba(163, 177, 198, 0.6), inset -6px -6px 10px rgba(255, 255, 255, 0.8);
            
            /* Elastik Animasyon Eğrisi (iOS Hissiyatı) */
            --elastic-curve: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth-curve: ease-in-out;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
        }

        .modern-box {
            position: relative;
            background: var(--bg-color);
            border-radius: 40px;
            box-shadow: var(--shadow-out);
            width: 320px;
            height: 200px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.8s var(--elastic-curve), height 0.6s var(--elastic-curve);
            z-index: 2;
        }

        .modern-box.show {
            transform: scale(1);
            opacity: 1;
        }

        .modern-box.hide {
            transform: scale(0);
            opacity: 0;
            transition: all 0.6s var(--smooth-curve);
        }

        .logo-container {
            position: absolute;
            top: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
            transition: all 0.6s var(--elastic-curve);
            z-index: 10;
        }

        /* SVG Logo İçin */
        .logo-img {
            width: 140px; /* Biraz büyük */
            height: auto;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s var(--elastic-curve);
            /* Siyah/gri text rengine yakın filtre */
            filter: invert(34%) sepia(8%) saturate(541%) hue-rotate(167deg) brightness(93%) contrast(89%);
        }

        .modern-box.show .logo-img {
            opacity: 1;
            transform: translateY(0);
        }

        .modern-box.slide-up-logo .logo-container {
            top: 30px;
        }

        .step-container {
            position: absolute;
            top: 100px;
            width: 100%;
            padding: 0 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
            transition: all 0.5s var(--elastic-curve);
        }

        .step-container.active {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
            transition-delay: 0.2s;
        }

        #step1 {
            top: 130px; /* Dünyaya giriş yap yazısı alt uca yaklaştı */
        }

        .neu-btn {
            background: var(--bg-color);
            border: none;
            border-radius: 20px;
            box-shadow: var(--shadow-out);
            color: var(--text-color);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
        }

        .neu-btn:active {
            box-shadow: var(--shadow-in);
            transform: scale(0.95);
        }

        .text-btn {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.3s ease;
            margin-top: 20px;
        }

        .text-btn:hover {
            color: var(--pink-color);
        }

        .icon-btn-row {
            display: flex;
            justify-content: center;
            gap: 30px; /* Aralarını açtık */
            width: 100%;
            margin-top: 10px;
        }

        /* İkonlu Butonlar Büyütüldü ve Kare Yapıldı */
        .icon-btn {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            font-size: 34px;
        }

        .icon-btn.clicked {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: var(--shadow-in);
        }

        .input-group {
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
            margin-left: 5px;
        }

        .neu-input {
            width: 100%;
            height: 50px;
            border: none;
            background: var(--bg-color);
            border-radius: 25px;
            box-shadow: var(--shadow-in);
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .neu-input::placeholder {
            color: #a0a5ab;
        }
        
        .neu-input:focus::placeholder {
            color: transparent;
        }

        .gender-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 0px;
            margin-bottom: 25px;
        }

        /* Cinsiyet İkonları Büyütüldü */
        .gender-btn {
            width: 80px;
            height: 80px;
            border-radius: 25px;
            font-size: 34px;
        }

        .gender-btn.active.male {
            color: var(--soft-blue);
            box-shadow: var(--shadow-in);
        }

        .gender-btn.active.female {
            color: var(--soft-pink);
            box-shadow: var(--shadow-in);
        }

        /* Çalışan Yaş Slider */
        .slider-container {
            width: 100%;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .age-display {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 12px;
            cursor: pointer;
            box-shadow: var(--shadow-in);
            background: var(--bg-color);
            border-radius: 10px;
        }

        input[type=range]::-webkit-slider-thumb {
            box-shadow: var(--shadow-out);
            height: 30px;
            width: 30px;
            border-radius: 50%;
            background: var(--bg-color);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -9px;
            border: 3px solid #e0e5ec;
        }

        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 800;
            font-size: 14px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
            width: 100%;
        }

        .loading-text.active {
            opacity: 1;
        }

        /* Hata Mesajı Kutusu */
        .error-box {
            background-color: var(--error-bg);
            color: #ffffff;
            font-weight: 600;
            font-size: 13px;
            padding: 12px 20px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(211, 72, 99, 0.4);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            max-width: 320px;
            text-align: center;
            pointer-events: none;
        }

        .error-box.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="modern-box" id="mainBox">
        
        <div class="logo-container">
            <img class="logo-img" src="logo/loveme.svg" alt="LoveMe Logo">
        </div>

        <div class="step-container active" id="step1">
            <button class="text-btn" onclick="goToStep2()">DÜNYAYA GİRİŞ YAP</button>
        </div>

        <div class="step-container" id="step2">
            <div class="icon-btn-row">
                <button class="neu-btn icon-btn" onclick="handleIconClick(this, 'google')">
                    <i class="fa-brands fa-google"></i>
                </button>
                <button class="neu-btn icon-btn" onclick="handleIconClick(this, 'mail')">
                    <i class="fa-solid fa-envelope"></i>
                </button>
            </div>
        </div>

        <div class="step-container" id="step3" style="top: 80px;">
            <div class="input-group">
                <label class="input-label">Kullanıcı Adı (E-posta)</label>
                <input type="text" id="emailInput" class="neu-input" placeholder="Kullanıcı adınızı giriniz" 
                       onfocus="this.placeholder=''" onblur="this.placeholder='Kullanıcı adınızı giriniz'">
            </div>
            <div class="input-group">
                <label class="input-label">Şifre</label>
                <input type="password" id="passwordInput" class="neu-input" placeholder="Şifrenizi giriniz"
                       onfocus="this.placeholder=''" onblur="this.placeholder='Şifrenizi giriniz'">
            </div>
            <button class="neu-btn" onclick="doLogin(this)">GİRİŞ YAP</button>
        </div>

        <div class="step-container" id="step4" style="top: 80px;">
            <div class="input-group" style="margin-bottom: 10px;">
                <input type="text" id="gameUsername" class="neu-input" placeholder="KULLANICI ADI" style="text-align:center;"
                       oninput="this.value = this.value.toUpperCase();"
                       onfocus="this.placeholder=''" onblur="this.placeholder='KULLANICI ADI'">
            </div>

            <div class="gender-row">
                <button class="neu-btn gender-btn" id="btnMale" onclick="selectGender('male')"><i class="fa-solid fa-mars"></i></button>
                <button class="neu-btn gender-btn" id="btnFemale" onclick="selectGender('female')"><i class="fa-solid fa-venus"></i></button>
            </div>

            <div class="slider-container">
                <div class="age-display" id="ageDisplay">18</div>
                <input type="range" id="ageSlider" min="18" max="99" value="18" oninput="updateAge(this.value)">
            </div>

            <button class="neu-btn" onclick="startGame()">Oyuna Başla</button>
        </div>

        <div class="loading-text" id="loadingText">PROFİLİNİZ HAZIRLANIYOR...</div>

    </div>

    <div id="errorBox" class="error-box">Hata Mesajı</div>

    <script>
        // --- SUPABASE AYARLARI ---
        // Lütfen buraya kendi Supabase URL ve ANON KEY bilgilerinizi giriniz.
        const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const box = document.getElementById('mainBox');
        let selectedGender = null;

        // Sayfa Yüklendiğinde Session Kontrolü (Token varsa direkt oyuna atar)
        window.onload = async () => {
            setTimeout(() => {
                box.classList.add('show');
            }, 100);

            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                // Zaten giriş yapılmışsa beklemeden oyuna gönder.
                window.location.replace("oyun.html");
            }
        };

        function showError(message) {
            const errBox = document.getElementById('errorBox');
            errBox.innerText = message;
            errBox.classList.add('show');
            setTimeout(() => {
                errBox.classList.remove('show');
            }, 3000);
        }

        function setBoxHeight(height) {
            box.style.height = height + 'px';
        }

        function switchStep(hideId, showId, newHeight) {
            if(hideId) {
                document.getElementById(hideId).classList.remove('active');
            }
            if(newHeight) {
                setBoxHeight(newHeight);
            }
            setTimeout(() => {
                if(showId) {
                    document.getElementById(showId).classList.add('active');
                }
            }, 300); 
        }

        function goToStep2() {
            box.classList.add('slide-up-logo'); 
            switchStep('step1', 'step2', 200); 
        }

        function handleIconClick(btn, type) {
            btn.classList.add('clicked');
            setTimeout(() => {
                btn.classList.remove('clicked'); // Tıklama efekti bitince toparla
                if(type === 'mail') {
                    switchStep('step2', 'step3', 380); 
                } else {
                    // Google Auth ileride buraya eklenebilir
                    showError("Google girişi yakında eklenecek.");
                }
            }, 400); 
        }

        // MAİL VE ŞİFRE KONTROLÜ
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(String(email).toLowerCase());
        }

        function validatePassword(password) {
            // En az 6 karakter, 1 Büyük harf, 1 Sayı
            const re = /^(?=.*[A-Z])(?=.*\d).{6,}$/;
            return re.test(password);
        }

        async function doLogin(btn) {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;

            if (!validateEmail(email)) {
                showError("Lütfen geçerli bir e-posta adresi giriniz.");
                return;
            }

            if (!validatePassword(password)) {
                showError("Şifre en az 6 karakter, 1 büyük harf ve 1 sayı içermelidir.");
                return;
            }

            btn.classList.add('clicked');

            // SUPABASE GİRİŞ/KAYIT İŞLEMİ
            let { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            // Eğer kullanıcı bulunamazsa (veya şifre yanlışsa) ve yeni kayıt açmak isterseniz:
            if (error && error.message.includes("Invalid login credentials")) {
                // Kayıt olmayı dener
                const { data: signUpData, error: signUpError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                });
                
                if (signUpError) {
                    showError("Giriş başarısız: " + signUpError.message);
                    btn.classList.remove('clicked');
                    return;
                }
                data = signUpData;
            } else if (error) {
                showError("Bir hata oluştu: " + error.message);
                btn.classList.remove('clicked');
                return;
            }

            // Başarılı Giriş/Kayıt
            setTimeout(() => {
                document.getElementById('step3').classList.remove('active');
                
                setTimeout(() => {
                    const loader = document.getElementById('loadingText');
                    loader.classList.add('active');
                    
                    setTimeout(() => {
                        loader.classList.remove('active');
                        setTimeout(() => {
                            // Profil oluşturma formunu getir
                            // Logoyu gizleyelim alanı genişletmek için
                            document.querySelector('.logo-img').style.opacity = '0';
                            switchStep(null, 'step4', 450);
                        }, 500);
                    }, 1500);
                }, 400);
            }, 300);
        }

        // Cinsiyet Seçimi
        function selectGender(gender) {
            selectedGender = gender;
            const btnMale = document.getElementById('btnMale');
            const btnFemale = document.getElementById('btnFemale');
            
            btnMale.classList.remove('active', 'male');
            btnFemale.classList.remove('active', 'female');

            if(gender === 'male') {
                btnMale.classList.add('active', 'male');
            } else if (gender === 'female') {
                btnFemale.classList.add('active', 'female');
            }
        }

        // Yaş Slider Güncelleme
        function updateAge(val) {
            document.getElementById('ageDisplay').innerText = val;
        }

        // PROFİL OLUŞTURMA VE OYUNA GEÇİŞ
        async function startGame() {
            const username = document.getElementById('gameUsername').value;
            const age = document.getElementById('ageSlider').value;

            if (username.length < 4) {
                showError("Kullanıcı adı en az 4 karakter olmalıdır.");
                return;
            }

            if (!selectedGender) {
                showError("Lütfen cinsiyetinizi seçiniz.");
                return;
            }

            // Supabase'e profili kaydet
            const { data: { user } } = await supabase.auth.getUser();
            
            if (user) {
                const { error } = await supabase
                  .from('profiles') // Supabase'de 'profiles' adında tablonuz olmalı
                  .upsert({ 
                      id: user.id, 
                      username: username, 
                      gender: selectedGender, 
                      age: age,
                      updated_at: new Date()
                  });

                if (error) {
                    showError("Profil kaydedilemedi: " + error.message);
                    return;
                }
            }

            // Animasyonla çıkış ve yönlendirme
            document.getElementById('step4').classList.remove('active');
            box.classList.remove('slide-up-logo');
            
            setTimeout(() => {
                box.classList.add('hide'); 
                
                setTimeout(() => {
                    // Yönlendirme (Token alındığı için oyun.html'de de supabase kontrolü yapılırsa atmaz)
                    window.location.replace("oyun.html");
                }, 600); 
            }, 300);
        }
    </script>
</body>
</html>
