<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoveMe - Neumorphic Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            /* Neumorphic Renk Paleti */
            --bg-color: #e0e5ec;
            --text-color: #55595c;
            --pink-color: #e64a61; /* Hadi Başla Buton Pembe Rengi */
            
            /* Gölgeler */
            --shadow-out: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5);
            --shadow-in: inset 6px 6px 10px rgba(163, 177, 198, 0.6), inset -6px -6px 10px rgba(255, 255, 255, 0.8);
            
            /* Elastik Animasyon Eğrisi (iOS Hissiyatı) */
            --elastic-curve: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth-curve: ease-in-out;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* 1. Kural: Kati Suretle Scroll Yok, Tam Ekran */
        body {
            background-color: var(--bg-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
        }

        /* 2. Gölge Efektli Modern Box */
        .modern-box {
            position: relative;
            background: var(--bg-color);
            border-radius: 40px;
            box-shadow: var(--shadow-out);
            width: 320px;
            /* Yükseklik JS ile dinamik yönetilecek ki elastik uzama olsun */
            height: 200px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* Başlangıçta görünmez ve küçük */
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.8s var(--elastic-curve), height 0.6s var(--elastic-curve);
        }

        /* Animasyon: Site açıldığında tetiklenir */
        .modern-box.show {
            transform: scale(1);
            opacity: 1;
        }

        /* Kapanış Animasyonu (Oyuna başla) */
        .modern-box.hide {
            transform: scale(0);
            opacity: 0;
            transition: all 0.6s var(--smooth-curve);
        }

        /* Logo Alanı */
        .logo-container {
            position: absolute;
            top: 50px;
            width: 100%;
            display: flex;
            justify-content: center;
            transition: all 0.6s var(--elastic-curve);
            z-index: 10;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--text-color);
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s var(--elastic-curve);
        }

        .modern-box.show .logo-text {
            opacity: 1;
            transform: translateY(0);
        }

        /* Logo Yukarı Kayma Animasyonu */
        .modern-box.slide-up-logo .logo-container {
            top: 30px;
        }

        /* İçerik Sahneleri (Stepler) */
        .step-container {
            position: absolute;
            top: 100px;
            width: 100%;
            padding: 0 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
            transition: all 0.5s var(--elastic-curve);
        }

        .step-container.active {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
            transition-delay: 0.2s; /* Hafif gecikme ile gelir */
        }

        /* Butonlar (Neumorphic) */
        .neu-btn {
            background: var(--bg-color);
            border: none;
            border-radius: 20px;
            box-shadow: var(--shadow-out);
            color: var(--text-color);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
        }

        .neu-btn:active {
            box-shadow: var(--shadow-in);
            transform: scale(0.95);
        }

        /* İlk Ekran: Dünyaya Giriş Yap Text Butonu */
        .text-btn {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.3s ease;
            margin-top: 20px;
        }

        .text-btn:hover {
            color: var(--pink-color);
        }

        /* İkonlu Butonlar (Google / Mail) */
        .icon-btn-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 10px;
        }

        .icon-btn {
            width: 45%;
            height: 60px;
            border-radius: 15px;
            font-size: 24px;
        }

        /* Tıklanınca zemin rengi değişimi (Kati kural) */
        .icon-btn.clicked {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: var(--shadow-in);
        }

        /* Input Alanları (Neumorphic Inset) */
        .input-group {
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            display: block;
            margin-left: 5px;
        }

        .neu-input {
            width: 100%;
            height: 50px;
            border: none;
            background: var(--bg-color);
            border-radius: 25px;
            box-shadow: var(--shadow-in);
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .neu-input::placeholder {
            color: #a0a5ab;
        }

        /* Gender Seçimi */
        .gender-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .gender-btn {
            width: 60px;
            height: 60px;
            border-radius: 20px;
            font-size: 24px;
        }

        /* Yaş Slider (Neumorphic) */
        .slider-container {
            width: 100%;
            margin-bottom: 25px;
        }
        
        .slider-track {
            width: 100%;
            height: 12px;
            border-radius: 10px;
            box-shadow: var(--shadow-in);
            position: relative;
            display: flex;
            align-items: center;
        }

        .slider-thumb {
            width: 30px;
            height: 30px;
            background: var(--bg-color);
            border-radius: 50%;
            box-shadow: var(--shadow-out);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Ortadaki Hazırlanıyor Texti */
        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 800;
            font-size: 14px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
            width: 100%;
        }
        
        .loading-text.active {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="modern-box" id="mainBox">
        
        <div class="logo-container">
            <div class="logo-text">Login</div>
        </div>

        <div class="step-container active" id="step1">
            <button class="text-btn" onclick="goToStep2()">DÜNYAYA GİRİŞ YAP</button>
        </div>

        <div class="step-container" id="step2">
            <div class="icon-btn-row">
                <button class="neu-btn icon-btn" onclick="handleIconClick(this, 'google')">
                    <i class="fa-brands fa-google"></i>
                </button>
                <button class="neu-btn icon-btn" onclick="handleIconClick(this, 'mail')">
                    <i class="fa-solid fa-envelope"></i>
                </button>
            </div>
        </div>

        <div class="step-container" id="step3" style="top: 80px;">
            <div class="input-group">
                <label class="input-label">Username</label>
                <input type="text" class="neu-input" placeholder="Username">
            </div>
            <div class="input-group">
                <label class="input-label">Password</label>
                <input type="password" class="neu-input" placeholder="**********">
            </div>
            <button class="neu-btn" onclick="doLogin(this)">Login</button>
        </div>

        <div class="step-container" id="step4" style="top: 80px;">
            <div class="input-label" style="text-align:center; font-size:16px; margin-bottom:15px;">Profilini Oluştur</div>
            
            <div class="input-group" style="margin-bottom: 10px;">
                <input type="text" class="neu-input" placeholder="Kullanıcı Adı" style="text-align:center;">
            </div>

            <div class="gender-row">
                <button class="neu-btn gender-btn"><i class="fa-solid fa-mars"></i></button>
                <button class="neu-btn gender-btn"><i class="fa-solid fa-venus"></i></button>
            </div>

            <div class="slider-container">
                <div class="slider-track">
                    <div class="slider-thumb">18</div>
                </div>
            </div>

            <button class="neu-btn" onclick="startGame()">Oyuna Başla</button>
        </div>

        <div class="loading-text" id="loadingText">PROFİLİNİZ HAZIRLANIYOR...</div>

    </div>

    <script>
        const box = document.getElementById('mainBox');
        
        // Yardımcı Fonksiyon: Kutu yüksekliğini elastik değiştirir
        function setBoxHeight(height) {
            box.style.height = height + 'px';
        }

        // Yardımcı Fonksiyon: Stepler arası geçiş
        function switchStep(hideId, showId, newHeight) {
            if(hideId) {
                document.getElementById(hideId).classList.remove('active');
            }
            if(newHeight) {
                setBoxHeight(newHeight);
            }
            setTimeout(() => {
                if(showId) {
                    document.getElementById(showId).classList.add('active');
                }
            }, 300); // Kutu boyutu değişirken içeriğin yavaşça belirmesi için delay
        }

        // --- BAŞLANGIÇ ---
        window.onload = () => {
            // Elastik olarak siteye giriş
            setTimeout(() => {
                box.classList.add('show');
            }, 100);
        };

        // --- ADIM 1 -> ADIM 2 ---
        function goToStep2() {
            box.classList.add('slide-up-logo'); // Logoyu yukarı kaydır
            switchStep('step1', 'step2', 200); // Yükseklik aynı kalır, butonlar gelir
        }

        // --- ADIM 2 BUTON TIKLAMALARI ---
        function handleIconClick(btn, type) {
            // İstenen kural: Tıklanınca içi tam tersi renk olur
            btn.classList.add('clicked');
            
            setTimeout(() => {
                if(type === 'mail') {
                    // Kutu aşağı uzar, form gelir
                    switchStep('step2', 'step3', 380); 
                } else {
                    // Google login işlemleri buraya eklenebilir. Şimdilik formu açalım.
                    switchStep('step2', 'step3', 380);
                }
            }, 400); // Rengin değiştiğini görmek için hafif gecikme
        }

        // --- ADIM 3 -> YÜKLENİYOR -> ADIM 4 ---
        function doLogin(btn) {
            btn.classList.add('clicked');
            
            setTimeout(() => {
                // Formu gizle
                document.getElementById('step3').classList.remove('active');
                
                setTimeout(() => {
                    // Yükleniyor yazısını göster
                    const loader = document.getElementById('loadingText');
                    loader.classList.add('active');
                    
                    // Sahte API bekleme süresi (1.5 Saniye)
                    setTimeout(() => {
                        loader.classList.remove('active');
                        
                        setTimeout(() => {
                            // Profil oluşturma formunu getir (Kutu biraz daha uzasın)
                            document.querySelector('.logo-text').innerText = "Profil"; // İsteğe bağlı logo değişimi
                            switchStep(null, 'step4', 450);
                        }, 500);

                    }, 1500);

                }, 400); // Formun silinmesini bekle
            }, 300);
        }

        // --- ADIM 5 -> ÇIKIŞ ---
        function startGame() {
            // Kutuyu ilk haline (çok küçük) getir ve içindekileri sil
            document.getElementById('step4').classList.remove('active');
            box.classList.remove('slide-up-logo');
            document.querySelector('.logo-text').style.opacity = '0';
            
            setTimeout(() => {
                box.classList.add('hide'); // Küçülerek yok olma animasyonu
                
                // Animasyon bitince yönlendir
                setTimeout(() => {
                    window.location.replace("oyun.html");
                }, 600); 
            }, 300);
        }
    </script>
</body>
</html>
