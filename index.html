<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoveMe - Neumorphic UI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --text-color: #55595c;
            --pink-color: #e64a61; /* Hadi Başla Buton Rengi (Hata mesajları için de kullanılacak) */
            --soft-blue: #82b1ff;
            --soft-pink: #ff80ab;
            
            --shadow-out: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5);
            --shadow-in: inset 6px 6px 10px rgba(163, 177, 198, 0.6), inset -6px -6px 10px rgba(255, 255, 255, 0.8);
            
            --elastic-curve: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth-curve: ease-in-out;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Asla scroll olmaz */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-color);
        }

        /* Ana Taşıyıcı (Kutu ve Hata Mesajını ortalamak için) */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Ana Kutu */
        .modern-box {
            position: relative;
            background: var(--bg-color);
            border-radius: 40px;
            box-shadow: var(--shadow-out);
            width: 320px;
            height: 200px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.8s var(--elastic-curve), height 0.6s var(--elastic-curve);
        }

        .modern-box.show {
            transform: scale(1);
            opacity: 1;
        }

        .modern-box.hide {
            transform: scale(0);
            opacity: 0;
            transition: all 0.6s var(--smooth-curve);
        }

        /* Logo Alanı (Mask yöntemi ile SVG'ye CSS renkleri uygulanır) */
        .logo-container {
            position: absolute;
            top: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            transition: all 0.6s var(--elastic-curve);
            z-index: 10;
        }

        .logo-svg {
            width: 140px; /* Logo biraz büyük */
            height: 50px;
            background-color: var(--text-color); /* Site yazılar renginde */
            -webkit-mask: url('logo/loveme.svg') no-repeat center;
            mask: url('logo/loveme.svg') no-repeat center;
            -webkit-mask-size: contain;
            mask-size: contain;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s var(--elastic-curve);
        }

        .modern-box.show .logo-svg {
            opacity: 1;
            transform: translateY(0);
        }

        .modern-box.slide-up-logo .logo-container {
            top: 25px; /* Üste kayma animasyonu */
        }

        /* Sahneler */
        .step-container {
            position: absolute;
            top: 100px;
            width: 100%;
            padding: 0 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
            transition: all 0.5s var(--elastic-curve);
        }

        .step-container.active {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
            transition-delay: 0.2s;
        }

        /* 1. Adım Özel (Butonu alt uca yaklaştırma) */
        #step1 {
            top: auto;
            bottom: 20px; /* Kutu alt ucuna yaklaştı */
        }

        .text-btn {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .text-btn:hover {
            color: var(--pink-color);
        }

        /* Butonlar Genel */
        .neu-btn {
            background: var(--bg-color);
            border: none;
            border-radius: 20px;
            box-shadow: var(--shadow-out);
            color: var(--text-color);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 15px;
        }

        .neu-btn:active {
            box-shadow: var(--shadow-in);
            transform: scale(0.95);
        }

        /* Büyük Kare İkon Butonları (Google / Mail) */
        .icon-btn-row {
            display: flex;
            justify-content: space-evenly;
            width: 100%;
            margin-top: 20px;
        }

        .icon-btn {
            width: 80px;  /* Kare */
            height: 80px; /* Kare */
            border-radius: 20px;
            font-size: 32px; /* Büyük İkon */
            margin-top: 0;
        }

        .icon-btn.clicked {
            background: var(--text-color);
            color: var(--bg-color);
            box-shadow: var(--shadow-in);
        }

        /* Input Alanları */
        .input-group {
            width: 100%;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
            margin-left: 5px;
        }

        .neu-input {
            width: 100%;
            height: 50px;
            border: none;
            background: var(--bg-color);
            border-radius: 25px;
            box-shadow: var(--shadow-in);
            padding: 0 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .neu-input::placeholder {
            color: #a0a5ab;
        }

        /* Username Zorunlu Büyük Harf CSS */
        #usernameInput {
            text-transform: uppercase;
        }

        /* Cinsiyet İkonları */
        .gender-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
        }

        .gender-btn {
            width: 80px;
            height: 80px;
            border-radius: 25px;
            font-size: 36px; /* Büyük İkonlar */
            margin-top: 0;
        }

        /* Basılı Kalma Durumları ve Renkler */
        .gender-btn.active.male {
            color: var(--soft-blue);
            box-shadow: var(--shadow-in);
        }

        .gender-btn.active.female {
            color: var(--soft-pink);
            box-shadow: var(--shadow-in);
        }

        /* Yaş Slider (Çalışan Neumorphic Range) */
        .slider-wrapper {
            width: 100%;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .neu-range {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            background: var(--bg-color);
            border-radius: 10px;
            box-shadow: var(--shadow-in);
            outline: none;
            margin-top: 10px;
        }

        .neu-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--bg-color);
            box-shadow: var(--shadow-out);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .neu-range::-webkit-slider-thumb:active {
            transform: scale(1.1);
        }

        /* Ortadaki Hazırlanıyor Texti */
        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 800;
            font-size: 14px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s ease;
            width: 100%;
        }
        
        .loading-text.active {
            opacity: 1;
        }

        /* Kutu Altındaki Hata Mesajı Alanı */
        .error-message {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: var(--pink-color); /* Görseldeki zemin rengi */
            color: white;
            font-weight: 700;
            font-size: 13px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(230, 74, 97, 0.4);
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.4s var(--elastic-curve);
            pointer-events: none;
        }

        .error-message.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="modern-box" id="mainBox">
            
            <div class="logo-container">
                <div class="logo-svg"></div>
            </div>

            <div class="step-container active" id="step1">
                <button class="text-btn" onclick="goToStep2()">DÜNYAYA GİRİŞ YAP</button>
            </div>

            <div class="step-container" id="step2">
                <div class="icon-btn-row">
                    <button class="neu-btn icon-btn" onclick="handleIconClick(this, 'google')">
                        <i class="fa-brands fa-google"></i>
                    </button>
                    <button class="neu-btn icon-btn" onclick="handleIconClick(this, 'mail')">
                        <i class="fa-solid fa-envelope"></i>
                    </button>
                </div>
            </div>

            <div class="step-container" id="step3" style="top: 80px;">
                <div class="input-group">
                    <label class="input-label">E-mail</label>
                    <input type="email" id="emailInput" class="neu-input" placeholder="E-mail adresinizi giriniz" 
                           onfocus="clearPlaceholder(this)" onblur="restorePlaceholder(this, 'E-mail adresinizi giriniz')">
                </div>
                <div class="input-group">
                    <label class="input-label">Şifre</label>
                    <input type="password" id="passInput" class="neu-input" placeholder="Şifrenizi giriniz"
                           onfocus="clearPlaceholder(this)" onblur="restorePlaceholder(this, 'Şifrenizi giriniz')">
                </div>
                <button class="neu-btn" onclick="validateAndLogin(this)">GİRİŞ YAP</button>
            </div>

            <div class="step-container" id="step4" style="top: 80px;">
                <div class="input-group" style="margin-bottom: 25px;">
                    <label class="input-label">Kullanıcı Adı</label>
                    <input type="text" id="usernameInput" class="neu-input" placeholder="Kullanıcı adınızı giriniz"
                           onfocus="clearPlaceholder(this)" onblur="restorePlaceholder(this, 'Kullanıcı adınızı giriniz')"
                           oninput="this.value = this.value.toUpperCase()"> 
                </div>

                <div class="gender-row">
                    <button class="neu-btn gender-btn male" onclick="selectGender('male')"><i class="fa-solid fa-mars"></i></button>
                    <button class="neu-btn gender-btn female" onclick="selectGender('female')"><i class="fa-solid fa-venus"></i></button>
                </div>

                <div class="slider-wrapper">
                    <label class="input-label" style="text-align: center; margin-bottom: 5px;">Yaş: <span id="ageDisplay">18</span></label>
                    <input type="range" id="ageSlider" class="neu-range" min="18" max="99" value="18" oninput="updateAge(this.value)">
                </div>

                <button class="neu-btn" onclick="validateAndSave()">OYUNA BAŞLA</button>
            </div>

            <div class="loading-text" id="loadingText">PROFİLİNİZ HAZIRLANIYOR...</div>
        </div>

        <div class="error-message" id="errorBox">Hata mesajı buraya gelecek</div>
    </div>

    <script>
        // --- SUPABASE AYARLARI (Kendi bilgilerini buraya girmelisin) ---
        const supabaseUrl = 'YOUR_SUPABASE_URL';
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);
        // -------------------------------------------------------------

        const box = document.getElementById('mainBox');
        const errorBox = document.getElementById('errorBox');
        let selectedGenderValue = null;
        
        // Geçici veri tutucu
        let userData = {
            email: '',
            password: '',
            username: '',
            gender: '',
            age: 18
        };

        // --- YARDIMCI FONKSİYONLAR ---
        function setBoxHeight(height) { box.style.height = height + 'px'; }
        
        function switchStep(hideId, showId, newHeight) {
            if(hideId) document.getElementById(hideId).classList.remove('active');
            if(newHeight) setBoxHeight(newHeight);
            setTimeout(() => {
                if(showId) document.getElementById(showId).classList.add('active');
            }, 300); 
        }

        function clearPlaceholder(el) { el.dataset.ph = el.placeholder; el.placeholder = ''; }
        function restorePlaceholder(el, text) { if(el.value === '') el.placeholder = text; }
        function updateAge(val) { document.getElementById('ageDisplay').innerText = val; userData.age = val; }

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.classList.add('show');
            // 3 saniye sonra hatayı gizle
            setTimeout(() => { errorBox.classList.remove('show'); }, 3000);
        }

        function hideError() { errorBox.classList.remove('show'); }

        // --- BAŞLANGIÇ ---
        window.onload = () => { setTimeout(() => { box.classList.add('show'); }, 100); };

        // --- ADIM 1 -> ADIM 2 ---
        function goToStep2() {
            box.classList.add('slide-up-logo'); 
            switchStep('step1', 'step2', 200); 
        }

        // --- ADIM 2 -> ADIM 3 ---
        function handleIconClick(btn, type) {
            btn.classList.add('clicked');
            setTimeout(() => {
                switchStep('step2', 'step3', 380); 
            }, 400); 
        }

        // --- ADIM 3 VALIDATION (Email / Şifre) ---
        function validateAndLogin(btn) {
            const email = document.getElementById('emailInput').value.trim();
            const pass = document.getElementById('passInput').value;

            // Email Regex
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                return showError("Geçerli bir e-mail adresi giriniz.");
            }

            // Password Regex (Min 6 char, 1 uppercase, 1 number)
            const passRegex = /^(?=.*[A-Z])(?=.*\d).{6,}$/;
            if (!passRegex.test(pass)) {
                return showError("Şifre en az 6 karakter, 1 büyük harf ve 1 sayı içermelidir.");
            }

            hideError();
            userData.email = email;
            userData.password = pass; // Gerçekte şifre düz metin kaydedilmemeli, ancak akış gereği değişkene alıyoruz
            
            btn.classList.add('clicked');
            
            setTimeout(() => {
                document.getElementById('step3').classList.remove('active');
                setTimeout(() => {
                    const loader = document.getElementById('loadingText');
                    loader.classList.add('active');
                    
                    setTimeout(() => {
                        loader.classList.remove('active');
                        setTimeout(() => { switchStep(null, 'step4', 450); }, 500);
                    }, 1500);
                }, 400); 
            }, 300);
        }

        // --- CİNSİYET SEÇİMİ ---
        function selectGender(type) {
            document.querySelectorAll('.gender-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.gender-btn.${type}`).classList.add('active');
            selectedGenderValue = type;
            userData.gender = type;
        }

        // --- ADIM 4 VALIDATION VE SUPABASE KAYIT ---
        async function validateAndSave() {
            const username = document.getElementById('usernameInput').value.trim();
            
            // Kullanıcı adı kontrol (Min 4 karakter)
            if (username.length < 4) {
                return showError("Kullanıcı adı en az 4 karakter olmalıdır.");
            }
            
            if (!selectedGenderValue) {
                return showError("Lütfen cinsiyetinizi seçiniz.");
            }

            hideError();
            userData.username = username;

            // Tüm animasyonları ve yönlendirmeyi Supabase kaydı başarılıysa yap
            try {
                // Supabase insert işlemi ('users' tablosu olduğunu varsayıyoruz)
                const { data, error } = await supabase
                    .from('users')
                    .insert([
                        { 
                            email: userData.email, 
                            username: userData.username, 
                            gender: userData.gender, 
                            age: userData.age 
                            // Şifreyi güvenlik gereği direkt DB'ye atmak yerine Auth servisi kullanılmalı 
                            // Ancak isteğine göre tüm veriyi buraya ekledim.
                        }
                    ]);

                if (error) throw error;

                // Kayıt Başarılı Animasyonu (Kutuyu küçült ve yönlendir)
                document.getElementById('step4').classList.remove('active');
                box.classList.remove('slide-up-logo');
                document.querySelector('.logo-svg').style.opacity = '0';
                
                setTimeout(() => {
                    box.classList.add('hide'); 
                    setTimeout(() => {
                        window.location.replace("oyun.html");
                    }, 600); 
                }, 300);

            } catch (error) {
                console.error("Supabase Error:", error);
                showError("Kayıt sırasında bir hata oluştu: " + error.message);
            }
        }
    </script>
</body>
</html>
